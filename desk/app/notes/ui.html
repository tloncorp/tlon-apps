// ── Wiki-links + backlinks ────────────────────────────────────────────────
const WIKI_LINK_RE = /\[\[([^\[\]]+?)\]\]/g;

function parseWikiLinks(md) {
  const out = [];
  if (!md) return out;
  let m;
  WIKI_LINK_RE.lastIndex = 0;
  while ((m = WIKI_LINK_RE.exec(md)) !== null) {
    out.push({ target: m[1].trim(), match: m[0], index: m.index });
  }
  return out;
}

function resolveWikiLink(target) {
  if (!target) return null;
  const t = target.toLowerCase();
  for (const n of Object.values(notes)) {
    if ((n.title || "").toLowerCase() === t) return n;
  }
  return null;
}

function folderPathForNote(n) {
  if (!n) return "";
  const chain = [];
  let fid = n.folderId;
  let safety = 20;
  while (fid && folders[fid] && safety-- > 0) {
    const f = folders[fid];
    if (f.name !== "/") chain.unshift(f.name);
    fid = f.parentFolderId;
  }
  return chain.length ? "/ " + chain.join(" / ") : "/";
}

async function createNoteFromWikiLink(title) {
  if (!activeNotebookId) return;
  // Place in the current note's folder, or the active folder, or the root.
  let folderId = activeNoteId && notes[activeNoteId] ? notes[activeNoteId].folderId : activeFolderId;
  if (!folderId) folderId = rootFolderId();
  if (!folderId) return;
  await pokeNotebook({ type: "create-note", folder: folderId, title, body: "" });
  setTimeout(async () => {
    await loadNotes();
    // Find the note we just created (most recent with matching title in that folder)
    const candidates = Object.values(notes)
      .filter(n => n.folderId === folderId && (n.title || "").toLowerCase() === title.toLowerCase())
      .sort((a, b) => b.id - a.id);
    if (candidates.length) selectNote(candidates[0].id);
  }, 300);
}

// ── Theme ─────────────────────────────────────────────────────────────────
// Precedence (highest first):
//   1. local override (overflow menu toggle → localStorage.theme-override)
//   2. Landscape's %settings — display/theme key
//   3. OS prefers-color-scheme
// NB: inline the storage key rather than using a top-level `const` — these
// functions get called from earlier init lines (updateThemeCheck etc.),
// where a const would be in the temporal dead zone.
// (landscapeTheme is declared up top alongside channelId/sseState for the
// same TDZ reason.)

function systemTheme() {
  try {
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
  } catch { return "dark"; }
}
function autoTheme() {
  // What the theme would be with no local override.
  if (landscapeTheme === "light" || landscapeTheme === "dark") return landscapeTheme;
  return systemTheme();
}
function currentTheme() {
  const v = localStorage.getItem("theme-override");
  if (v === "light" || v === "dark") return v;
  return autoTheme();
}
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
}
function setThemeOverride(t) {
  if (t === null) localStorage.removeItem("theme-override");
  else localStorage.setItem("theme-override", t);
  applyTheme(currentTheme());
  updateThemeCheck();
}
function setTheme(choice) {
  // Keep the menu open so you can iterate between Auto / Light / Dark.
  if (choice === "auto") setThemeOverride(null);
  else setThemeOverride(choice);
}
function updateThemeCheck() {
  const override = localStorage.getItem("theme-override");
  const isAuto = !(override === "light" || override === "dark");
  const autoCheck = document.getElementById("theme-auto-check");
  const lightCheck = document.getElementById("theme-light-check");
  const darkCheck = document.getElementById("theme-dark-check");
  const autoLabel = document.getElementById("theme-auto-label");
  if (autoCheck) autoCheck.textContent = isAuto ? "✓" : "";
  if (lightCheck) lightCheck.textContent = override === "light" ? "✓" : "";
  if (darkCheck) darkCheck.textContent = override === "dark" ? "✓" : "";
  if (autoLabel) {
    const label = autoTheme() === "light" ? "Light" : "Dark";
    autoLabel.textContent = `Auto (${label})`;
  }
}

// Landscape %settings — best-effort scry. Path follows the %settings agent
// convention: /x/desk/{desk}/bucket/{bucket}/key/{key}/{mark}
// Returns "light" | "dark" | null. Tolerant of several response shapes
// across settings-store forks.
async function fetchLandscapeTheme() {
  try {
    // /all returns the whole settings tree; safer than scrying a single
    // entry/bucket that may not have been created yet on a fresh ship.
    const r = await fetch(`${BASE_URL}/~/scry/settings/all.json`, {
      credentials: "include"
    });
    if (!r.ok) return null;
    const data = await r.json();
    const pick = (v) => (v === "light" || v === "dark") ? v : null;
    // Response shape variations seen in the wild:
    //   { "landscape": { "display": { "theme": "light" } } }
    //   { "desks": { "landscape": { "display": { "theme": "light" } } } }
    //   { "all": { ... } }
    //   entries may be scalar strings OR { s: "light" }
    const root = data && (data.all || data.desks || data);
    const landscape = root && (root.landscape || (root.entries && root.entries.landscape));
    const display = landscape && (landscape.display || (landscape.buckets && landscape.buckets.display));
    if (!display) return null;
    const t = display.theme ?? (display.entries && display.entries.theme);
    if (typeof t === "string") return pick(t);
    if (t && typeof t === "object") {
      return pick(t.s) || pick(t.value) || pick(t.theme) || null;
    }
    return null;
  } catch { return null; }
}

async function refreshLandscapeTheme() {
  const t = await fetchLandscapeTheme();
  if (t !== landscapeTheme) {
    landscapeTheme = t;
    applyTheme(currentTheme());
    updateThemeCheck();
  }
}

applyTheme(currentTheme());
refreshLandscapeTheme();  // fire-and-forget; updates once it lands
try {
  window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", () => {
    if (!localStorage.getItem("theme-override")) applyTheme(currentTheme());
    updateThemeCheck();
  });
} catch {}
// Re-check Landscape theme whenever we come back to the tab — simpler than a
// live subscription and catches the "user toggled theme in Landscape" case.
window.addEventListener("focus", refreshLandscapeTheme);

function getBacklinksPosition() {
  return localStorage.getItem("backlinks-position") === "top" ? "top" : "bottom";
}
function setBacklinksPosition(pos) {
  localStorage.setItem("backlinks-position", pos);
  applyBacklinksPosition();
  updateBacklinksCheck();
}
function toggleBacklinksPosition() {
  // Keep the menu open — it's a flip-flop, users may try both quickly.
  setBacklinksPosition(getBacklinksPosition() === "top" ? "bottom" : "top");
}
function updateBacklinksCheck() {
  const check = document.getElementById("backlinks-top-check");
  if (check) check.textContent = getBacklinksPosition() === "top" ? "✓" : "";
}
function applyBacklinksPosition() {
  const wrap = document.querySelector(".editor-wrap");
  const el = document.getElementById("backlinks-section");
  if (!wrap || !el) return;
  const pos = getBacklinksPosition();
  el.classList.toggle("position-top", pos === "top");
  if (pos === "top") {
    // Place before the title so backlinks show first
    wrap.insertBefore(el, wrap.firstChild);
  } else {
    wrap.appendChild(el);
  }
}

function renderBacklinks() {
  const el = document.getElementById("backlinks-section");
  if (!el) return;
  if (!activeNoteId || !notes[activeNoteId]) { el.style.display = "none"; return; }
  const current = notes[activeNoteId];
  const currentTitleLc = (current.title || "").toLowerCase();
  if (!currentTitleLc) { el.style.display = "none"; return; }
  const inbound = [];
  for (const n of Object.values(notes)) {
    if (n.id === activeNoteId) continue;
    const links = parseWikiLinks(n.bodyMd || "");
    if (links.some(l => l.target.toLowerCase() === currentTitleLc)) inbound.push(n);
  }
  if (inbound.length === 0) { el.style.display = "none"; return; }
  el.style.display = "";
  el.innerHTML = `
    <div class="backlinks-header">Backlinks · ${inbound.length}</div>
    <div class="backlinks-list">
      ${inbound.map(n => `
        <div class="backlink-item" data-note-id="${n.id}">
          <div class="backlink-title">${esc(n.title || "Untitled")}</div>
          <div class="backlink-path">${esc(folderPathForNote(n))}</div>
        </div>
      `).join("")}
    </div>`;
  el.querySelectorAll(".backlink-item").forEach(item => {
    item.onclick = () => selectNote(parseInt(item.dataset.noteId, 10));
  });
}

// ── Revision history panel ───────────────────────────────────────────────
// Lazy-fetched on open via /v0/note-history/<flag>/<id>. While open, new
// archive events from the SSE stream prepend to historyEntries and re-render.
async function openHistoryPanel() {
  if (!activeNoteId || !activeNotebookFlag) return;
  const panel = document.getElementById("history-panel");
  panel.classList.add("open");
  panel.setAttribute("aria-hidden", "false");
  document.body.classList.add("history-open");
  await loadHistoryEntries();
  renderHistoryList();
}

function closeHistoryPanel() {
  const panel = document.getElementById("history-panel");
  if (!panel) return;
  panel.classList.remove("open");
  panel.setAttribute("aria-hidden", "true");
  document.body.classList.remove("history-open");
  // If we were viewing a historical revision, reset to the live note.
  if (historyViewing) backToLatest();
  historyEntries = [];
}

async function loadHistoryEntries() {
  if (!activeNotebookFlag || !activeNoteId) return;
  const path = `/v0/note-history/${activeNotebookFlag}/${activeNoteId}`;
  const data = await scry(path);
  historyEntries = Array.isArray(data) ? data : [];
}

function fmtHistoryTime(unixSec) {
  if (!unixSec) return "";
  const d = new Date(unixSec * 1000);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  const sameYear = d.getFullYear() === now.getFullYear();
  return d.toLocaleDateString([], sameYear
    ? { month: "short", day: "numeric" }
    : { year: "numeric", month: "short", day: "numeric" });
}

function renderHistoryList() {
  const el = document.getElementById("history-list");
  if (!el) return;
  if (!historyEntries.length) {
    el.innerHTML = `<div class="history-empty">No prior versions yet. Edits will appear here once you make them.</div>`;
    return;
  }
  const viewingRev = historyViewing ? historyViewing.rev : null;
  el.innerHTML = historyEntries.map(e => `
    <div class="history-item${e.rev === viewingRev ? " active" : ""}" data-rev="${e.rev}">
      <div class="history-item-meta">
        <span class="rev-num">rev ${e.rev}</span>
        <span>${esc(fmtHistoryTime(e.at))}</span>
        <span>${esc(e.author)}</span>
      </div>
      <div class="history-item-title">${esc(e.title || "Untitled")}</div>
    </div>
  `).join("");
  el.querySelectorAll(".history-item").forEach(item => {
    item.onclick = () => { viewHistoryEntry(parseInt(item.dataset.rev, 10)); };
  });
}

function applyArchivedRevision(evt) {
  // The SSE archive event carries { noteId, revision: { rev, at, author, title, bodyMd }, actor }.
  if (!evt || evt.noteId !== activeNoteId) return;
  const rev = evt.revision;
  if (!rev || typeof rev.rev !== "number") return;
  // Avoid duplicates if the same rev was already prepended (network races).
  if (historyEntries.some(x => x.rev === rev.rev)) return;
  historyEntries = [rev, ...historyEntries];
  const panel = document.getElementById("history-panel");
  if (panel && panel.classList.contains("open")) renderHistoryList();
}

async function viewHistoryEntry(rev) {
  const entry = historyEntries.find(e => e.rev === rev);
  if (!entry) return;
  // Persist dirty work first so it isn't lost when the editor flips to
  // read-only. confirmDirty returns true after autoSave completes.
  if (!await confirmDirty()) return;
  historyViewing = entry;
  document.getElementById("note-title-input").value = entry.title || "";
  document.getElementById("editor").value = entry.bodyMd || "";
  document.getElementById("note-title-input").readOnly = true;
  document.getElementById("editor").readOnly = true;
  if (previewMode) document.getElementById("preview").innerHTML = renderMarkdown(entry.bodyMd || "");
  autosizeEditor();
  const banner = document.getElementById("history-banner");
  document.getElementById("history-banner-msg").innerHTML =
    `Viewing <strong>rev ${entry.rev}</strong> from ${esc(fmtHistoryTime(entry.at))} by ${esc(entry.author)}. The editor is read-only.`;
  banner.classList.add("open");
  renderHistoryList();
}

function backToLatest() {
  historyViewing = null;
  document.getElementById("history-banner").classList.remove("open");
  document.getElementById("note-title-input").readOnly = false;
  document.getElementById("editor").readOnly = false;
  if (activeNoteId) {
    const n = notes[activeNoteId];
    if (n) {
      document.getElementById("note-title-input").value = n.title;
      document.getElementById("editor").value = n.bodyMd;
      autosizeEditor();
      if (previewMode) document.getElementById("preview").innerHTML = renderMarkdown(n.bodyMd);
      savedRevision = n.revision;
      clearDirty();
    }
  }
  renderHistoryList();
}

async function restoreHistoryEntry() {
  if (!historyViewing || !activeNoteId) return;
  const entry = historyViewing;
  const n = notes[activeNoteId];
  if (!n) return;
  // Drop history-view first so the editor accepts the write through normal channels.
  const targetTitle = entry.title || "";
  const targetBody = entry.bodyMd || "";
  backToLatest();
  // Apply the restored content through the normal save path so the server
  // archives the current rev and assigns a fresh revision number.
  document.getElementById("note-title-input").value = targetTitle;
  document.getElementById("editor").value = targetBody;
  autosizeEditor();
  dirty = true;
  await saveNote();
}

// ── Wiki-link autocomplete (on [[) ────────────────────────────────────────
let wikiAutocompleteOpen = false;
let wikiAutocompleteStart = -1;  // textarea index of the '[[' we're completing
let wikiAutocompleteMatches = [];
let wikiAutocompleteSelIdx = 0;

// Measure caret position in a textarea by rendering a styled mirror div.
function getTextareaCaretCoords(textarea) {
  const mirror = document.createElement("div");
  const cs = window.getComputedStyle(textarea);
  const props = [
    "boxSizing","width","height","overflow",
    "borderTopWidth","borderRightWidth","borderBottomWidth","borderLeftWidth",
    "paddingTop","paddingRight","paddingBottom","paddingLeft",
    "fontStyle","fontVariant","fontWeight","fontStretch",
    "fontSize","fontSizeAdjust","lineHeight","fontFamily",
    "textAlign","textTransform","textIndent","textDecoration",
    "letterSpacing","wordSpacing","tabSize"
  ];
  props.forEach(p => { mirror.style[p] = cs[p]; });
  mirror.style.position = "absolute";
  mirror.style.visibility = "hidden";
  mirror.style.whiteSpace = "pre-wrap";
  mirror.style.wordWrap = "break-word";
  mirror.style.top = "0";
  mirror.style.left = "-9999px";
  document.body.appendChild(mirror);
  const before = textarea.value.slice(0, textarea.selectionEnd);
  mirror.textContent = before;
  const marker = document.createElement("span");
  marker.textContent = "\u200B";
  mirror.appendChild(marker);
  const taRect = textarea.getBoundingClientRect();
  const markerRect = marker.getBoundingClientRect();
  const mirrorRect = mirror.getBoundingClientRect();
  document.body.removeChild(mirror);
  return {
    top: taRect.top + (markerRect.top - mirrorRect.top) - textarea.scrollTop,
    left: taRect.left + (markerRect.left - mirrorRect.left) - textarea.scrollLeft,
    lineHeight: parseFloat(cs.lineHeight) || 20
  };
}

function checkWikiAutocomplete() {
  const ta = document.getElementById("editor");
  if (!ta || document.activeElement !== ta) { hideWikiAutocomplete(); return; }
  const caret = ta.selectionStart;
  if (caret !== ta.selectionEnd) { hideWikiAutocomplete(); return; }
  const text = ta.value;
  // Scan backward for an unmatched '[[' within 120 chars on the current line.
  let open = -1;
  for (let i = caret - 1; i >= 0 && caret - i < 120; i--) {
    const c = text[i];
    if (c === "\n") break;
    if (c === "]" && text[i - 1] === "]") break;
    if (c === "[" && text[i - 1] === "[") { open = i - 1; break; }
  }
  if (open < 0) { hideWikiAutocomplete(); return; }
  const query = text.slice(open + 2, caret);
  if (/[\[\]]/.test(query)) { hideWikiAutocomplete(); return; }
  wikiAutocompleteStart = open;
  showWikiAutocomplete(query);
}

function showWikiAutocomplete(query) {
  const matches = filterNoteTitlesForWiki(query);
  wikiAutocompleteMatches = matches;
  wikiAutocompleteSelIdx = 0;
  renderWikiAutocomplete(query);
  const box = document.getElementById("wiki-autocomplete");
  box.classList.add("open");
  wikiAutocompleteOpen = true;
  positionWikiAutocomplete();
}

function hideWikiAutocomplete() {
  const box = document.getElementById("wiki-autocomplete");
  box.classList.remove("open");
  wikiAutocompleteOpen = false;
  wikiAutocompleteStart = -1;
  wikiAutocompleteMatches = [];
}

function filterNoteTitlesForWiki(query) {
  const items = Object.values(notes)
    .filter(n => n.id !== activeNoteId && n.title)
    .map(n => ({ note: n, title: n.title }));
  if (!query) {
    items.sort((a, b) => (b.note.updatedAt || 0) - (a.note.updatedAt || 0));
    return items.slice(0, 10);
  }
  const scored = items
    .map(it => ({ ...it, score: scoreSwitcherMatch(query, it.title) }))
    .filter(it => it.score > 0);
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, 10);
}

function renderWikiAutocomplete(query) {
  const box = document.getElementById("wiki-autocomplete");
  if (wikiAutocompleteMatches.length === 0) {
    if (query) {
      box.innerHTML = `<div class="wiki-autocomplete-empty">No match — press <kbd>↵</kbd> to link &amp; create &ldquo;${esc(query)}&rdquo;</div>`;
    } else {
      box.innerHTML = `<div class="wiki-autocomplete-empty">No other notes yet</div>`;
    }
    return;
  }
  box.innerHTML = wikiAutocompleteMatches.map((m, i) =>
    `<div class="wiki-autocomplete-item${i === wikiAutocompleteSelIdx ? ' selected' : ''}" data-idx="${i}">${esc(m.title)}</div>`
  ).join("");
  box.querySelectorAll(".wiki-autocomplete-item").forEach(el => {
    el.addEventListener("mousedown", (e) => {
      e.preventDefault();
      wikiAutocompleteSelIdx = parseInt(el.dataset.idx, 10);
      acceptWikiAutocomplete();
    });
    el.addEventListener("mouseenter", () => {
      setWikiAutocompleteSel(parseInt(el.dataset.idx, 10));
    });
  });
}

function setWikiAutocompleteSel(idx) {
  if (idx < 0 || idx >= wikiAutocompleteMatches.length) return;
  wikiAutocompleteSelIdx = idx;
  const els = document.querySelectorAll("#wiki-autocomplete .wiki-autocomplete-item");
  els.forEach((el, i) => el.classList.toggle("selected", i === idx));
  if (els[idx]) els[idx].scrollIntoView({ block: "nearest" });
}

function positionWikiAutocomplete() {
  const ta = document.getElementById("editor");
  const box = document.getElementById("wiki-autocomplete");
  if (!ta || !box) return;
  const coords = getTextareaCaretCoords(ta);
  const bh = box.offsetHeight;
  const bw = box.offsetWidth;
  let top = coords.top + coords.lineHeight + 4;
  let left = coords.left;
  if (top + bh > window.innerHeight - 8) top = coords.top - bh - 4;
  if (left + bw > window.innerWidth - 8) left = window.innerWidth - bw - 8;
  if (left < 8) left = 8;
  box.style.top = top + "px";
  box.style.left = left + "px";
}

function acceptWikiAutocomplete() {
  const ta = document.getElementById("editor");
  if (!ta || wikiAutocompleteStart < 0) { hideWikiAutocomplete(); return; }
  const caret = ta.selectionStart;
  const m = wikiAutocompleteMatches[wikiAutocompleteSelIdx];
  let title;
  if (m) title = m.title;
  else {
    // No matches: treat whatever the user typed as the link title
    title = ta.value.slice(wikiAutocompleteStart + 2, caret).trim();
    if (!title) { hideWikiAutocomplete(); return; }
  }
  const before = ta.value.slice(0, wikiAutocompleteStart);
  const after = ta.value.slice(caret);
  const insertion = "[[" + title + "]]";
  ta.value = before + insertion + after;
  const newCaret = wikiAutocompleteStart + insertion.length;
  ta.selectionStart = ta.selectionEnd = newCaret;
  hideWikiAutocomplete();
  ta.focus();
  onEditorInput();
}

// On Enter, continue the current line's list/task prefix. If the line is
// just an empty prefix, strip it (break out of the list) instead of inserting.
function maybeContinueListOnEnter(e, ta) {
  if (e.key !== "Enter" || e.shiftKey || e.altKey || e.metaKey || e.ctrlKey || e.isComposing) return false;
  const v = ta.value;
  const s = ta.selectionStart;
  if (s !== ta.selectionEnd) return false;
  const lineStart = v.lastIndexOf("\n", s - 1) + 1;
  const nlIdx = v.indexOf("\n", s);
  const lineEnd = nlIdx < 0 ? v.length : nlIdx;
  const line = v.slice(lineStart, lineEnd);

  const taskRe = /^(\s*)([-*+])(\s+)\[([ xX])\](\s+)(.*)$/;
  const bulletRe = /^(\s*)([-*+])(\s+)(.*)$/;
  const orderedRe = /^(\s*)(\d+)([.)])(\s+)(.*)$/;

  let prefix = null, content = null;
  let m;
  if ((m = line.match(taskRe))) {
    prefix = m[1] + m[2] + m[3] + "[ ]" + m[5];
    content = m[6];
  } else if ((m = line.match(bulletRe))) {
    prefix = m[1] + m[2] + m[3];
    content = m[4];
  } else if ((m = line.match(orderedRe))) {
    const next = parseInt(m[2], 10) + 1;
    prefix = m[1] + next + m[3] + m[4];
    content = m[5];
  } else {
    return false;
  }

  // Don't intercept if the cursor is inside the prefix (let normal Enter split it).
  const prefixEnd = lineStart + (line.length - content.length);
  if (s < prefixEnd) return false;

  // Empty prefix line — break out: remove the prefix, leave cursor on a blank line.
  if (!content.trim()) {
    e.preventDefault();
    ta.value = v.slice(0, lineStart) + v.slice(lineEnd);
    ta.selectionStart = ta.selectionEnd = lineStart;
    onEditorInput();
    return true;
  }

  // Continue: insert newline + same prefix at the cursor.
  e.preventDefault();
  const inserted = "\n" + prefix;
  ta.value = v.slice(0, s) + inserted + v.slice(s);
  const newCaret = s + inserted.length;
  ta.selectionStart = ta.selectionEnd = newCaret;
  onEditorInput();
  return true;
}

document.getElementById("editor").addEventListener("keydown", (e) => {
  if (maybeContinueListOnEnter(e, e.target)) return;
  if (!wikiAutocompleteOpen) return;
  if (e.key === "ArrowDown") {
    e.preventDefault(); e.stopPropagation();
    setWikiAutocompleteSel(Math.min(wikiAutocompleteSelIdx + 1, wikiAutocompleteMatches.length - 1));
  } else if (e.key === "ArrowUp") {
    e.preventDefault(); e.stopPropagation();
    setWikiAutocompleteSel(Math.max(wikiAutocompleteSelIdx - 1, 0));
  } else if (e.key === "Enter" || e.key === "Tab") {
    e.preventDefault(); e.stopPropagation();
    acceptWikiAutocomplete();
  } else if (e.key === "Escape") {
    e.preventDefault(); e.stopPropagation();
    hideWikiAutocomplete();
  } else if (e.key === "ArrowLeft" || e.key === "ArrowRight" || e.key === "Home" || e.key === "End") {
    // caret movement — close and let the key proceed
    hideWikiAutocomplete();
  }
});

document.addEventListener("click", (e) => {
  if (!wikiAutocompleteOpen) return;
  if (e.target.closest("#wiki-autocomplete")) return;
  if (e.target.closest("#editor")) return;
  hideWikiAutocomplete();
});
// Close on scroll of any ancestor (editor-scroll, window)
window.addEventListener("scroll", () => { if (wikiAutocompleteOpen) hideWikiAutocomplete(); }, true);
document.getElementById("editor").addEventListener("click", () => {
  if (wikiAutocompleteOpen) setTimeout(checkWikiAutocomplete, 0);
});

// Delegate clicks on wiki-links in the preview
document.getElementById("preview").addEventListener("click", (e) => {
  const a = e.target.closest("a.wiki-link");
  if (!a) return;
  e.preventDefault();
  const noteId = a.dataset.noteId;
  if (noteId) {
    selectNote(parseInt(noteId, 10));
    return;
  }
  const target = a.dataset.wikiTarget;
  if (target && confirm(`Create note "${target}"?`)) {
    createNoteFromWikiLink(target);
  }
});

// ── Folder breadcrumb ─────────────────────────────────────────────────────
function updateBreadcrumb() {
  const el = document.getElementById("note-breadcrumb");
  const pathEl = document.getElementById("note-path");
  if (!activeNoteId || !notes[activeNoteId]) {
    if (el) { el.textContent = ""; el.dataset.full = ""; }
    if (pathEl) pathEl.textContent = "";
    return;
  }
  const n = notes[activeNoteId];
  const chain = [];
  let fid = n.folderId;
  let safety = 20;
  while (fid && folders[fid] && safety-- > 0) {
    const f = folders[fid];
    if (f.name !== "/") chain.unshift(f.name);
    fid = f.parentFolderId;
  }
  const full = chain.length ? "/" + chain.join("/") : "/";
  if (el) {
    el.dataset.full = full;
    el.textContent = full;
    // On mobile, JS-truncate from the left so the deepest folder stays visible
    // and the text remains left-aligned (CSS ellipsis can't combine both).
    if (window.innerWidth <= 640) requestAnimationFrame(() => truncateBreadcrumbLeft(el));
  }
  // Desktop: also write to the in-editor path label above the title.
  // Always render (even bare "/") so the title doesn't jump vertically
  // as the user moves between root-level and nested notes.
  if (pathEl) pathEl.textContent = full;
}

function truncateBreadcrumbLeft(el) {
  const full = el.dataset.full || "";
  if (!full) return;
  el.textContent = full;
  if (el.scrollWidth <= el.clientWidth) return;
  // Binary search for the longest suffix that fits with a leading ellipsis.
  let lo = 0, hi = full.length;
  while (lo < hi) {
    const mid = (lo + hi) >>> 1;
    el.textContent = "…" + full.slice(mid);
    if (el.scrollWidth <= el.clientWidth) hi = mid;
    else lo = mid + 1;
  }
  el.textContent = "…" + full.slice(lo);
}
window.addEventListener("resize", () => {
  const el = document.getElementById("note-breadcrumb");
  if (el && window.innerWidth <= 640) truncateBreadcrumbLeft(el);
});

// ── Editor autosize ──────────────────────────────────────────────────────
// The textarea lives inside .editor-scroll and does not scroll itself —
// grow its height to fit content so the outer column scrolls as one document.
//
// Setting height to "auto" collapses the textarea to its default height for
// a single keystroke, which shrinks .editor-scroll's total scrollable area
// and causes the browser to clamp scrollTop. We snapshot scrollTop before
// the resize and restore it after so the scroll position survives every
// keystroke. Skip the round-trip entirely when the height isn't changing.
function autosizeEditor() {
  const el = document.getElementById("editor");
  if (!el) return;
  const scroll = el.closest(".editor-scroll");
  const prevScrollTop = scroll ? scroll.scrollTop : 0;
  const target = (() => {
    el.style.height = "auto";
    return el.scrollHeight;
  })();
  const current = parseInt(el.style.height, 10);
  if (current !== target) el.style.height = target + "px";
  if (scroll && scroll.scrollTop !== prevScrollTop) {
    scroll.scrollTop = prevScrollTop;
  }
}
window.addEventListener("resize", autosizeEditor);

// ── Create / Save ─────────────────────────────────────────────────────────
async function newNote() {
  if (!activeNotebookId) { alert("Select a notebook first"); return; }
  if (!activeFolderId) { alert("No folder selected"); return; }
  if (!await confirmDirty()) return;

  const targetFolder = activeFolderId;
  // Listen for the resulting note-created event before pokeing, so we can't
  // miss an echo that arrives faster than pokeAction's poke-ack resolves.
  const waitForCreate = awaitNoteCreate(targetFolder).catch(() => null);
  await pokeNotebook({ type: "create-note", folder: targetFolder, title: "Untitled", body: "" });
  const created = await waitForCreate;
  await loadNotes();
  let pickId = created?.id;
  if (pickId == null) {
    const inFolder = Object.values(notes).filter(n => n.folderId === targetFolder);
    const newest = inFolder.sort((a,b) => b.id - a.id)[0];
    pickId = newest?.id;
  }
  if (pickId != null) {
    await selectNote(pickId);
    document.getElementById("editor").focus();
  }
}

// ── Local-storage drafts ─────────────────────────────────────────────────
// Mirror every keystroke to localStorage keyed by [flag, noteId] so a
// crash / accidental close / lost connection between autoSave intervals
// doesn't lose work. The draft is cleared once a successful save lands.
// Keyed against `baseRevision` (the savedRevision at write time) so we can
// detect drafts that have already been superseded by a remote edit.
const DRAFT_KEY_PREFIX = "notes-draft";
function draftKey(flag, noteId) { return `${DRAFT_KEY_PREFIX}|${flag}|${noteId}`; }
function writeDraft() {
  if (!activeNotebookFlag || !activeNoteId) return;
  try {
    localStorage.setItem(draftKey(activeNotebookFlag, activeNoteId), JSON.stringify({
      title: document.getElementById("note-title-input").value,
      body: document.getElementById("editor").value,
      baseRevision: savedRevision,
      ts: Date.now()
    }));
  } catch {}
}
function clearDraft(flag, noteId) {
  if (!flag || noteId == null) return;
  try { localStorage.removeItem(draftKey(flag, noteId)); } catch {}
}
function readDraft(flag, noteId) {
  try {
    const raw = localStorage.getItem(draftKey(flag, noteId));
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

// ── Auto-save ────────────────────────────────────────────────────────────
let saveTimer = null;
let saving = false;
let autoCreating = false;
let conflictActive = false;

function onEditorInput() {
  // Read-only while viewing a historical revision; ignore stray inputs.
  if (historyViewing) return;
  // If the user starts typing with no note selected, auto-create one.
  if (!activeNoteId && !autoCreating) {
    triggerAutoCreate();
    return;
  }
  // While auto-creating, keep accepting keystrokes — editor DOM updates
  // naturally, we'll promote the typed content once the note is ready.
  if (autoCreating) return;

  dirty = true;
  autosizeEditor();
  document.getElementById("save-status").textContent = "";
  writeDraft();
  if (saveTimer) clearTimeout(saveTimer);
  // Don't arm autoSave while a conflict is unresolved — user must resolve first
  if (!conflictActive) saveTimer = setTimeout(() => autoSave(), AUTOSAVE_DEBOUNCE_MS);
  checkWikiAutocomplete();
}

async function triggerAutoCreate() {
  const editor = document.getElementById("editor");
  const titleInput = document.getElementById("note-title-input");
  if (!activeNotebookId || !activeFolderId) {
    // Can't create — clear the editor and tell the user.
    editor.value = "";
    titleInput.value = "";
    alert(activeNotebookId ? "No folder selected" : "Select a notebook first");
    return;
  }
  autoCreating = true;
  const targetFolder = activeFolderId;
  const waitForCreate = awaitNoteCreate(targetFolder).catch(() => null);
  await pokeNotebook({ type: "create-note", folder: targetFolder, title: "Untitled", body: "" });
  const created = await waitForCreate;
  await loadNotes();
  let pickId = created?.id;
  if (pickId == null) {
    const inFolder = Object.values(notes).filter(n => n.folderId === targetFolder);
    const newest = inFolder.sort((a,b) => b.id - a.id)[0];
    pickId = newest?.id;
  }
  autoCreating = false;
  if (pickId == null) return;
  // Capture what the user typed RIGHT BEFORE selectNote — selectNote
  // overwrites the editor with server-side (empty) values, and previously
  // we captured these earlier (before loadNotes), so any keystrokes typed
  // during the loadNotes await were silently dropped on restore.
  const pendingBody = editor.value;
  const pendingTitle = titleInput.value;
  await selectNote(pickId);
  // selectNote wrote the server-side (empty) values; restore what they typed
  editor.value = pendingBody;
  titleInput.value = pendingTitle;
  autosizeEditor();
  editor.focus();
  editor.selectionStart = editor.selectionEnd = editor.value.length;
  dirty = true;
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => autoSave(), AUTOSAVE_DEBOUNCE_MS);
}

let lastOwnSaveAt = 0;

async function autoSave() {
  if (!activeNoteId || !dirty || saving || conflictActive || historyViewing) return;
  saving = true;
  const title = document.getElementById("note-title-input").value.trim() || "Untitled";
  const body = document.getElementById("editor").value;
  const n = notes[activeNoteId];
  if (!n) { saving = false; return; }

  document.getElementById("save-status").textContent = "Saving\u2026";

  // Strict revision check on the host — always send the real revision; the
  // stream keeps subscribers' savedRevision current so this is correct on
  // both host-owned and subscribed notebooks.
  const sentRev = savedRevision;
  // Pre-bump savedRevision BEFORE sending so the echoed note-updated event
  // (which may arrive before pokeAction's ack resolves) is recognized as our
  // own save via isOwnSaveEcho's revision check.
  const rollbackRev = savedRevision;
  savedRevision = savedRevision + 1;
  lastOwnSaveAt = Date.now();

  try {
    await pokeNoteAction(activeNoteId, { type: "update", body, expectedRevision: sentRev });
    if (title !== n.title) {
      await pokeNoteAction(activeNoteId, { type: "rename", title });
    }
    notes[activeNoteId] = { ...n, title, bodyMd: body, revision: savedRevision };
    dirty = false;
    clearDraft(activeNotebookFlag, activeNoteId);
    document.getElementById("save-status").textContent = "Saved";
    document.getElementById("note-rev").textContent = `rev ${savedRevision}`;
    document.title = `${title || "Untitled"} — Notes`;
    setTimeout(() => { if (!dirty) document.getElementById("save-status").textContent = ""; }, 2000);
    renderItems();
    // If this note is published, refresh the public copy in the background
    // so the URL doesn't go stale. Fire-and-forget; failures are silent.
    if (publishedIds.has(pubKey(activeNotebookFlag, activeNoteId))) {
      publishCurrentNoteHtml();
    }
  } catch(e) {
    savedRevision = rollbackRev;
    document.getElementById("save-status").textContent = "Error saving";
    await handleSaveFailure();
  }
  saving = false;
}

// Inspect the server-side note to determine whether the save failure was
// a revision conflict (someone else updated the note) or a transient issue.
async function handleSaveFailure() {
  if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
  if (!activeNotebookFlag || !activeNoteId) return;
  try {
    const data = await scry(`/v0/notes/${activeNotebookFlag}`);
    const remote = (data || []).find(x => x.id === activeNoteId);
    if (remote && remote.revision > savedRevision) {
      showConflictBanner(`Save failed — remote is now at rev ${remote.revision}. Your changes are preserved.`);
      return;
    }
  } catch(_) {}
  showConflictBanner("Save failed. Click retry, or reload from server to discard your changes.", true);
}

function showConflictBanner(msg, isError) {
  const banner = document.getElementById("conflict-banner");
  banner.style.display = "flex";
  banner.classList.toggle("error", !!isError);
  document.getElementById("conflict-msg").textContent = msg;
  document.getElementById("conflict-keep").textContent = isError ? "Retry" : "Keep mine";
  document.getElementById("conflict-use").textContent = isError ? "Reload" : "Use remote";
  // Block auto-save until the user resolves
  conflictActive = true;
  if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
}

function dismissConflictBanner() {
  const banner = document.getElementById("conflict-banner");
  if (!banner) return;
  banner.style.display = "none";
  banner.classList.remove("error");
  conflictActive = false;
}

async function resolveConflictKeepMine() {
  // Force-save: bypass revision check by loading the latest rev, then saving
  dismissConflictBanner();
  if (!activeNoteId) return;
  try {
    const data = await scry(`/v0/notes/${activeNotebookFlag}`);
    const remote = (data || []).find(x => x.id === activeNoteId);
    if (remote) savedRevision = remote.revision;  // adopt remote rev
  } catch(_) {}
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => autoSave(), 50);
}

async function resolveConflictUseRemote() {
  dismissConflictBanner();
  if (!activeNoteId) return;
  dirty = false;
  await loadNote(activeNoteId);
}

// keep ctrl+s as a force-save
async function saveNote() { if (saveTimer) clearTimeout(saveTimer); await autoSave(); }

// Last-chance flush when the page is being torn down. Uses fetch with
// `keepalive: true` so the request continues after the page unloads —
// browsers limit keepalive bodies to 64KB total per origin, which is
// enough for almost any single note. We can't await ack here (the page
// will be gone), so this is fire-and-forget; the conflict banner on
// next visit handles any drift.
function flushSaveBeacon() {
  if (!activeNoteId || !dirty || saving || conflictActive || historyViewing) return;
  const n = notes[activeNoteId];
  if (!n) return;
  // note actions are notebook-scoped (see pokeNotebook), so we need the flag
  if (!activeNotebookFlag) return;
  const title = document.getElementById("note-title-input").value.trim() || "Untitled";
  const body = document.getElementById("editor").value;
  const nb = notebooks[n.notebookId];
  const isLocal = nb && SHIP && nb.host.replace(/^~/, "") === SHIP.replace(/^~/, "");
  const sentRev = isLocal ? savedRevision : 0;
  // Build the same v1 a-notes actions the normal save path sends (see
  // pokeNoteAction) and POST them to the v1 API with keepalive so they survive
  // the unload. Sent per-action, fire-and-forget — we can't await an ack as the
  // page is going away; the conflict banner on next visit handles any drift.
  const noteAction = (inner) => ({
    type: "notebook",
    flag: activeNotebookFlag,
    action: { type: "note", id: activeNoteId, action: inner },
  });
  const actions = [noteAction({ type: "update", body, expectedRevision: sentRev })];
  if (title !== n.title) actions.push(noteAction({ type: "rename", title }));
  for (const action of actions) {
    try {
      fetch(`${BASE_URL}/notes/~/v1`, {
        method: "POST", credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ requestId: generateRequestId(), action }),
        keepalive: true,
      });
    } catch (_) { /* page is closing — nothing to do */ }
  }
}

// Save when the tab is being backgrounded or closed. visibilitychange
// fires reliably on tab switch and mobile app background; pagehide is
// the last point we can issue a request before the page is destroyed.
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden" && dirty) {
    if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
    // Best-effort async save — we still have time here. If the user
    // returns before it finishes, the next autoSave is gated by `saving`.
    autoSave();
  }
});
window.addEventListener("pagehide", () => { flushSaveBeacon(); });

}

function closeOverflow() {

function closeNotebookSettings() {

async function deleteNote() {
  closeOverflow();
  if (!activeNoteId || !activeNotebookId) return;
  const n = notes[activeNoteId];
  if (!n) return;
  const title = n.title || "Untitled";
  if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;

  await pokeNoteAction(activeNoteId, { type: "delete" });

  clearDraft(activeNotebookFlag, activeNoteId);
  delete notes[activeNoteId];
  activeNoteId = null;
  clearEditor();
  renderItems();
  if (isMobile()) mobileSetView("notes");
}

  }
</style>
</head>
<body>
<article>
<h1>${esc(title)}</h1>
${bodyHtml}
<div class="pub-footer">Published from Urbit</div>
</article>
</body>
</html>`;
}

// Rewrite wiki-links for the public HTML:
//   - If the link resolves to a note that is also published → keep it as a
//     real <a> pointing at the target's public URL.
//   - Otherwise → strip the anchor and keep just the displayed text.
function transformWikiLinksForPublish(html) {
  return html.replace(
    /<a class="wiki-link(?: unresolved)?"[^>]*>([\s\S]*?)<\/a>/g,
    (match, inner) => {
      const idMatch = match.match(/data-note-id="(\d+)"/);
      if (idMatch) {
        const nid = parseInt(idMatch[1], 10);
        if (publishedIds.has(pubKey(activeNotebookFlag, nid))) {
          return `<a href="${pubUrl(activeNotebookFlag, nid)}">${inner}</a>`;
        }
      }
      return inner;
    }
  );
}

// Render and ship the current note to the publish-note action. Used both
// by the manual "Publish to web" button and by the auto-republish-on-save
// path. Returns true on success.
async function publishCurrentNoteHtml() {
  if (!activeNoteId || !activeNotebookId) return false;
  const n = notes[activeNoteId];
  if (!n) return false;
  const body = document.getElementById("editor").value;
  const rendered = transformWikiLinksForPublish(renderMarkdown(body));
  const html = publishTemplate(n.title || "Untitled", rendered);
  try {
    await pokeNoteAction(activeNoteId, { type: "publish", html });
    return true;
  } catch (_) {
    return false;
  }
}

async function publishNote() {
  closeOverflow();
  if (!activeNoteId || !activeNotebookId) return;

  // Save first if dirty
  if (dirty) await autoSave();
  if (!(await publishCurrentNoteHtml())) return;

  publishedIds.add(pubKey(activeNotebookFlag, activeNoteId));
  document.getElementById("publish-btn").style.display = "none";
  document.getElementById("unpublish-btn").style.display = "";
  document.getElementById("view-published-btn").style.display = "";
  window.open(pubUrl(activeNotebookFlag, activeNoteId), '_blank');
}

async function unpublishNote() {
  closeOverflow();
  if (!activeNoteId || !activeNotebookId) return;

  await pokeNoteAction(activeNoteId, { type: "unpublish" });

  publishedIds.delete(pubKey(activeNotebookFlag, activeNoteId));
  document.getElementById("publish-btn").style.display = "";
  document.getElementById("unpublish-btn").style.display = "none";
  document.getElementById("view-published-btn").style.display = "none";
}

function viewPublished() {
  if (!activeNoteId || !activeNotebookFlag) return;
  window.open(pubUrl(activeNotebookFlag, activeNoteId), '_blank');
}

let inviteMembersCache = null;  // [{ ship, role }, ...] loaded on modal open

function normalizeShip(raw) {
  if (!raw) return "";
  const s = raw.trim();
  if (!s) return "";
  return s.startsWith("~") ? s : "~" + s;
}

function isShipShape(s) {
  return /^~[a-z][a-z0-9-]*$/.test(s);
}

// Live status under the ship input — disables submit when the typed ship
// is invalid, the operator's own ship, or already in the member list.
function validateInviteShip() {
  const inp = document.getElementById("m-ship");
  const status = document.getElementById("m-ship-status");
  const submit = document.getElementById("m-ship-submit");
  if (!inp || !status || !submit) return;
  const raw = inp.value.trim();
  const ship = normalizeShip(raw);
  if (!raw) {
    status.textContent = "";
    status.className = "modal-status";
    submit.disabled = false;
    return;
  }
  if (!isShipShape(ship)) {
    status.textContent = "Doesn't look like a ship name (e.g. ~sampel-palnet).";
    status.className = "modal-status warn";
    submit.disabled = true;
    return;
  }
  if (SHIP && ship.replace(/^~/, "") === SHIP.replace(/^~/, "")) {
    status.textContent = "That's you — pick a different ship.";
    status.className = "modal-status warn";
    submit.disabled = true;
    return;
  }
  if (inviteMembersCache && inviteMembersCache.some(m => m.ship === ship)) {
    status.textContent = `${ship} is already a member of this notebook.`;
    status.className = "modal-status warn";
    submit.disabled = true;
    return;
  }
  status.textContent = "";
  status.className = "modal-status";
  submit.disabled = false;
}

async function inviteShip() {
  const submit = document.getElementById("m-ship-submit");
  if (submit && submit.disabled) return;
  const raw = document.getElementById("m-ship")?.value?.trim();
  if (!raw || !activeNotebookId) return;
  // Accept ~sampel or sampel; agent expects sampel (no leading sig).
  const ship = normalizeShip(raw);
  // Lightweight format check — the agent will reject malformed ships.
  if (!isShipShape(ship)) {
    alert(`"${raw}" doesn't look like a valid ship name (e.g. ~sampel-palnet).`);
    return;
  }
  document.getElementById("modal-backdrop").classList.remove("open");
  try {
    await pokeNotebook({ type: "invite", who: ship });
  } catch (e) {
    alert("Invite failed: " + (e?.message || "unknown error"));
  }
}

let folderActionTarget = null;       // folder object
let folderActionAnchor = null;       // DOM element opened from

function openFolderActionMenu(folder, anchorEl) {
  closeFolderActionMenu();
  folderActionTarget = folder;
  folderActionAnchor = anchorEl;
  anchorEl.classList.add("menu-open");
  const menu = document.getElementById("folder-action-menu");
  const rect = anchorEl.getBoundingClientRect();
  // Position just below the icon, left-aligned with it; flip up if it would overflow.
  menu.classList.add("open");
  const menuRect = menu.getBoundingClientRect();
  const belowOverflows = rect.bottom + 6 + menuRect.height > window.innerHeight;
  menu.style.top = (belowOverflows
    ? rect.top - 6 - menuRect.height
    : rect.bottom + 6) + "px";
  menu.style.left = rect.left + "px";
}

function closeFolderActionMenu() {
  const menu = document.getElementById("folder-action-menu");
  menu.classList.remove("open");
  if (folderActionAnchor) folderActionAnchor.classList.remove("menu-open");
  folderActionTarget = null;
  folderActionAnchor = null;
}

document.addEventListener("click", (e) => {
  if (!document.getElementById("folder-action-menu")?.classList.contains("open")) return;
  if (e.target.closest(".folder-action-menu")) return;
  if (e.target.closest(".item-icon[data-folder-id]")) return;

  closeFolderActionMenu();
  const childCount = Object.values(folders).filter(x => x.parentFolderId === f.id).length
                   + Object.values(notes).filter(n => n.folderId === f.id).length;
  const detail = childCount > 0
    ? ` This will also delete ${childCount} item${childCount === 1 ? "" : "s"} inside it.`
    : "";
  if (!confirm(`Delete folder "${f.name}"?${detail} This cannot be undone.`)) return;
  await pokeFolderAction(f.id, { type: "delete", recursive: true });
  // If we were inside this folder (or a descendant), navigate up to root

async function copyShareLink() {
  closeNotebookSettings();
  if (!activeNotebookFlag) return;
  // Build /notes/share/<host>/<name> on this ship's URL. Recipients can
  // open the link from anywhere; the page asks for their own ship URL
  // and redirects there.
  const parts = activeNotebookFlag.split("/");
  const host = parts[0];
  const name = parts.slice(1).join("/");
  const link = `${BASE_URL}/notes/share/${encodeURIComponent(host)}/${encodeURIComponent(name)}`;
  try {
    await navigator.clipboard.writeText(link);
    const el = document.getElementById("save-status");
    if (el) {
      const prev = el.textContent;
      el.textContent = "Share link copied";
      setTimeout(() => { if (el.textContent === "Share link copied") el.textContent = prev; }, 1500);
    }
  } catch(_) {
    prompt("Share link:", link);
  }
}

  if (!activeNotebookFlag || !activeNoteId) return;
  // pasting this into a Tlon chat input turns it into a note citation
  const ref = `/1/chan/notes/${activeNotebookFlag}/note/${activeNoteId}`;
  try {
    await navigator.clipboard.writeText(ref);

async function createFolder() {
  const name = document.getElementById("m-name")?.value?.trim();
  const parentVal = document.getElementById("m-parent")?.value;
  if (!name) return;

  // `parent` is required by the API; to create a top-level folder we pass the
  // notebook's root folder id. Resolve it before closing the modal so a
  // failure to resolve leaves the user's input intact.
  let parentFolderId = parentVal ? parseInt(parentVal) : null;
  if (!parentFolderId) {
    const rootFolder = Object.values(folders).find(f => f.name === "/");
    parentFolderId = rootFolder ? rootFolder.id : null;
  }
  if (!parentFolderId) {
    alert("Couldn't find a parent folder for the new folder. Try reloading the notebook.");
    return;
  }

  document.getElementById("modal-backdrop").classList.remove("open");
  await pokeNotebook({ type: "create-folder", parent: parentFolderId, name });
  setTimeout(() => loadFolders(), 300);
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && !e.altKey && !e.shiftKey && (e.key === "p" || e.key === "P" || e.key === "e" || e.key === "E" || e.key === "k" || e.key === "K")) {
    e.preventDefault();
    if (switcherOpen()) closeSwitcher(); else openSwitcher();
    return;
  }
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && !e.altKey && (e.key === "f" || e.key === "F")) {
    e.preventDefault();
    if (isSearchOpen()) closeSearch(); else openSearch();
    return;
  }
  if (e.key === "Escape" && document.body.classList.contains("zen-mode")) {
    e.preventDefault();
    setZen(false);
  } else if ((e.metaKey || e.ctrlKey) && e.key === "s") {
    e.preventDefault();
    if (dirty) saveNote();
  } else if ((e.metaKey || e.ctrlKey) && e.altKey && (e.key === "n" || e.key === "N" || e.code === "KeyN")) {
    // Cmd/Ctrl+Alt+N — browsers don't intercept this combo
    if (activeNotebookId && activeFolderId) {
      e.preventDefault();
      newNote();
    }
  } else if ((e.metaKey || e.ctrlKey) && !e.altKey && document.activeElement && document.activeElement.id === "editor") {
    const k = e.key.toLowerCase();
    if (!e.shiftKey && k === "b") { e.preventDefault(); formatMarkdown("bold"); }
    else if (!e.shiftKey && k === "i") { e.preventDefault(); formatMarkdown("italic"); }
    else if (e.shiftKey && k === "k") { e.preventDefault(); formatMarkdown("link"); }
  }
});

// ── Markdown formatting (⌘B / ⌘I / ⌘K) ────────────────────────────────────
// Toggle a single-line prefix ("> ", "- ", etc.) on the line containing the
// caret. Add it if absent, remove if present, keep caret sensible.
// Toggle a literal prefix on the current line — or on every line in the
// selection. Smart-toggle: if every non-empty selected line already starts
// with the prefix, strip; otherwise add to all.
function toggleLinePrefix(ta, prefix) {
  const v = ta.value;
  const s = ta.selectionStart;
  const e = ta.selectionEnd;
  const blockStart = v.lastIndexOf("\n", s - 1) + 1;
  const searchFrom = e > s && v[e - 1] === "\n" ? e - 1 : e;
  const nlEnd = v.indexOf("\n", searchFrom);
  const blockEnd = nlEnd < 0 ? v.length : nlEnd;
  const block = v.slice(blockStart, blockEnd);
  const lines = block.split("\n");

  const nonEmpty = lines.filter(l => l.trim());
  const allHave = nonEmpty.length > 0 && nonEmpty.every(l => l.startsWith(prefix));

  const newLines = lines.map(l => {
    if (allHave) {
      return l.startsWith(prefix) ? l.slice(prefix.length) : l;
    }
    if (!l.trim()) return l;
    return l.startsWith(prefix) ? l : prefix + l;
  });

  const newBlock = newLines.join("\n");
  ta.value = v.slice(0, blockStart) + newBlock + v.slice(blockEnd);

  if (s === e && lines.length === 1) {
    const delta = newBlock.length - block.length;
    const newCaret = Math.max(blockStart, s + delta);
    ta.selectionStart = ta.selectionEnd = newCaret;
  } else {
    ta.selectionStart = blockStart;
    ta.selectionEnd = blockStart + newBlock.length;
  }
  onEditorInput();
}

// Toggle a task-list prefix across every line in the current selection
// (or the cursor's line if there's no selection).
//   bare line                → "- [ ] " + line
//   "- " or "* " or "+ "     → replace marker with "- [ ] "
//   "- [ ] " or "- [x] " etc → strip back to bare line
// Bulk rule: if every non-empty selected line is already a task, strip;
// otherwise, add task prefixes to all lines.
function toggleTaskPrefix(ta) {
  const v = ta.value;
  const s = ta.selectionStart;
  const e = ta.selectionEnd;
  const blockStart = v.lastIndexOf("\n", s - 1) + 1;
  // If the selection ends exactly at a newline, don't pull in the next line.
  const searchFrom = e > s && v[e - 1] === "\n" ? e - 1 : e;
  const nlEnd = v.indexOf("\n", searchFrom);
  const blockEnd = nlEnd < 0 ? v.length : nlEnd;
  const block = v.slice(blockStart, blockEnd);
  const lines = block.split("\n");

  const taskRe = /^(\s*)([-*+])\s+\[[ xX]\]\s/;
  const bulletRe = /^(\s*)([-*+])\s/;

  const nonEmpty = lines.filter(l => l.trim());
  const allTasks = nonEmpty.length > 0 && nonEmpty.every(l => taskRe.test(l));

  const newLines = lines.map(l => {
    if (allTasks) {
      const m = l.match(taskRe);
      return m ? l.slice(m[0].length) : l;
    }
    if (!l.trim()) return l;
    if (taskRe.test(l)) return l;
    const bm = l.match(bulletRe);
    if (bm) return bm[1] + "- [ ] " + l.slice(bm[0].length);
    return "- [ ] " + l;
  });

  const newBlock = newLines.join("\n");
  ta.value = v.slice(0, blockStart) + newBlock + v.slice(blockEnd);

  if (s === e && lines.length === 1) {
    // Single line, no selection — preserve cursor position, adjusted by delta.
    const delta = newBlock.length - block.length;
    const newCaret = Math.max(blockStart, s + delta);
    ta.selectionStart = ta.selectionEnd = newCaret;
  } else {
    // Multi-line or actual selection — select the rewritten block.
    ta.selectionStart = blockStart;
    ta.selectionEnd = blockStart + newBlock.length;
  }
  onEditorInput();
}

// Cycle the current line through heading levels: none → # → ## → ### → none.
function cycleHeading(ta) {
  const v = ta.value;
  const s = ta.selectionStart;
  const lineStart = v.lastIndexOf("\n", s - 1) + 1;
  const nlIdx = v.indexOf("\n", s);
  const lineEnd = nlIdx < 0 ? v.length : nlIdx;
  const line = v.slice(lineStart, lineEnd);
  const m = line.match(/^(#{1,6}) /);
  let newLine, caretDelta;
  if (!m) {
    newLine = "# " + line;
    caretDelta = 2;
  } else if (m[1].length >= 3) {
    newLine = line.slice(m[0].length);
    caretDelta = -m[0].length;
  } else {
    newLine = "#".repeat(m[1].length + 1) + " " + line.slice(m[0].length);
    caretDelta = 1;
  }
  ta.value = v.slice(0, lineStart) + newLine + v.slice(lineEnd);
  const newCaret = Math.max(lineStart, s + caretDelta);
  ta.selectionStart = ta.selectionEnd = newCaret;
  onEditorInput();
}

// ── Desktop formatting strip: hover reveal + pin ─────────────────────────
// Behavior:
//   - Enter hover area → reveal immediately (unless suppressed).
//   - Leave hover area → 2s grace timer; re-enter cancels it.
//   - Timer expires → collapse.
//   - Clicking the pin button while open → close immediately AND suppress
//     hover-reveal until the pointer leaves + re-enters the area (so you
//     don't bounce back open on the same hover session).
let fmtHideTimer = null;
let fmtHoverInArea = false;
let fmtSuppressHover = false;

function fmtIsOpen() {
  return document.body.classList.contains("format-pinned")
      || document.body.classList.contains("format-hovered");
}
function fmtPinTitle() {
  const btn = document.getElementById("fmt-pin-btn");
  if (btn) btn.title = fmtIsOpen() ? "Hide formatting" : "Show formatting";
}

function fmtEnterArea() {
  fmtHoverInArea = true;
  clearTimeout(fmtHideTimer);
  if (!fmtSuppressHover) {
    document.body.classList.add("format-hovered");
    fmtPinTitle();
  }
}
function fmtLeaveArea() {
  fmtHoverInArea = false;
  fmtSuppressHover = false;  // leaving clears the click-close suppression
  if (document.body.classList.contains("format-pinned")) return;
  clearTimeout(fmtHideTimer);
  fmtHideTimer = setTimeout(() => {
    document.body.classList.remove("format-hovered");
    fmtPinTitle();
  }, 2000);
}

function fmtComputeInArea(e) {
  const tb = document.querySelector(".editor-toolbar");
  if (tb) {
    const r = tb.getBoundingClientRect();
    if (e.clientX >= r.left && e.clientX <= r.right &&
        e.clientY >= r.top && e.clientY <= r.bottom) return true;
  }
  const sc = document.querySelector(".editor-scroll");
  if (sc) {
    const r = sc.getBoundingClientRect();
    if (e.clientX >= r.left && e.clientX <= r.right &&
        e.clientY >= r.bottom - 80 && e.clientY <= r.bottom) return true;
  }
  return false;
}

function toggleFormatPin() {
  if (fmtIsOpen()) {
    // Close immediately; if the pointer is still in the reveal area,
    // suppress re-opening until the user leaves and comes back.
    document.body.classList.remove("format-pinned", "format-hovered");
    clearTimeout(fmtHideTimer);
    if (fmtHoverInArea) fmtSuppressHover = true;
    localStorage.setItem("format-pinned", "0");
  } else {
    document.body.classList.add("format-pinned");
    fmtSuppressHover = false;
    localStorage.setItem("format-pinned", "1");
  }
  fmtPinTitle();
}

function initFormatStrip() {
  if (localStorage.getItem("format-pinned") === "1") {
    document.body.classList.add("format-pinned");
  }
  fmtPinTitle();

  document.addEventListener("mousemove", (e) => {
    if (window.innerWidth <= 640) return;
    const inside = fmtComputeInArea(e);
    if (inside && !fmtHoverInArea) fmtEnterArea();
    else if (!inside && fmtHoverInArea) fmtLeaveArea();
  });
}
initFormatStrip();

// ── S3 image upload (via %storage agent) ─────────────────────────────────
// We read S3 credentials + config from the %storage agent, then sign and
// PUT each image directly to the configured bucket using AWS SigV4. The
// returned URL is inserted into the editor as a markdown image link.
// Assumptions: path-style URLs (host/bucket/key) — common for Cloudflare
// R2 / Minio / Backblaze. If a ship uses virtual-hosted style, the URL
// construction needs to be adjusted.

const S3 = {
  config: null,   // normalized { endpoint, accessKeyId, secretAccessKey, region, bucket }
  loading: null,  // in-flight promise
};

async function loadS3Config() {
  if (S3.config) return S3.config;
  if (S3.loading) return S3.loading;
  S3.loading = (async () => {
    const url = (path) => `${BASE_URL}/~/scry/storage${path}.json`;
    const fetchJson = async (path) => {
      const t0 = Date.now();
      try {
        const r = await fetch(url(path), { credentials: "include" });
        const text = await r.text();
        const dt = Date.now() - t0;
        if (!r.ok) {
          console.warn(`[notes] storage scry ${path}: HTTP ${r.status} in ${dt}ms`);
          return null;
        }
        try {
          const j = JSON.parse(text);
          // don't log the body — /credentials contains S3 secretAccessKey
          console.log(`[notes] storage scry ${path} (${dt}ms)`);
          return j;
        } catch {
          console.warn(`[notes] storage scry ${path}: non-JSON body (${dt}ms):`, text.slice(0, 200));
          return null;
        }
      } catch (e) {
        console.warn(`[notes] storage scry ${path}: fetch threw`, e);
        return null;
      }
    };
    const [credsRaw, confRaw] = await Promise.all([
      fetchJson("/credentials"),
      fetchJson("/configuration"),
    ]);
    if (!credsRaw && !confRaw) throw new Error("Couldn't reach the %storage agent. Is it installed on this ship?");
    if (!credsRaw) throw new Error("Got storage configuration but no credentials — open Landscape → Settings → Remote Storage and save the S3 credentials.");
    if (!confRaw)  throw new Error("Got storage credentials but no configuration (bucket/region) — open Landscape → Settings → Remote Storage to finish setup.");
    // %storage scries respond in an envelope:
    //   { "storage-update": { credentials: {...} } }
    //   { "storage-update": { configuration: {...} } }
    // Unwrap (accept flat shapes too for robustness).
    const creds = (credsRaw["storage-update"] && credsRaw["storage-update"].credentials)
                || credsRaw.credentials || credsRaw;
    const conf  = (confRaw["storage-update"] && confRaw["storage-update"].configuration)
                || confRaw.configuration || confRaw;
    const pick = (obj, ...keys) => {
      for (const k of keys) if (obj && obj[k] != null) return obj[k];
      return null;
    };
    const endpoint        = pick(creds, "endpoint", "s3-endpoint");
    const accessKeyId     = pick(creds, "accessKeyId", "access-key-id", "accessKey");
    const secretAccessKey = pick(creds, "secretAccessKey", "secret-access-key", "secretKey");
    const region          = pick(conf,  "region", "s3-region") || "us-east-1";
    const bucket          = pick(conf,  "currentBucket", "current-bucket")
                          || (Array.isArray(conf.buckets) && conf.buckets[0])
                          || null;
    const missing = [];
    if (!endpoint) missing.push("endpoint");
    if (!accessKeyId) missing.push("access key");
    if (!secretAccessKey) missing.push("secret key");
    if (!bucket) missing.push("bucket");
    if (missing.length) {
      throw new Error(`Storage response is missing: ${missing.join(", ")}. Open Landscape → Settings → Remote Storage to set them.`);
    }
    S3.config = { endpoint, accessKeyId, secretAccessKey, region, bucket };
    return S3.config;
  })().catch(e => { S3.loading = null; throw e; });
  const r = await S3.loading;
  if (!r) S3.loading = null;
  return r;
}

async function sha256Hex(data) {
  const bytes = typeof data === "string" ? new TextEncoder().encode(data) : data;
  const hash = new Uint8Array(await crypto.subtle.digest("SHA-256", bytes));
  return Array.from(hash).map(b => b.toString(16).padStart(2, "0")).join("");
}
async function hmacBytes(key, data) {
  const k = typeof key === "string" ? new TextEncoder().encode(key) : key;
  const d = typeof data === "string" ? new TextEncoder().encode(data) : data;
  const ck = await crypto.subtle.importKey("raw", k, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
  return new Uint8Array(await crypto.subtle.sign("HMAC", ck, d));
}
function hexBytes(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join("");
}

function sanitizeKeyPart(name) {
  return name.replace(/[^a-zA-Z0-9._-]/g, "_").slice(0, 60);
}

async function uploadToS3(file) {
  // loadS3Config throws a specific error if scries failed or fields are
  // missing — let that bubble up so the user sees what's actually wrong.
  const cfg = await loadS3Config();
  const { endpoint, accessKeyId, secretAccessKey, region, bucket } = cfg;

  // Key: notes/<timestamp>-<rand>-<sanitized-name>
  const ts = new Date().toISOString().replace(/[-:T]/g, "").slice(0, 14);
  const rand = Math.random().toString(36).slice(2, 8);
  const dot = file.name.lastIndexOf(".");
  const ext = dot > -1 ? file.name.slice(dot) : "";
  const base = sanitizeKeyPart((dot > -1 ? file.name.slice(0, dot) : file.name) || "image");
  const key = `notes/${ts}-${rand}-${base}${ext}`;

  const contentType = file.type || "application/octet-stream";
  const body = await file.arrayBuffer();
  const payloadHash = await sha256Hex(new Uint8Array(body));

  const url = new URL(endpoint);
  const host = url.host;
  const basePath = url.pathname.replace(/\/$/, "");
  const keyPath = key.split("/").map(encodeURIComponent).join("/");
  const objectPath = `${basePath}/${encodeURIComponent(bucket)}/${keyPath}`;

  const now = new Date();
  const amzDate = now.toISOString().replace(/[-:]|\.\d{3}/g, "");   // YYYYMMDDTHHMMSSZ
  const datestamp = amzDate.slice(0, 8);

  // public-read so the uploaded image is readable via its plain URL. Must
  // be a signed header (alphabetical order in both places).
  const signedHeaders = "content-type;host;x-amz-acl;x-amz-content-sha256;x-amz-date";
  const canonicalHeaders =
    `content-type:${contentType}\n` +
    `host:${host}\n` +
    `x-amz-acl:public-read\n` +
    `x-amz-content-sha256:${payloadHash}\n` +
    `x-amz-date:${amzDate}\n`;

  const canonicalRequest =
    "PUT\n" +
    objectPath + "\n" +
    "\n" +
    canonicalHeaders + "\n" +
    signedHeaders + "\n" +
    payloadHash;

  const credentialScope = `${datestamp}/${region}/s3/aws4_request`;
  const stringToSign =
    "AWS4-HMAC-SHA256\n" +
    amzDate + "\n" +
    credentialScope + "\n" +
    await sha256Hex(canonicalRequest);

  const kDate    = await hmacBytes("AWS4" + secretAccessKey, datestamp);
  const kRegion  = await hmacBytes(kDate, region);
  const kService = await hmacBytes(kRegion, "s3");
  const kSigning = await hmacBytes(kService, "aws4_request");
  const signature = hexBytes(await hmacBytes(kSigning, stringToSign));

  const authorization = `AWS4-HMAC-SHA256 Credential=${accessKeyId}/${credentialScope}, SignedHeaders=${signedHeaders}, Signature=${signature}`;
  const putUrl = `${url.protocol}//${host}${objectPath}`;

  const res = await fetch(putUrl, {
    method: "PUT",
    headers: {
      "Authorization": authorization,
      "x-amz-acl": "public-read",
      "x-amz-content-sha256": payloadHash,
      "x-amz-date": amzDate,
      "Content-Type": contentType,
    },
    body,
  });
  if (!res.ok) {
    const text = await res.text().catch(() => "");
    throw new Error(`Upload failed (${res.status}). ${text || "Check bucket CORS + credentials."}`);
  }
  return putUrl;
}

async function handleImageFiles(files) {
  if (!files || !files.length) return;
  const imgs = Array.from(files).filter(f => f && f.type && f.type.startsWith("image/"));
  if (!imgs.length) return;
  const ta = document.getElementById("editor");
  if (!ta) return;
  const save = document.getElementById("save-status");

  const urls = [];
  try {
    for (let i = 0; i < imgs.length; i++) {
      if (save) save.textContent = imgs.length === 1
        ? "Uploading image…"
        : `Uploading image ${i + 1}/${imgs.length}…`;
      const u = await uploadToS3(imgs[i]);
      urls.push({ url: u, name: imgs[i].name });
    }
  } catch (e) {
    if (save) save.textContent = "";
    alert(e && e.message ? e.message : "Image upload failed");
    return;
  }

  if (urls.length) {
    const s = ta.selectionStart, e = ta.selectionEnd;
    const v = ta.value;
    const md = urls.map(({ url, name }) => {
      const alt = (name.replace(/\.[^.]+$/, "") || "image").replace(/[\[\]]/g, "").slice(0, 80);
      return `![${alt}](${url})`;
    }).join("\n");
    ta.value = v.slice(0, s) + md + v.slice(e);
    ta.selectionStart = ta.selectionEnd = s + md.length;
    onEditorInput();
  }
  if (save) {
    save.textContent = urls.length === 1 ? "Image uploaded" : `${urls.length} images uploaded`;
    setTimeout(() => {
      if (save.textContent.includes("uploaded")) save.textContent = "";
    }, 2000);
  }
}

function pickAndUploadImages() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.multiple = true;
  input.onchange = (e) => handleImageFiles(e.target.files);
  input.click();
}

// Drag-and-drop + paste handlers on the editor textarea.
function initImageDropPaste() {
  const ta = document.getElementById("editor");
  if (!ta) return;
  ta.addEventListener("dragover", (e) => {
    if (e.dataTransfer && Array.from(e.dataTransfer.types || []).includes("Files")) {
      e.preventDefault();
    }
  });
  ta.addEventListener("drop", (e) => {
    if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) {
      const imgs = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith("image/"));
      if (imgs.length) {
        e.preventDefault();
        handleImageFiles(imgs);
      }
    }
  });
  ta.addEventListener("paste", (e) => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    const imgs = [];
    for (const item of items) {
      if (item.kind === "file" && item.type && item.type.startsWith("image/")) {
        const f = item.getAsFile();
        if (f) imgs.push(f);
      }
    }
    if (imgs.length) {
      e.preventDefault();
      handleImageFiles(imgs);
    }
  });
}
initImageDropPaste();

// If there's no selection but the caret is inside or touching a word,
// return its character bounds. Used so ⌘B / ⌘I / ⌘K can wrap the
// current word without the user having to select it first.
function currentWordBounds(ta) {
  const v = ta.value;
  const caret = ta.selectionStart;
  const isWord = (c) => !!c && /[\p{L}\p{N}_'\-]/u.test(c);
  let start = caret, end = caret;
  while (start > 0 && isWord(v[start - 1])) start--;
  while (end < v.length && isWord(v[end])) end++;
  return start === end ? null : { start, end };
}

function formatMarkdown(kind) {
  const ta = document.getElementById("editor");
  if (!ta) return;
  if (kind === "heading") { cycleHeading(ta); return; }
  if (kind === "quote")   { toggleLinePrefix(ta, "> "); return; }
  if (kind === "list")    { toggleLinePrefix(ta, "- "); return; }
  if (kind === "task")    { toggleTaskPrefix(ta); return; }
  const v = ta.value;
  let s = ta.selectionStart, e = ta.selectionEnd;
  let sel = v.slice(s, e);
  // No selection → expand to the word the caret is touching, if any.
  if (!sel) {
    const w = currentWordBounds(ta);
    if (w) { s = w.start; e = w.end; sel = v.slice(s, e); }
  }

  if (kind === "link") {
    // If selection looks like a URL, use it as the href; otherwise use selection as text.
    const isUrl = sel && /^(https?:\/\/|mailto:|\/)/i.test(sel.trim());
    let inserted, caretStart, caretEnd;
    if (isUrl) {
      inserted = `[](${sel.trim()})`;
      caretStart = caretEnd = s + 1;          // cursor between brackets to type link text
    } else if (sel) {
      inserted = `[${sel}](url)`;
      caretStart = s + 1 + sel.length + 2;    // select the "url" placeholder
      caretEnd = caretStart + 3;
    } else {
      inserted = `[](url)`;
      caretStart = s + 1;                     // cursor between brackets
      caretEnd = caretStart;
    }
    ta.value = v.slice(0, s) + inserted + v.slice(e);
    ta.selectionStart = caretStart;
    ta.selectionEnd = caretEnd;
  } else {
    const marker = kind === "bold" ? "**" : "*";
    const placeholder = kind === "bold" ? "bold text" : "italic text";
    // Toggle off: selection is already wrapped by marker characters adjacent to it
    const before = v.slice(Math.max(0, s - marker.length), s);
    const after = v.slice(e, e + marker.length);
    if (sel && before === marker && after === marker) {
      ta.value = v.slice(0, s - marker.length) + sel + v.slice(e + marker.length);
      ta.selectionStart = s - marker.length;
      ta.selectionEnd = e - marker.length;
    } else {
      const body = sel || placeholder;
      ta.value = v.slice(0, s) + marker + body + marker + v.slice(e);
      if (sel) {
        ta.selectionStart = s + marker.length;
        ta.selectionEnd = s + marker.length + body.length;
      } else {
        // No selection: select the placeholder so the user can overwrite it
        ta.selectionStart = s + marker.length;
        ta.selectionEnd = s + marker.length + body.length;
      }
    }
  }
  onEditorInput();
}

// ── Mobile Navigation ────────────────────────────────────────────────────
function isMobile() { return window.innerWidth <= 640; }

function mobileSetView(view) {
  document.querySelector(".layout").setAttribute("data-view", view);
}

function mobileBack(to) {
  // In-app back button: deselect the corresponding level AND push a new URL
  // so browser back/forward + refresh stay in sync with the visible view.
  if (to === "notebooks") {
    activeNoteId = null;
    activeFolderId = null;
    activeNotebookId = null;
    activeNotebookFlag = null;
    clearEditor();
    renderNotebooks();

    mobileSetView("notebooks");

    clearEditor();
