<script>
// ── Initial view (synchronous) ────────────────────────────────────────────
// Set data-view from the URL before first paint so mobile doesn't flash the
// wrong slide-panel. On desktop this attribute is ignored.
(function () {
  const m = location.pathname.match(/^\/notes\/nb\/([^/]+)\/([^/]+)(?:\/f\/\d+)?(?:\/n\/(\d+))?\/?$/);
  const layout = document.querySelector(".layout");
  if (!layout) return;
  if (m && m[3]) layout.setAttribute("data-view", "editor");
  else if (m) layout.setAttribute("data-view", "notes");
  else layout.setAttribute("data-view", "notebooks");
})();

// ── State ──────────────────────────────────────────────────────────────────
let BASE_URL = "";
let SHIP = "";
// Eyre channel id: initialized eagerly so tests (and fast user clicks)
// that fire a poke before connect()'s openChannel() runs don't PUT to
// /~/channel/ (empty id) and get a 400. The channel comes into being
// on the first PUT — picking the id here is just a name we'll use.
let channelId = `notes-ui-${Date.now()}`;
let eventSource = null;
let sseState = "connected";  // "connected" | "reconnecting"
let landscapeTheme = null;   // "light" | "dark" | null (unknown/auto)
let msgId = 1;

let notebooks = {};   // id -> notebook
let folders = {};     // id -> folder (for the active notebook)
let notes = {};       // id -> note (for the active notebook)
// Per-notebook caches — lets us render immediately on notebook switch even
// when the fresh scry fails (offline/reconnecting). Populated on successful
// load and on switcher-index builds.
let foldersByNb = {}; // notebookFlag -> { folderId -> folder }
let notesByNb = {};   // notebookFlag -> { noteId -> note }
let publishedIds = new Set();  // set of published note IDs
let pendingInvites = {};       // "~host/name" -> { from, sentAt }

let activeNotebookId = null;   // numeric id
let activeNotebookFlag = null; // "~ship/name" for scry paths
let activeFolderId = null;
let activeNoteId = null;

// Revision history viewer state. `historyEntries` is the latest fetched
// list (newest-first). `historyViewing` is the entry currently loaded into
// the editor in read-only mode, or null when viewing the live note.
let historyEntries = [];
let historyViewing = null;

// Auto-save debounce. Long enough that we don't fire a save on every
// keystroke pause — short enough that an idle moment lands work to the
// server. Combined with the visibilitychange/pagehide flush below,
// users don't lose work when they background the tab or close it.
const AUTOSAVE_DEBOUNCE_MS = 10000;
let dirty = false;
let savedRevision = 0;

// ── Connect ────────────────────────────────────────────────────────────────
async function connect() {
  const url = document.getElementById("ship-url-input").value.trim().replace(/\/$/, "");
  const code = document.getElementById("auth-input").value.trim();
  const errEl = document.getElementById("connect-error");
  const panel = document.getElementById("connect-panel");
  errEl.textContent = "";

  function fail(msg) { errEl.textContent = msg; panel.style.display = ""; }

  if (!url) { fail("Enter a URL"); return; }
  BASE_URL = url;

  // Optionally authenticate with +code
  if (code) {
    try {
      const params = new URLSearchParams({ password: code });
      const r = await fetch(`${BASE_URL}/~/login`, {
        method: "POST", credentials: "include",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params.toString()
      });
      if (!r.ok && r.status !== 204) throw new Error(`Login failed: ${r.status}`);
    } catch(e) {
      fail(e.message); return;
    }
  }

  // Get ship name
  try {
    const r = await fetch(`${BASE_URL}/~/scry/notes/v0/notebooks.json`, { credentials: "include" });
    if (r.status === 403) { fail("Auth failed — check your +code"); return; }
    if (!r.ok && r.status !== 404) { fail(`Cannot reach ship: ${r.status}`); return; }
  } catch(e) { fail(`Cannot reach ship: ${e.message}`); return; }

  // Get own ship name
  try {
    const r = await fetch(`${BASE_URL}/~/name`, { credentials: "include" });
    if (r.ok) SHIP = (await r.text()).trim();
  } catch(e) {}

  document.getElementById("connect-panel").style.display = "none";
  setConnectionState("connected");

  // Test harness probe: e2e fixtures wait on this to know SHIP is populated
  // before issuing any pokes. Returns truthy after /~/name resolves; before
  // that, SHIP is empty and pokes would carry ship:"" → 400 from Eyre.
  window.__notesGetShip = () => SHIP;

  openChannel();

  // loadNotebooks, loadPublished, loadInvites are independent scries — fire
  // them in parallel to shave roundtrips off the bootstrap.
  await Promise.all([loadNotebooks(), loadPublished(), loadInvites(), checkMcpProxy()]);
  // Await subscribeInbox so the SSE listener (started inside it after the
  // first PUT brings the channel into existence) is live before the user
  // can issue any pokeAction. Otherwise pokeAction's await for poke-ack
  // hangs until the 15s timeout.
  await subscribeInbox();
  // Embed mode pins the UI to a specific notebook from the URL; this takes
  // precedence over both the route and any restored localStorage selection.
  const embedApplied = await applyEmbedNotebook();
  const applied = embedApplied || (await applyRoute());
  // Only fall back to localStorage on desktop — on mobile each "screen" should
  // correspond to a URL, and opening a bare /notes/ URL means start fresh.
  if (!applied && !isMobile()) {
    await restoreSelection();
    replaceRoute();
  }
  // Re-enable slide transitions now that the initial view is settled.
  requestAnimationFrame(() => {
    requestAnimationFrame(() => document.body.classList.remove("loading"));
  });
  maybeShowDisclaimer();
}

function saveSelection() {
  localStorage.setItem('notes-selection', JSON.stringify({
    notebookFlag: activeNotebookFlag,
    folderId: activeFolderId,
    noteId: activeNoteId,
  }));
}

async function restoreSelection() {
  try {
    const saved = JSON.parse(localStorage.getItem('notes-selection') || '{}');
    if (saved.notebookFlag && notebooks[saved.notebookFlag]) {
      await selectNotebook(saved.notebookFlag);
      if (saved.folderId && folders[saved.folderId]) {
        activeFolderId = saved.folderId;
        renderItems();
      }
      if (saved.noteId && notes[saved.noteId]) {
        await selectNote(saved.noteId);
      }
    }
  } catch {}
}

// ── Routing ──────────────────────────────────────────────────────────────
// URL scheme: /notes/nb/<host>/<flagName>[/f/<folderId>][/n/<noteId>]
let applyingRoute = false;

function buildRoute() {
  if (!activeNotebookFlag) return "/notes/";
  const nb = notebooks[activeNotebookFlag];
  if (!nb) return "/notes/";
  let path = `/notes/nb/${nb.host}/${encodeURIComponent(nb.flagName)}`;
  const rootId = rootFolderId();
  if (activeFolderId && activeFolderId !== rootId) path += `/f/${activeFolderId}`;
  if (activeNoteId) path += `/n/${activeNoteId}`;
  return path;
}

function pushRoute() {
  if (applyingRoute) return;
  const url = buildRoute();
  if (window.location.pathname === url) return;
  try { history.pushState({}, "", url); } catch(_) {}
}

function replaceRoute() {
  const url = buildRoute();
  if (window.location.pathname === url) return;
  try { history.replaceState({}, "", url); } catch(_) {}
}

async function applyRoute() {
  const path = window.location.pathname;
  const m = path.match(/^\/notes\/nb\/([^/]+)\/([^/]+)(?:\/f\/(\d+))?(?:\/n\/(\d+))?\/?$/);
  if (!m) return false;
  const host = decodeURIComponent(m[1]);
  const flagName = decodeURIComponent(m[2]);
  const fid = m[3] ? parseInt(m[3], 10) : null;
  const nid = m[4] ? parseInt(m[4], 10) : null;

  const flag = `${host}/${flagName}`;
  const nb = await ensureJoinedToFlag(flag);
  if (!nb) return false;

  applyingRoute = true;
  try {
    if (activeNotebookFlag !== nb.flag) await selectNotebook(nb.flag);
    // selectNotebook fires loadFolders/loadNotes WITHOUT awaiting (so
    // ordinary navigation paints from cache instantly). On a cold refresh
    // into a deep link there's no cache, so the folders[]/notes[] lookups
    // below would fall through to root and skip selectNote. Wait for the
    // fresh data before making routing decisions.
    await Promise.all([loadFolders(), loadNotes()]);
    // Folder: URL value or implicit root
    const targetFolder = fid && folders[fid] ? fid : rootFolderId();
    if (targetFolder && activeFolderId !== targetFolder) {
      await navigateToFolder(targetFolder);
    }
    // Note: URL specifies one or deselect
    if (nid && notes[nid]) {
      if (activeNoteId !== nid) await selectNote(nid);
    } else if (activeNoteId) {
      activeNoteId = null;
      clearEditor();
      renderItems();
    }
    // Drive the mobile slide-panel view from the URL
    if (isMobile()) mobileSetView(nid ? "editor" : "notes");
  } finally {
    applyingRoute = false;
  }
  return true;
}

function clearSelection() {
  activeNotebookId = null;
  activeNotebookFlag = null;
  activeFolderId = null;
  activeNoteId = null;
  clearEditor();
  renderNotebooks();
  renderItems();
  if (isMobile()) mobileSetView("notebooks");
}

// When ?notebook=~ship/name is in the URL, lock the UI to that notebook.
// If the notebook isn't joined yet, prompt the user to join via the same
// shared-join dialog used for any /notes/nb/<host>/<name> URL.
async function applyEmbedNotebook() {
  const flag = EMBED_PARAMS.notebookFlag;
  if (!flag || !flag.includes("/")) return false;
  const nb = await ensureJoinedToFlag(flag);
  if (!nb) return false;
  applyingRoute = true;
  try {
    if (activeNotebookFlag !== nb.flag) await selectNotebook(nb.flag);
    if (isMobile()) mobileSetView("notes");
  } finally {
    applyingRoute = false;
  }
  return true;
}

// ── Shared-notebook join flow ────────────────────────────────────────────
// Used by both the URL router and the embed mode entry. If the notebook
// at `flag` is already in our cache, return it. Otherwise, ask the user
// via a modal whether to join, then fire join-remote and poll for the
// notebook to land in our cache. Returns the notebook record or null.
let pendingShareFlag = null;
let pendingShareResolve = null;

async function ensureJoinedToFlag(flag) {
  if (!flag || !flag.includes("/")) return null;
  // Fast path: in-memory notebooks cache.
  if (notebooks[flag]) return notebooks[flag];
  // Cache miss can mean (a) we genuinely don't have the notebook, or
  // (b) the cache hasn't populated yet — most commonly a fresh page
  // load where the route resolves before, or in spite of, the bootstrap
  // loadNotebooks. Confirm via a direct scry of just this flag before
  // showing the join modal — agent returns the notebook object if we
  // can view it (i.e. we're a member), or JSON null otherwise.
  const found = await scry(`/v0/notebook/${flag}`);
  if (found && found.notebook) {
    // We DO have it. Refresh the full list so the rest of the UI sees it,
    // but trust the specific-notebook scry as authoritative — synthesize
    // the cache entry directly even if the list refresh fails or misses
    // it (which we've seen on cold-load races, especially in embed mode).
    await loadNotebooks();
    if (notebooks[flag]) return notebooks[flag];
    const nb = found.notebook;
    nb.host = found.host;
    nb.flagName = found.flagName;
    nb.flag = `${found.host}/${found.flagName}`;
    nb.visibility = found.visibility || 'private';
    notebooks[nb.flag] = nb;
    return nb;
  }
  // Truly not joined; prompt to join.
  const wantJoin = await promptJoinShared(flag);
  if (!wantJoin) return null;
  return joinRemoteAndWait(flag);
}

function promptJoinShared(flag) {
  return new Promise((resolve) => {
    pendingShareFlag = flag;
    pendingShareResolve = resolve;
    openModal("join-shared");
  });
}
function confirmSharedJoin() {
  document.getElementById("modal-backdrop").classList.remove("open");
  if (pendingShareResolve) { pendingShareResolve(true); pendingShareResolve = null; }
}
function declineSharedJoin() {
  document.getElementById("modal-backdrop").classList.remove("open");
  if (pendingShareResolve) { pendingShareResolve(false); pendingShareResolve = null; }
}

async function joinRemoteAndWait(flag) {
  const parts = flag.split("/");
  const ship = parts[0].startsWith("~") ? parts[0] : "~" + parts[0];
  const name = parts.slice(1).join("/");
  try {
    await pokeTopLevel({ type: "join", ship, name });
  } catch (e) {
    return null;
  }
  // join-remote propagates asynchronously; give the host a few seconds.
  for (let i = 0; i < 8; i++) {
    await new Promise((r) => setTimeout(r, 750));
    await loadNotebooks();
    const nb = Object.values(notebooks).find(n => n.flag === flag);
    if (nb) return nb;
  }
  return null;
}

window.addEventListener("popstate", async () => {
  const applied = await applyRoute();
  if (!applied) {
    applyingRoute = true;
    try { clearSelection(); } finally { applyingRoute = false; }
  }
});

// ── Eyre Channel ──────────────────────────────────────────────────────────
function openChannel() {
  channelId = `notes-ui-${Date.now()}`;
}

let activeSubscriptionId = null;

async function subscribeEvents() {
  if (!activeNotebookFlag) return;
  // Unsubscribe from previous notebook if any
  if (activeSubscriptionId !== null) {
    await poke([{
      id: msgId++, action: "unsubscribe",
      subscription: activeSubscriptionId
    }]);
    activeSubscriptionId = null;
  }
  // Subscribe to this notebook's stream
  const subId = msgId++;
  activeSubscriptionId = subId;
  await poke([{
    id: subId, action: "subscribe",
    ship: SHIP.replace("~",""),
    app: "notes", path: `/v0/notes/${activeNotebookFlag}/stream`
  }]);
  // Start SSE after the channel is created by the PUT
  startSSE();
}

function startSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource(`${BASE_URL}/~/channel/${channelId}`, { withCredentials: true });
  eventSource.onmessage = (e) => {
    // E2E tracing: log every raw SSE message so failures show the full
    // timeline. Gated by localStorage so prod users don't get spam.
    try {
      if (localStorage.getItem("e2e-log-sse") === "1") {
        console.log("[sse]", e.data);
      }
    } catch {}
    try {
      const msg = JSON.parse(e.data);
      handleEvent(msg);
    } catch {}
  };
  eventSource.onerror = () => { setConnectionState("reconnecting"); };
  eventSource.onopen = () => { setConnectionState("connected"); };
}

async function poke(actions) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 8000);
  try {
    await fetch(`${BASE_URL}/~/channel/${channelId}`, {
      method: "PUT",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(actions),
      signal: ctrl.signal
    });
  } finally {
    clearTimeout(timer);
  }
}

// ── Nested ACUR poke helpers ──────────────────────────────────────────────
// pokeAction is the underlying primitive; it threads the action through
// poke-ack tracking (so callers like autoSave see real server failures
// instead of silent eyre-PUT-only success). The nested helpers build the
// ACUR envelope on top: top-level verbs go through pokeTopLevel as-is;
// notebook-scoped go via { type: "notebook", flag, action: inner }; folder
// and note actions wrap a 3rd nesting level.
//
// Usage:
//   pokeTopLevel({ type: "create-notebook", title })
//   pokeNotebook({ type: "rename", title })
//   pokeFolderAction(folderId, { type: "rename", name })
//   pokeNoteAction(noteId, { type: "update", body, expectedRevision })

// generateRequestId: random @uv-formatted id for the v1 HTTP api.
// 96 bits of entropy → base32 (Hoon's @uv alphabet) with dot separators
// every 5 chars from the right (canonical form slav %uv expects).
function generateRequestId() {
  const bytes = new Uint8Array(12);
  crypto.getRandomValues(bytes);
  let n = 0n;
  for (const b of bytes) n = (n << 8n) | BigInt(b);
  const raw = n.toString(32);
  let out = "";
  for (let i = 0; i < raw.length; i++) {
    if (i > 0 && (raw.length - i) % 5 === 0) out += ".";
    out += raw[i];
  }
  return "0v" + out;
}

// pokeAction: send an a-notes action through the v1 HTTP API.
// POST /notes/~/v1 with { requestId, action }; the agent holds the
// request open until either (a) the host's response-update arrives and
// is forwarded back as a typed response, or (b) the per-request 20s
// timeout fires and a %pending body is returned. We treat %ok /
// %no-change / %pending as success — the broadcast SSE stream syncs
// local state regardless of which terminal body we get.
//
// %error bodies throw with the typed errorType so callers (auto-save
// conflict banner, etc.) can switch on the failure mode.
async function pokeAction(action) {
  const rid = generateRequestId();
  let resp;
  try {
    resp = await fetch(`${BASE_URL}/notes/~/v1`, {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ requestId: rid, action }),
    });
  } catch (e) {
    throw new Error(`network: ${e.message || e}`);
  }
  if (!resp.ok) {
    const txt = await resp.text().catch(() => "");
    throw new Error(`HTTP ${resp.status}${txt ? `: ${txt}` : ""}`);
  }
  let json;
  try {
    json = await resp.json();
  } catch {
    throw new Error("malformed response");
  }
  const body = json && json.body;
  if (!body || !body.type) throw new Error("malformed response body");
  if (body.type === "error") {
    const err = new Error(body.errorType || "error");
    err.errorType = body.errorType;
    err.requestId = rid;
    throw err;
  }
  // ok | no-change | pending — broadcast stream will sync state
  return body;
}

async function pokeTopLevel(action) {
  return pokeAction(action);
}

async function pokeNotebook(nbAction) {
  if (!activeNotebookFlag) return;
  return pokeAction({ type: "notebook", flag: activeNotebookFlag, action: nbAction });
}

async function pokeFolderAction(folderId, folderAction) {
  return pokeNotebook({ type: "folder", id: folderId, action: folderAction });
}

async function pokeNoteAction(noteId, noteAction) {
  return pokeNotebook({ type: "note", id: noteId, action: noteAction });
}

async function scry(path) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 6000);
  try {
    const r = await fetch(`${BASE_URL}/~/scry/notes${path}.json`, {
      credentials: "include", signal: ctrl.signal
    });
    if (!r.ok) return null;
    return await r.json();
  } catch (_) {
    // Network error, abort, or bad JSON — treat as "no fresh data" so the
    // caller can fall back to cache instead of propagating the rejection.
    return null;
  } finally {
    clearTimeout(timer);
  }
}

// ── Event Handling ────────────────────────────────────────────────────────
// Handles both the new nested r-notes shape and the /v0/inbox/stream events.
//
// r-notes shapes (from /stream subscription):
//   %snapshot → { type: "snapshot", host, flagName, visibility }
//   %update   → { type: "update", host, flagName, time, update: u-notebook-json }
//
// u-notebook-json types:
//   notebook-created, notebook-updated, notebook-deleted,
//   notebook-visibility-changed, member-joined, member-left,
//   invite-received, invite-removed,
//   folder-update → { type: "folder-update", folderUpdate: { type: "folder-{created|updated|deleted}", ... } }
//   note-update   → { type: "note-update",   noteUpdate:   { type: "note-{created|updated|deleted|published|unpublished|history-archived}", ... } }

function applyNotebookUpdate(u) {
  const type = u.type;
  if (!type) return;
  if (type === "notebook-created" || type === "notebook-updated" || type === "notebook-visibility-changed") {
    loadNotebooks();
  } else if (type === "notebook-deleted") {
    // notebookId is now not directly in the update; reload sidebar
    loadNotebooks();
  } else if (type === "member-joined" || type === "member-left") {
    // membership changed — nothing to reload in UI unless we have a members panel open
  } else if (type === "invite-received" || type === "invite-removed" || type === "notebooks-changed") {
    applyInboxEvent(u);
  } else if (type === "folder-update") {
    applyFolderUpdate(u.folderUpdate);
  } else if (type === "note-update") {
    applyNoteUpdate(u.noteUpdate);
  }
}

function applyFolderUpdate(fu) {
  if (!fu) return;
  loadFolders();
}

// Resolves to the new note's id when a note-created event arrives whose
// note.folderId matches and whose id exceeds any id seen pre-poke. Used to
// avoid the "select highest-id note" race after newNote / triggerAutoCreate
// (especially on subscribers, where the host's echo may take >300ms).
const pendingNoteCreates = [];
function notifyNoteCreated(note) {
  if (!note) return;
  for (let i = pendingNoteCreates.length - 1; i >= 0; i--) {
    const p = pendingNoteCreates[i];
    if (note.folderId === p.folderId && note.id > p.minId) {
      pendingNoteCreates.splice(i, 1);
      clearTimeout(p.timer);
      p.resolve(note);
    }
  }
}
function awaitNoteCreate(folderId, timeoutMs = 8000) {
  const ids = Object.values(notes)
    .filter(n => n.folderId === folderId)
    .map(n => n.id);
  const minId = ids.length ? Math.max(...ids) : 0;
  return new Promise((resolve, reject) => {
    const entry = { folderId, minId, resolve, reject, timer: null };
    entry.timer = setTimeout(() => {
      const idx = pendingNoteCreates.indexOf(entry);
      if (idx >= 0) pendingNoteCreates.splice(idx, 1);
      reject(new Error("note-create timeout"));
    }, timeoutMs);
    pendingNoteCreates.push(entry);
  });
}

function applyNoteUpdate(nu) {
  if (!nu) return;
  const type = nu.type;
  if (type === "note-history-archived") {
    // nu.revision is the archived note-revision object (from u-note %history-archived)
    if (nu.revision) applyArchivedRevision({ revision: nu.revision, noteId: nu.id });
    return;
  }
  if (type === "note-created" && nu.note) {
    notifyNoteCreated(nu.note);
  }
  loadNotes();
  if (type === "note-updated" && nu.id === activeNoteId) {
    const noteData = nu.note;
    if (noteData && !isOwnSaveEcho({ updatedBy: noteData.updatedBy, revision: noteData.revision })) {
      if (dirty) showConflictBanner("Remote changes detected while you were editing.");
      else loadNote(activeNoteId);
    }
  }
}

function handleEvent(msg) {
  if (!msg.json) return;
  const data = msg.json;
  // E2E tracing: when localStorage.e2e-log-sse is "1", log every parsed
  // SSE payload so the test harness can pipe it through page.on('console').
  try {
    if (localStorage.getItem("e2e-log-sse") === "1") {
      console.log("[sse]", JSON.stringify(data));
    }
  } catch {}

  // New nested r-notes envelope
  if (data.type === "snapshot") {
    loadNotebooks();
    return;
  }
  if (data.type === "update") {
    const u = data.update;
    applyNotebookUpdate(u);
    return;
  }

  // Inbox events arrive with their own type directly (not wrapped in r-notes)
  if (data.type === "invite-received" || data.type === "invite-removed" || data.type === "notebooks-changed") {
    applyInboxEvent(data);
    return;
  }

  // Legacy response envelope fallback (old r-notes shape)
  if (data.response === "snapshot") {
    loadNotebooks();
    return;
  }
  if (data.response === "update") {
    const evt = data.update;
    const type = evt?.type;
    if (type === "invite-received" || type === "invite-removed" || type === "notebooks-changed") {
      applyInboxEvent(evt);
      return;
    }
    if (type === "notebook-created" || type === "notebook-renamed" || type === "notebook-visibility-changed") loadNotebooks();
    else if (type === "notebook-deleted") loadNotebooks();
    else if (type?.startsWith("folder-")) loadFolders();
    else if (type === "note-revision-archived") applyArchivedRevision(evt);
    else if (type?.startsWith("note-")) {
      loadNotes();
      if (type === "note-updated" && evt.noteId === activeNoteId && !isOwnSaveEcho(evt)) {
        if (dirty) showConflictBanner("Remote changes detected while you were editing.");
        else loadNote(activeNoteId);
      }
    }
    return;
  }

  // Bare event fallback
  const type = data.type;
  if (type === "notebook-created" || type === "notebook-renamed" || type === "notebook-visibility-changed") loadNotebooks();
  else if (type === "notebook-deleted") loadNotebooks();
  else if (type?.startsWith("folder-")) loadFolders();
  else if (type === "note-revision-archived") applyArchivedRevision(data);
  else if (type?.startsWith("note-")) {
    loadNotes();
    if (type === "note-updated" && data.noteId === activeNoteId && !isOwnSaveEcho(data)) {
      if (dirty) showConflictBanner("Remote changes detected while you were editing.");
      else loadNote(activeNoteId);
    }
  }
}

function handleNotebookDeleted(nid) {
  // If the deleted notebook is currently active, clear the view
  if (activeNotebookId === nid) {
    activeNotebookId = null;
    activeNotebookFlag = null;
    activeFolderId = null;
    activeNoteId = null;
    clearEditor();
    pushRoute();
  }
  loadNotebooks();
}

// ── Load Data ─────────────────────────────────────────────────────────────
// Compound key "~host/flagName|noteId" so publish state is scoped per-notebook
function pubKey(flag, noteId) { return `${flag}|${noteId}`; }
function pubUrl(flag, noteId) { return `${BASE_URL}/notes/pub/${flag}/${noteId}`; }

async function loadPublished() {
  const data = await scry("/v0/published");
  if (!data) return;  // preserve cache if scry failed
  publishedIds = new Set();
  (data || []).forEach(item => {
    const flag = `${item.host}/${item.flagName}`;
    publishedIds.add(pubKey(flag, item.noteId));
  });
}

// ── Invite inbox ─────────────────────────────────────────────────────────
async function loadInvites() {
  const data = await scry("/v0/invites");
  if (!data) return;
  pendingInvites = {};
  (data || []).forEach(item => {
    const flag = `${item.host}/${item.flagName}`;
    pendingInvites[flag] = { from: item.from, sentAt: item.sentAt, title: item.title || "" };
  });
  renderInvites();
}

// MCP-proxy detection. The "Connect to MCP" sidebar button only renders
// when %mcp-proxy is running on this ship. On bootstrap we also do a
// one-shot check of /apps/mcp/api/servers — if %notes is already
// registered with a cached spec, the button switches to a muted-green
// "MCP connected" so the user sees status at a glance instead of having
// to click to find out. (Clicking still works to re-register.)
let mcpProxyInstalled = false;
async function checkMcpProxy() {
  const data = await scry("/v0/mcp-status");
  mcpProxyInstalled = !!(data && data.installed);
  const btn = document.getElementById("connect-mcp-btn");
  if (!btn) return;
  if (!mcpProxyInstalled) {
    btn.style.display = "none";
    return;
  }
  btn.style.display = "";
  // One-shot probe (no polling): if already registered, show connected
  // state immediately. If not, leave the default "Connect to MCP" label.
  const status = await verifyMcpRegistration(1);
  setMcpButtonConnected(status.ok);
}

// Flip the sidebar button between "Connect to MCP" and the muted-green
// "MCP connected" state. Idempotent; safe to call multiple times.
function setMcpButtonConnected(isConnected) {
  const btn = document.getElementById("connect-mcp-btn");
  const label = document.getElementById("connect-mcp-label");
  if (!btn || !label) return;
  if (isConnected) {
    btn.classList.add("connected");
    label.textContent = "MCP connected";
    btn.title = "Notes is registered with %mcp-proxy. Click to re-register.";
  } else {
    btn.classList.remove("connected");
    label.textContent = "Connect to MCP";
    btn.title = "Register %notes with the local %mcp-proxy so MCP clients can call its tools";
  }
}

// Registers %notes with the local %mcp-proxy as an openapi upstream so
// MCP-aware bots can call its tools. baseUrl is auto-derived from the
// browser's origin so a user loading the UI from `https://my.ship:8443`
// gets that same scheme/host wired into the proxy registration.
async function connectMcp() {
  const baseUrl = window.location.origin;
  try {
    await pokeAction({ type: "register-mcp", baseUrl });
    const status = await verifyMcpRegistration();
    setMcpButtonConnected(status.ok);
    if (status.ok) {
      alert(`Notes is now connected to MCP-proxy at ${baseUrl}.\n\nTools are live and discoverable by any MCP client pointed at this ship.`);
    } else if (status.entry) {
      alert(`Registered with MCP-proxy at ${baseUrl}, but the OpenAPI spec hasn't been cached yet. Try again in a moment, or check %mcp-proxy in dojo.`);
    } else {
      alert(`Registration poke fired, but MCP-proxy's /apps/mcp/api/servers didn't list %notes back. The proxy may have nacked the registration — check dojo.`);
    }
  } catch (e) {
    alert(`Connect to MCP failed: ${e?.message || e}`);
  }
}

// Poll mcp-proxy's /apps/mcp/api/servers endpoint to confirm the
// registration landed. After a successful %add-server the entry shows
// up immediately, but `hasCachedSpec` only flips true once the proxy's
// async Iris fetch of /notes/openapi.json completes — so we poll for a
// few seconds before deciding. Pass maxTries=1 for a quiet on-load
// probe; default 6 (≈ 2.5s of retries) for the click flow.
async function verifyMcpRegistration(maxTries = 6) {
  for (let i = 0; i < maxTries; i++) {
    if (i > 0) await new Promise(r => setTimeout(r, 500));
    try {
      const r = await fetch(`${BASE_URL}/apps/mcp/api/servers`, { credentials: "include" });
      if (!r.ok) continue;
      const data = await r.json();
      const entry = (data?.servers || []).find(s => s.id === "notes");
      if (entry?.hasCachedSpec) return { ok: true, entry };
      if (i === maxTries - 1) return { ok: false, entry: entry || null };
    } catch (_) {
      // network blip — try again
    }
  }
  return { ok: false, entry: null };
}

// SSE subscription on /v0/inbox/stream — receives invite-received and
// invite-removed events as the host sends/cancels invites in real time.
async function subscribeInbox() {
  if (!SHIP) return;
  await poke([{
    id: msgId++, action: "subscribe",
    ship: SHIP.replace("~", ""),
    app: "notes", path: "/v0/inbox/stream"
  }]);
  // The PUT just brought the channel into existence server-side. Start
  // the SSE listener now so subsequent pokeAction calls can receive
  // their poke-acks (subscribeEvents on notebook-select can no-op the
  // start since SSE is already live).
  startSSE();
}

function applyInboxEvent(evt) {
  if (!evt || !evt.type) return;
  if (evt.type === "notebooks-changed") {
    loadNotebooks();
    return;
  }
  const flag = `${evt.host}/${evt.flagName}`;
  if (evt.type === "invite-received") {
    pendingInvites[flag] = { from: evt.from, sentAt: evt.sentAt, title: evt.title || "" };
    renderInvites();
  } else if (evt.type === "invite-removed") {
    delete pendingInvites[flag];
    renderInvites();
  }
}

async function acceptInvite(flag) {
  const parts = flag.split("/");
  const ship = parts[0].startsWith("~") ? parts[0] : "~" + parts[0];
  const name = parts.slice(1).join("/");
  await pokeTopLevel({ type: "accept-invite", ship, name });
  // The agent will emit a notebooks-changed fact on /v0/inbox/stream once
  // the host's snapshot lands, which triggers loadNotebooks. Belt-and-
  // suspenders: also fall back to a single delayed reload in case the SSE
  // subscription dropped a beat.
  setTimeout(() => loadNotebooks(), 2500);
}

async function declineInvite(flag) {
  const parts = flag.split("/");
  const ship = parts[0].startsWith("~") ? parts[0] : "~" + parts[0];
  const name = parts.slice(1).join("/");
  await pokeTopLevel({ type: "decline-invite", ship, name });
}

function renderInvites() {
  const section = document.getElementById("invites-section");
  const list = document.getElementById("invites-list");
  if (!section || !list) return;
  const entries = Object.entries(pendingInvites);
  if (entries.length === 0) {
    section.style.display = "none";
    list.innerHTML = "";
    return;
  }
  section.style.display = "";
  list.innerHTML = entries.map(([flag, info]) => `
    <div class="invite-item">
      <div class="invite-title">${esc(info.title || flag)}</div>
      <div class="invite-from">from ${esc(info.from)}</div>
      <div class="invite-actions">
        <button class="btn btn-secondary" data-flag="${esc(flag)}" data-action="decline">Decline</button>
        <button class="btn btn-primary"   data-flag="${esc(flag)}" data-action="accept">Accept</button>
      </div>
    </div>
  `).join("");
  list.querySelectorAll("button[data-flag]").forEach(btn => {
    btn.onclick = (e) => {
      const f = btn.dataset.flag;
      if (btn.dataset.action === "accept") acceptInvite(f);
      else declineInvite(f);
    };
  });
}

async function loadNotebooks() {
  const data = await scry("/v0/notebooks");
  if (!data) return;
  notebooks = {};
  (data || []).forEach(entry => {
    const nb = entry.notebook;
    nb.host = entry.host;
    nb.flagName = entry.flagName;
    nb.flag = `${entry.host}/${entry.flagName}`;
    nb.visibility = entry.visibility || 'private';
    notebooks[nb.flag] = nb;
  });
  renderNotebooks();
  updateHeader();
}

async function loadFolders() {
  if (!activeNotebookFlag) return;
  const data = await scry(`/v0/folders/${activeNotebookFlag}`);
  // Only replace the cache when we got fresh data — otherwise preserve what
  // we already have so offline/reconnecting users can still walk around.
  if (data) {
    folders = {};
    (data || []).forEach(f => folders[f.id] = f);
    foldersByNb[activeNotebookFlag] = { ...folders };
  }
  if (!activeFolderId || !folders[activeFolderId]) {
    const rootFolder = Object.values(folders).find(f => f.name === "/");
    activeFolderId = rootFolder ? rootFolder.id : null;
  }
  renderItems();
}

async function loadNotes() {
  if (!activeNotebookFlag) return;
  const data = await scry(`/v0/notes/${activeNotebookFlag}`);
  if (data) {
    notes = {};
    (data || []).forEach(n => notes[n.id] = n);
    notesByNb[activeNotebookFlag] = { ...notes };
  }
  renderItems();
  renderBacklinks();
}

function rootFolderId() {
  const root = Object.values(folders).find(f => f.name === "/");
  return root ? root.id : null;
}

async function loadNote(noteId) {
  // reload all notes to get fresh data, then update editor if needed
  if (!activeNotebookFlag) return;
  const data = await scry(`/v0/notes/${activeNotebookFlag}`);
  if (!data) return;
  (data || []).forEach(n => notes[n.id] = n);
  const n = notes[noteId];
  if (!n) return;
  if (activeNoteId === n.id) {
    document.getElementById("note-title-input").value = n.title;
    document.getElementById("editor").value = n.bodyMd;
    autosizeEditor();
    savedRevision = n.revision;
    clearDirty();
  }
}

// ── Render ────────────────────────────────────────────────────────────────
function renderNotebooks() {
  const el = document.getElementById("notebooks-list");
  el.innerHTML = "";
  const list = Object.values(notebooks);
  if (!list.length) {
    el.innerHTML = '<div class="empty-state" style="padding:20px 12px;font-size:12px">No notebooks yet.<br>Click <strong>Add notebook</strong> below.</div>';
    return;
  }
  list.sort((a,b) => a.title.localeCompare(b.title)).forEach(nb => {
    const div = document.createElement("div");
    div.className = "nb-item" + (nb.flag === activeNotebookFlag ? " active" : "");
    const lockHtml = nb.visibility === "private" ? `<svg class="icon nb-lock"><use href="#i-lock"/></svg>` : "";
    div.innerHTML = `<span class="nb-icon">${icon('notebook')}</span><span class="nb-name">${esc(nb.title)}</span>${lockHtml}<span class="nb-flag">${esc(nb.flag)}</span>`;
    div.onclick = () => selectNotebook(nb.flag);
    el.appendChild(div);
  });
}

function updateHeader() {
  const labelEl = document.getElementById("folder-label");
  const upBtn = document.getElementById("folder-up-btn");
  const newFolderBtn = document.getElementById("new-folder-btn");
  const newNoteBtn = document.getElementById("new-note-btn");
  const settingsWrap = document.getElementById("notebook-settings-wrap");
  const inviteBtn = document.getElementById("notebook-invite-btn");
  if (!activeNotebookId) {
    labelEl.textContent = "Notes";
    upBtn.style.display = "none";
    newFolderBtn.style.display = "none";
    newNoteBtn.style.display = "none";
    settingsWrap.style.display = "none";
    inviteBtn.style.display = "none";
    return;
  }
  newFolderBtn.style.display = "";
  newNoteBtn.style.display = "";
  const rootId = rootFolderId();
  const isAtRoot = !activeFolderId || activeFolderId === rootId;
  if (isAtRoot) {
    const nb = notebooks[activeNotebookFlag];
    labelEl.textContent = nb?.title || "Notes";
    upBtn.style.display = "none";
    settingsWrap.style.display = "";
    // Show rename/delete + visibility toggle for local notebooks, leave for remote.
    // Normalize by stripping tildes — `/~/name` and scot %p aren't guaranteed to match formats.
    const isLocal = nb && SHIP && nb.host.replace(/^~/, "") === SHIP.replace(/^~/, "");
    document.getElementById("nb-menu-rename").style.display = isLocal ? "" : "none";
    document.getElementById("nb-menu-delete").style.display = isLocal ? "" : "none";
    document.getElementById("nb-menu-leave").style.display = isLocal ? "none" : "";
    const visBtn = document.getElementById("nb-menu-visibility");
    if (isLocal) {
      visBtn.style.display = "";
      visBtn.textContent = nb.visibility === "public" ? "Make private" : "Make public";
    } else {
      visBtn.style.display = "none";
    }
    // Invite is owner-only: only visible when this ship hosts the notebook.
    inviteBtn.style.display = isLocal ? "" : "none";
  } else {
    labelEl.textContent = folders[activeFolderId]?.name || "Folder";
    upBtn.style.display = "";
    settingsWrap.style.display = "none";
    inviteBtn.style.display = "none";
  }
}

function renderItems() {
  updateHeader();
  const el = document.getElementById("notes-list");
  el.innerHTML = "";
  if (!activeNotebookId || !activeFolderId) return;

  const subfolders = Object.values(folders)
    .filter(f => f.parentFolderId === activeFolderId && f.name !== "/")
    .sort((a,b) => a.name.localeCompare(b.name));

  const notesHere = Object.values(notes)
    .filter(n => n.folderId === activeFolderId)
    .sort((a,b) => b.updatedAt - a.updatedAt);

  if (!subfolders.length && !notesHere.length) {
    el.innerHTML = "<div class=\"empty-state\">Empty folder</div>";
    return;
  }

  subfolders.forEach(f => {
    const div = document.createElement("div");
    div.className = "item-row is-folder";
    div.innerHTML = `
      <span class="item-icon" data-folder-id="${f.id}" title="Folder actions (rename, delete)">
        <svg class="icon folder-glyph"><use href="#i-folder"/></svg>
        <svg class="icon ellipsis-glyph"><use href="#i-ellipsis"/></svg>
      </span>
      <div class="item-body">
        <div class="item-title">${esc(f.name)}</div>
      </div>
      <span class="item-chevron">${icon('chevron-right')}</span>
    `;
    div.querySelector(".item-icon").addEventListener("click", (e) => {
      e.stopPropagation();
      openFolderActionMenu(f, e.currentTarget);
    });
    div.onclick = () => navigateToFolder(f.id);
    el.appendChild(div);
  });

  notesHere.forEach(n => {
    const div = document.createElement("div");
    div.className = "item-row is-note" + (n.id === activeNoteId ? " active" : "");
    const d = new Date(n.updatedAt * 1000);
    const dateStr = d.toLocaleDateString(undefined, { month:"short", day:"numeric" });
    const preview = notePreview(n.bodyMd);
    div.innerHTML = `
      <span class="item-icon">${icon('doc')}</span>
      <div class="item-body">
        <div class="item-title-row">
          <div class="item-title">${esc(n.title)}</div>
          <div class="item-date">${dateStr}</div>
        </div>
        <div class="item-preview">${preview ? esc(preview) : "<span style='opacity:0.5'>No content</span>"}</div>
      </div>
    `;
    div.onclick = () => selectNote(n.id);
    el.appendChild(div);
  });
}

async function navigateToFolder(id) {
  if (!await confirmDirty()) return;
  activeFolderId = id;
  activeNoteId = null;
  clearEditor();
  renderItems();
  saveSelection();
  pushRoute();
}

async function folderUp() {
  if (!activeFolderId) return;
  const f = folders[activeFolderId];
  if (!f) return;
  const rootId = rootFolderId();
  if (activeFolderId === rootId) return;
  await navigateToFolder(f.parentFolderId || rootId);
}

// ── Import ────────────────────────────────────────────────────────────────
// ── Export ───────────────────────────────────────────────────────────────
function sanitizeFilename(name) {
  return String(name).replace(/[\/\\:*?"<>|]/g, "_").replace(/^\.+$/g, "_").slice(0, 120) || "Untitled";
}

// Minimal "store" (uncompressed) ZIP encoder — no external deps.
function crc32(data) {
  if (!crc32.table) {
    const t = new Uint32Array(256);
    for (let n = 0; n < 256; n++) {
      let c = n;
      for (let k = 0; k < 8; k++) c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
      t[n] = c;
    }
    crc32.table = t;
  }
  let c = 0xffffffff;
  for (let i = 0; i < data.length; i++) c = crc32.table[(c ^ data[i]) & 0xff] ^ (c >>> 8);
  return (c ^ 0xffffffff) >>> 0;
}

function buildZip(entries) {
  const encoder = new TextEncoder();
  const parts = [];
  const central = [];
  let offset = 0;
  for (const e of entries) {
    const name = encoder.encode(e.name);
    const crc = crc32(e.data);
    const size = e.data.length;
    const lh = new Uint8Array(30 + name.length);
    const lv = new DataView(lh.buffer);
    lv.setUint32(0, 0x04034b50, true);
    lv.setUint16(4, 20, true);
    lv.setUint16(6, 0x0800, true);
    lv.setUint16(8, 0, true);
    lv.setUint16(10, 0, true);
    lv.setUint16(12, 0x21, true);
    lv.setUint32(14, crc, true);
    lv.setUint32(18, size, true);
    lv.setUint32(22, size, true);
    lv.setUint16(26, name.length, true);
    lv.setUint16(28, 0, true);
    lh.set(name, 30);
    parts.push(lh, e.data);

    const ch = new Uint8Array(46 + name.length);
    const cv = new DataView(ch.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0x0800, true);
    cv.setUint16(10, 0, true);
    cv.setUint16(12, 0, true);
    cv.setUint16(14, 0x21, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, size, true);
    cv.setUint32(24, size, true);
    cv.setUint16(28, name.length, true);
    cv.setUint32(42, offset, true);
    ch.set(name, 46);
    central.push(ch);

    offset += lh.length + size;
  }
  const centralOffset = offset;
  const centralSize = central.reduce((s, c) => s + c.length, 0);
  parts.push(...central);

  const eocd = new Uint8Array(22);
  const ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(8, entries.length, true);
  ev.setUint16(10, entries.length, true);
  ev.setUint32(12, centralSize, true);
  ev.setUint32(16, centralOffset, true);
  parts.push(eocd);

  const total = parts.reduce((s, p) => s + p.length, 0);
  const out = new Uint8Array(total);
  let o = 0;
  for (const p of parts) { out.set(p, o); o += p.length; }
  return out;
}

async function exportNotebook() {
  closeNotebookSettings();
  if (!activeNotebookId) return;
  const nb = notebooks[activeNotebookFlag];
  if (!nb) return;
  await loadFolders();
  await loadNotes();

  const rootId = rootFolderId();
  const pathOf = (fid) => {
    if (!fid || fid === rootId) return "";
    const f = folders[fid];
    if (!f) return "";
    const parent = pathOf(f.parentFolderId);
    return (parent ? parent + "/" : "") + sanitizeFilename(f.name);
  };

  const encoder = new TextEncoder();
  const used = new Set();
  const entries = Object.values(notes).map(note => {
    const folderPath = pathOf(note.folderId);
    const base = sanitizeFilename(note.title || "Untitled");
    let name = (folderPath ? folderPath + "/" : "") + base + ".md";
    let i = 2;
    while (used.has(name)) {
      name = (folderPath ? folderPath + "/" : "") + base + "-" + i + ".md";
      i++;
    }
    used.add(name);
    return { name, data: encoder.encode(note.bodyMd || "") };
  });

  if (!entries.length) { alert("This notebook has no notes to export."); return; }

  const zip = buildZip(entries);
  const blob = new Blob([zip], { type: "application/zip" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = sanitizeFilename(nb.title || "notebook") + ".zip";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function triggerImport(isFolder) {
  if (!activeNotebookId) { alert("Select a notebook first"); return; }
  const input = document.createElement("input");
  input.type = "file";
  if (isFolder) {
    input.webkitdirectory = true;
  } else {
    input.multiple = true;
    input.accept = ".md,.txt,.markdown,.text";
  }
  input.onchange = async (e) => {
    const allFiles = Array.from(e.target.files);
    const mdFiles = allFiles.filter(f => /\.(md|txt|markdown|text)$/i.test(f.name));
    if (!mdFiles.length) { alert("No .md or .txt files found"); return; }
    document.getElementById("save-status").textContent = "Importing " + mdFiles.length + " files…";

    let folderId = activeFolderId;
    if (!folderId) {
      const rootFolder = Object.values(folders).find(f => f.name === "/");
      if (rootFolder) folderId = rootFolder.id;
      else { alert("No folders found"); return; }
    }

    if (isFolder) {
      // Build tree from webkitRelativePath
      const tree = [];
      for (const file of mdFiles) {
        const parts = file.webkitRelativePath.split("/");
        // parts[0] is root folder name, rest are subfolders + filename
        let node = tree;
        // skip parts[0] (selected folder name) and last (filename)
        for (let i = 1; i < parts.length - 1; i++) {
          let existing = node.find(n => n.children && n.name === parts[i]);
          if (!existing) {
            existing = { name: parts[i], children: [] };
            node.push(existing);
          }
          node = existing.children;
        }
        const text = await file.text();
        const title = file.name.replace(/\.(md|txt|markdown|text)$/i, "");
        node.push({ title, body: text });
      }
      await pokeNotebook({
        type: "batch-import-tree",
        parent: folderId,
        tree: tree
      });
    } else {
      const noteItems = [];
      for (const file of mdFiles) {
        const text = await file.text();
        const title = file.name.replace(/\.(md|txt|markdown|text)$/i, "");
        noteItems.push({ title, body: text });
      }
      await pokeNotebook({
        type: "batch-import",
        folder: folderId,
        notes: noteItems
      });
    }

    setTimeout(async () => {
      await loadFolders();
      await loadNotes();
      document.getElementById("save-status").textContent = "Imported " + mdFiles.length + " notes";
      setTimeout(() => { document.getElementById("save-status").textContent = ""; }, 3000);
    }, 500);
  };
  document.body.appendChild(input);
  input.click();
  input.remove();
}

// ── Markdown Preview ──────────────────────────────────────────────────────
let previewMode = false;
// Source offset of the [ xX] character for each rendered checkbox, in DOM order.
// Populated by renderMarkdown; consumed by togglePreviewCheckbox.
let previewCheckboxOffsets = [];

function togglePreview() {
  previewMode = !previewMode;
  const editor = document.getElementById("editor");
  const preview = document.getElementById("preview");
  const btn = document.getElementById("preview-btn");
  if (previewMode) {
    preview.innerHTML = renderMarkdown(editor.value);
    editor.style.display = "none";
    preview.style.display = "block";
    btn.style.color = "var(--accent)";
  } else {
    editor.style.display = "block";
    preview.style.display = "none";
    btn.style.color = "";
    autosizeEditor();
  }
}

// Toggle the Nth task-list checkbox in the source markdown and re-render.
function togglePreviewCheckbox(n) {
  if (historyViewing) return;
  const off = previewCheckboxOffsets[n];
  if (off == null) return;
  const editor = document.getElementById("editor");
  const ch = editor.value[off];
  if (ch !== " " && ch !== "x" && ch !== "X") return;
  const flipped = ch === " " ? "x" : " ";
  editor.value = editor.value.slice(0, off) + flipped + editor.value.slice(off + 1);
  onEditorInput();
  const preview = document.getElementById("preview");
  if (preview) preview.innerHTML = renderMarkdown(editor.value);
}

document.addEventListener("change", (e) => {
  const t = e.target;
  if (!t || t.type !== "checkbox") return;
  const idx = t.getAttribute("data-cb-index");
  if (idx === null) return;
  const preview = document.getElementById("preview");
  if (!preview || !preview.contains(t)) return;
  togglePreviewCheckbox(parseInt(idx, 10));
});

function renderMarkdown(src) {
  // escape HTML
  const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const lines = src.split("\n");
  let html = "";
  let inCode = false, codeLang = "", codeLines = [];
  let inList = false, listType = "";
  let inBlockquote = false;
  let cbIndex = 0;
  previewCheckboxOffsets = [];
  // Per-line start offsets into src (for mapping checkbox positions back to source).
  const lineOffs = new Array(lines.length);
  { let acc = 0; for (let k = 0; k < lines.length; k++) { lineOffs[k] = acc; acc += lines[k].length + 1; } }

  function flushList() {
    if (inList) { html += listType === "ul" ? "</ul>\n" : "</ol>\n"; inList = false; }
  }
  function flushBlockquote() {
    if (inBlockquote) { html += "</blockquote>\n"; inBlockquote = false; }
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // fenced code blocks
    if (/^```/.test(line)) {
      if (!inCode) {
        flushList(); flushBlockquote();
        codeLang = line.slice(3).trim();
        codeLines = [];
        inCode = true;
        continue;
      } else {
        html += "<pre><code" + (codeLang ? " class=\"language-" + esc(codeLang) + "\"" : "") + ">" + esc(codeLines.join("\n")) + "</code></pre>\n";
        inCode = false;
        continue;
      }
    }
    if (inCode) { codeLines.push(line); continue; }

    // blank line
    if (!line.trim()) { flushList(); flushBlockquote(); html += "\n"; continue; }

    // headings
    const hm = line.match(/^(#{1,6})\s+(.*)/);
    if (hm) { flushList(); flushBlockquote(); const lvl = hm[1].length; html += "<h" + lvl + ">" + inline(hm[2]) + "</h" + lvl + ">\n"; continue; }

    // hr
    if (/^([-*_]\s*){3,}$/.test(line.trim())) { flushList(); flushBlockquote(); html += "<hr>\n"; continue; }

    // blockquote
    if (/^>\s?/.test(line)) {
      flushList();
      const content = line.replace(/^>\s?/, "");
      if (!inBlockquote) { html += "<blockquote>\n"; inBlockquote = true; }
      html += "<p>" + inline(content) + "</p>\n";
      continue;
    } else { flushBlockquote(); }

    // unordered list
    const ulm = line.match(/^(\s*)[-*+]\s+(.*)/);
    if (ulm) {
      if (!inList || listType !== "ul") { flushList(); html += "<ul>\n"; inList = true; listType = "ul"; }
      // checkbox
      const cbm = ulm[2].match(/^\[([ xX])\]\s*(.*)/);
      if (cbm) {
        const checked = cbm[1] !== " " ? " checked" : "";
        const ro = historyViewing ? " disabled" : "";
        const charOff = lineOffs[i] + (ulm[0].length - ulm[2].length) + 1;
        previewCheckboxOffsets.push(charOff);
        html += "<li class=\"task-item\"><input type=\"checkbox\" data-cb-index=\"" + cbIndex + "\"" + checked + ro + "> " + inline(cbm[2]) + "</li>\n";
        cbIndex++;
      } else {
        html += "<li>" + inline(ulm[2]) + "</li>\n";
      }
      continue;
    }

    // ordered list
    const olm = line.match(/^(\s*)\d+[.)]\s+(.*)/);
    if (olm) {
      if (!inList || listType !== "ol") { flushList(); html += "<ol>\n"; inList = true; listType = "ol"; }
      html += "<li>" + inline(olm[2]) + "</li>\n";
      continue;
    }

    flushList();
    // table
    if (line.includes("|") && i + 1 < lines.length && /^[\s|:-]+$/.test(lines[i + 1])) {
      const parseRow = r => r.split("|").map(c => c.trim()).filter(c => c !== "");
      const headers = parseRow(line);
      html += "<table><thead><tr>" + headers.map(h => "<th>" + inline(h) + "</th>").join("") + "</tr></thead><tbody>\n";
      i++; // skip separator
      while (i + 1 < lines.length && lines[i + 1].includes("|")) {
        i++;
        const cells = parseRow(lines[i]);
        html += "<tr>" + cells.map(c => "<td>" + inline(c) + "</td>").join("") + "</tr>\n";
      }
      html += "</tbody></table>\n";
      continue;
    }

    // paragraph
    html += "<p>" + inline(line) + "</p>\n";
  }
  if (inCode) html += "<pre><code>" + esc(codeLines.join("\n")) + "</code></pre>\n";
  flushList(); flushBlockquote();
  return html;
}

function inline(s) {
  const esc = t => t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const attr = t => esc(t).replace(/"/g, "&quot;");

  // Extract tokens that produce HTML BEFORE running inline formatting, so
  // characters inside URLs / alt text / code spans (_, *, ~~) don't get
  // munged by the bold/italic/strike passes. Each extracted token is
  // replaced with a placeholder (contains NUL chars so no further regex
  // matches it), and the placeholder is swapped back at the very end.
  const tokens = [];
  const placeholder = (html) => {
    tokens.push(html);
    return `TOK${tokens.length - 1}`;
  };

  // Order matters: code first (protects contents), then images (leading `!`
  // so they don't look like links), then wiki-links (double-brackets before
  // single-bracket link pattern can see them), then standard links.
  s = s.replace(/`([^`]+)`/g, (_m, c) =>
    placeholder(`<code>${esc(c)}</code>`));
  s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_m, alt, url) =>
    placeholder(`<img src="${attr(url)}" alt="${attr(alt)}">`));
  s = s.replace(/\[\[([^\[\]]+?)\]\]/g, (_m, raw) => {
    const target = raw.trim();
    const note = resolveWikiLink(target);
    const html = note
      ? `<a class="wiki-link" data-note-id="${note.id}" href="javascript:void(0)">${esc(target)}</a>`
      : `<a class="wiki-link unresolved" data-wiki-target="${attr(target)}" href="javascript:void(0)">${esc(target)}</a>`;
    return placeholder(html);
  });
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_m, text, url) =>
    placeholder(`<a href="${attr(url)}" target="_blank">${esc(text)}</a>`));

  // Now inline formatting on plain text only.
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
  s = s.replace(/___(.+?)___/g,       "<strong><em>$1</em></strong>");
  s = s.replace(/\*\*(.+?)\*\*/g,     "<strong>$1</strong>");
  s = s.replace(/__(.+?)__/g,         "<strong>$1</strong>");
  s = s.replace(/\*(.+?)\*/g,         "<em>$1</em>");
  s = s.replace(/_(.+?)_/g,           "<em>$1</em>");
  s = s.replace(/~~(.+?)~~/g,         "<del>$1</del>");

  // Swap tokens back in.
  return s.replace(/TOK(\d+)/g, (_m, i) => tokens[+i]);
}

// ── Selection ─────────────────────────────────────────────────────────────
async function selectNotebook(flag) {
  if (!await confirmDirty()) return;
  closeHistoryPanel();
  const changing = activeNotebookFlag !== flag;
  const nb = notebooks[flag];
  activeNotebookFlag = flag;
  activeNotebookId = nb ? nb.id : null;
  activeFolderId = null;
  activeNoteId = null;
  if (changing) {
    // Restore from per-notebook caches (populated by prior visits or by the
    // switcher's index build) so the UI paints target-notebook data
    // immediately — even if the fresh scry below fails offline.
    folders = foldersByNb[flag] ? { ...foldersByNb[flag] } : {};
    notes = notesByNb[flag] ? { ...notesByNb[flag] } : {};
  }
  // If we have cached folders, default to root and paint immediately. URL
  // and rest of state stay correct without waiting on the scry.
  const cachedRoot = Object.values(folders).find(f => f.name === "/");
  if (cachedRoot) activeFolderId = cachedRoot.id;
  clearEditor();
  renderNotebooks();
  renderItems();
  // Fire fresh scries in parallel — they'll re-render when they land. We
  // don't await so navigation feels instant; the cache (if any) is what
  // the user sees in the meantime.
  Promise.all([loadFolders(), loadNotes()]).catch(() => {});
  subscribeEvents();
  saveSelection();
  pushRoute();
  if (isMobile()) mobileSetView("notes");
}

async function selectNote(id) {
  if (!await confirmDirty()) return;
  dismissConflictBanner();
  closeHistoryPanel();
  activeNoteId = id;
  renderItems();
  const n = notes[id];
  document.getElementById("note-title-input").value = n.title;
  document.getElementById("editor").value = n.bodyMd;
  autosizeEditor();
  if (previewMode) document.getElementById("preview").innerHTML = renderMarkdown(n.bodyMd);
  savedRevision = n.revision;
  document.getElementById("note-rev").textContent = `rev ${n.revision}`;
  document.title = `${n.title || "Untitled"} — Notes`;
  clearDirty();
  // If a local draft exists from a prior session that was never saved,
  // restore it. Only restore when it was based on a revision <= the
  // current server revision (otherwise it's stale or already superseded).
  const draft = readDraft(activeNotebookFlag, id);
  if (draft && draft.baseRevision <= n.revision &&
      (draft.title !== n.title || draft.body !== n.bodyMd)) {
    document.getElementById("note-title-input").value = draft.title;
    document.getElementById("editor").value = draft.body;
    autosizeEditor();
    if (previewMode) document.getElementById("preview").innerHTML = renderMarkdown(draft.body);
    document.title = `${draft.title || "Untitled"} — Notes`;
    dirty = true;
    document.getElementById("save-status").textContent = "Unsaved draft restored";
    if (saveTimer) clearTimeout(saveTimer);
    if (!conflictActive) saveTimer = setTimeout(() => autoSave(), AUTOSAVE_DEBOUNCE_MS);
  } else if (draft) {
    // Stale or already-saved draft — clean up.
    clearDraft(activeNotebookFlag, id);
  }
  document.getElementById("overflow-note-section").style.display = "";
  updateBreadcrumb();
  renderBacklinks();
  saveSelection();
  pushRoute();
  // Update publish/unpublish button state
  const isPublished = publishedIds.has(pubKey(activeNotebookFlag, id));
  document.getElementById("publish-btn").style.display = isPublished ? "none" : "";
  document.getElementById("unpublish-btn").style.display = isPublished ? "" : "none";
  document.getElementById("view-published-btn").style.display = isPublished ? "" : "none";
  if (isMobile()) mobileSetView("editor");
}

// ── Quick switcher ────────────────────────────────────────────────────────
let switcherItems = [];
let switcherFiltered = [];
let switcherSelIdx = 0;
let switcherBuilding = false;

function switcherOpen() { return document.getElementById("switcher-backdrop").classList.contains("open"); }

async function openSwitcher(initialQuery) {
  if (switcherOpen()) return;
  document.getElementById("switcher-backdrop").classList.add("open");
  const input = document.getElementById("switcher-input");
  const q = typeof initialQuery === "string" ? initialQuery : "";
  input.value = q;
  renderSwitcherResults(q);
  input.focus();
  input.setSelectionRange(q.length, q.length);
  // Build/refresh the index in the background; re-render when it lands.
  if (!switcherBuilding) {
    switcherBuilding = true;
    await buildSwitcherIndex();
    switcherBuilding = false;
    if (switcherOpen()) renderSwitcherResults(input.value);
  }
}

function closeSwitcher() {
  document.getElementById("switcher-backdrop").classList.remove("open");
  switcherSelIdx = 0;
}

function onSwitcherBackdropClick(e) {
  if (e.target.id === "switcher-backdrop") closeSwitcher();
}

async function buildSwitcherIndex() {
  const items = [];
  // In embed mode the UI is locked to a single notebook — skip notebook
  // results entirely and only index folders + notes for that notebook.
  const allNbs = Object.values(notebooks);
  const nbs = EMBED_PARAMS.embed
    ? allNbs.filter(nb => nb.flag === activeNotebookFlag)
    : allNbs;
  if (!EMBED_PARAMS.embed) for (const nb of nbs) {
    items.push({
      kind: "notebook",
      label: nb.title || "Untitled notebook",
      subtitle: nb.flag,
      navigate: () => selectNotebook(nb.flag)
    });
  }
  // Fetch folders + notes for every notebook in parallel.
  await Promise.all(nbs.map(async (nb) => {
    const flag = nb.flag;
    let fdata = [], ndata = [];
    try { [fdata, ndata] = await Promise.all([
      scry(`/v0/folders/${flag}`),
      scry(`/v0/notes/${flag}`)
    ]); } catch (_) { return; }
    // Stash into the per-notebook caches so cross-notebook nav works offline.
    if (fdata) {
      foldersByNb[nb.flag] = {};
      (fdata || []).forEach(f => foldersByNb[nb.flag][f.id] = f);
    }
    if (ndata) {
      notesByNb[nb.flag] = {};
      (ndata || []).forEach(n => notesByNb[nb.flag][n.id] = n);
    }
    const fByNb = {};
    (fdata || []).forEach(f => fByNb[f.id] = f);
    const nbName = nb.title || "Untitled notebook";
    (fdata || []).forEach(f => {
      if (f.name === "/") return;
      items.push({
        kind: "folder",
        label: f.name,
        subtitle: nbName,
        navigate: async () => { await selectNotebook(nb.flag); navigateToFolder(f.id); }
      });
    });
    (ndata || []).forEach(n => {
      const f = fByNb[n.folderId];
      const folderPart = f && f.name !== "/" ? ` · ${f.name}` : "";
      items.push({
        kind: "note",
        label: n.title || "Untitled",
        subtitle: nbName + folderPart,
        navigate: async () => { await selectNotebook(nb.flag); await selectNote(n.id); },
        // Rich metadata reused by full-text search
        noteId: n.id,
        notebookId: nb.id,
        notebookTitle: nbName,
        folderLabel: folderPart,
        bodyMd: n.bodyMd || "",
        updatedAt: n.updatedAt || 0
      });
    });
  }));
  switcherItems = items;
}

function scoreSwitcherMatch(query, target) {
  if (!query) return 1;  // no query: all items tie, original order wins
  const q = query.toLowerCase();
  const t = target.toLowerCase();
  const idx = t.indexOf(q);
  if (idx >= 0) return 1000 - idx - (t.length - q.length) * 0.1;
  // Subsequence match with streak bonus
  let qi = 0, score = 0, streak = 0, lastMatch = -2;
  for (let ti = 0; ti < t.length && qi < q.length; ti++) {
    if (t[ti] === q[qi]) {
      qi++;
      if (ti === lastMatch + 1) streak++; else streak = 0;
      score += 1 + streak * 2;
      // small bonus for word-boundary matches
      if (ti === 0 || /[\s\/\-_]/.test(t[ti-1])) score += 2;
      lastMatch = ti;
    }
  }
  return qi === q.length ? score : -1;
}

function renderSwitcherResults(query) {
  const root = document.getElementById("switcher-results");
  const scored = [];
  for (const item of switcherItems) {
    const s = scoreSwitcherMatch(query, item.label);
    if (s > 0) scored.push({ item, score: s });
  }
  scored.sort((a, b) => b.score - a.score);
  switcherFiltered = scored.slice(0, 40).map(x => x.item);
  switcherSelIdx = 0;

  if (switcherFiltered.length === 0) {
    root.innerHTML = `<div class="switcher-empty">${switcherItems.length === 0 && switcherBuilding ? "Loading…" : "No matches"}</div>`;
    return;
  }
  const iconFor = (k) => k === "notebook" ? "notebook" : (k === "folder" ? "folder" : "doc");
  root.innerHTML = switcherFiltered.map((it, i) =>
    `<div class="switcher-result${i === 0 ? ' selected' : ''}" data-idx="${i}">
       <span class="result-icon">${icon(iconFor(it.kind))}</span>
       <span class="switcher-result-text">
         <span class="switcher-result-label">${esc(it.label)}</span>
         ${it.subtitle ? `<span class="switcher-result-subtitle">${esc(it.subtitle)}</span>` : ""}
       </span>
     </div>`
  ).join("");
  root.querySelectorAll(".switcher-result").forEach(el => {
    el.addEventListener("click", () => {
      switcherSelIdx = parseInt(el.dataset.idx, 10);
      selectSwitcherResult();
    });
    el.addEventListener("mouseenter", () => setSwitcherSelection(parseInt(el.dataset.idx, 10)));
  });
}

function setSwitcherSelection(idx) {
  const els = document.querySelectorAll("#switcher-results .switcher-result");
  if (idx < 0 || idx >= els.length) return;
  switcherSelIdx = idx;
  els.forEach((el, i) => el.classList.toggle("selected", i === idx));
  const target = els[idx];
  if (target) target.scrollIntoView({ block: "nearest" });
}

async function selectSwitcherResult() {
  const item = switcherFiltered[switcherSelIdx];
  if (!item) return;
  closeSwitcher();
  await item.navigate();
  if (item.kind === "note") focusEditorAtTop();
}

document.getElementById("switcher-input").addEventListener("input", (e) => {
  renderSwitcherResults(e.target.value);
});
document.getElementById("switcher-input").addEventListener("keydown", (e) => {
  if (e.key === "ArrowDown") { e.preventDefault(); setSwitcherSelection(Math.min(switcherSelIdx + 1, switcherFiltered.length - 1)); }
  else if (e.key === "ArrowUp") { e.preventDefault(); setSwitcherSelection(Math.max(switcherSelIdx - 1, 0)); }
  else if (e.key === "Enter") { e.preventDefault(); selectSwitcherResult(); }
  else if (e.key === "Escape") { e.preventDefault(); closeSwitcher(); }
  else if (e.key === "Tab") { e.preventDefault(); const q = e.currentTarget.value; closeSwitcher(); openSearch(q); }
});

// ── Full-text search ──────────────────────────────────────────────────────
let searchResults = [];
let searchSelIdx = 0;
let searchBuilding = false;

function isSearchOpen() {
  return document.getElementById("search-backdrop").classList.contains("open");
}

async function openSearch(initialQuery) {
  if (isSearchOpen()) return;
  if (switcherOpen()) closeSwitcher();
  document.getElementById("search-backdrop").classList.add("open");
  const input = document.getElementById("search-input");
  const q = typeof initialQuery === "string" ? initialQuery : "";
  input.value = q;
  renderSearchResults(q);
  input.focus();
  input.setSelectionRange(q.length, q.length);
  // Reuse the switcher index (prefetches all notebooks' notes + bodies).
  if (switcherItems.length === 0 && !switcherBuilding && !searchBuilding) {
    searchBuilding = true;
    await buildSwitcherIndex();
    searchBuilding = false;
    if (isSearchOpen()) renderSearchResults(input.value);
  }
}

function closeSearch() {
  document.getElementById("search-backdrop").classList.remove("open");
  searchSelIdx = 0;
}

function onSearchBackdropClick(e) {
  if (e.target.id === "search-backdrop") closeSearch();
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

function scoreSearchHit(query, note) {
  const q = query.toLowerCase();
  const title = (note.label || "").toLowerCase();
  const body = (note.bodyMd || "").toLowerCase();
  if (title === q) return { score: 10000, where: "title", idx: 0 };
  const tIdx = title.indexOf(q);
  if (tIdx >= 0) return { score: 5000 - tIdx, where: "title", idx: tIdx };
  const bIdx = body.indexOf(q);
  if (bIdx >= 0) return { score: Math.max(1, 2000 - bIdx * 0.05), where: "body", idx: bIdx };
  return null;
}

function makeSearchSnippet(body, hitIdx, query) {
  if (hitIdx < 0 || !body) return "";
  const before = 40, after = 100;
  const start = Math.max(0, hitIdx - before);
  const end = Math.min(body.length, hitIdx + query.length + after);
  let text = body.slice(start, end);
  if (start > 0) text = "…" + text;
  if (end < body.length) text += "…";
  const escText = esc(text);
  const re = new RegExp(escapeRegex(esc(query)), "gi");
  return escText.replace(re, m => `<mark>${m}</mark>`);
}

function renderSearchResults(query) {
  const root = document.getElementById("search-results");
  const q = (query || "").trim();
  if (!q) {
    root.innerHTML = `<div class="switcher-empty">${searchBuilding || switcherBuilding ? "Indexing notebooks…" : "Type to search across all notebooks"}</div>`;
    return;
  }
  const noteItems = switcherItems.filter(i => i.kind === "note");
  const scored = [];
  for (const n of noteItems) {
    const hit = scoreSearchHit(q, n);
    if (hit) scored.push({ item: n, hit });
  }
  scored.sort((a, b) => b.hit.score - a.hit.score);
  searchResults = scored.slice(0, 40);
  searchSelIdx = 0;
  if (searchResults.length === 0) {
    root.innerHTML = `<div class="switcher-empty">No matches</div>`;
    return;
  }
  root.innerHTML = searchResults.map((r, i) => {
    const n = r.item;
    const snippet = r.hit.where === "body" ? makeSearchSnippet(n.bodyMd, r.hit.idx, q) : "";
    const meta = `${esc(n.notebookTitle)}${n.folderLabel ? " " + esc(n.folderLabel) : ""}`;
    return `<div class="search-result${i === 0 ? " selected" : ""}" data-idx="${i}">
      <div class="search-result-title">${esc(n.label)}</div>
      ${snippet ? `<div class="search-result-snippet">${snippet}</div>` : ""}
      <div class="search-result-meta">${meta}</div>
    </div>`;
  }).join("");
  root.querySelectorAll(".search-result").forEach(el => {
    el.addEventListener("click", () => { searchSelIdx = parseInt(el.dataset.idx, 10); acceptSearchResult(); });
    el.addEventListener("mouseenter", () => setSearchSelection(parseInt(el.dataset.idx, 10)));
  });
}

function setSearchSelection(idx) {
  const els = document.querySelectorAll("#search-results .search-result");
  if (idx < 0 || idx >= els.length) return;
  searchSelIdx = idx;
  els.forEach((el, i) => el.classList.toggle("selected", i === idx));
  if (els[idx]) els[idx].scrollIntoView({ block: "nearest" });
}

async function acceptSearchResult() {
  const r = searchResults[searchSelIdx];
  if (!r) return;
  closeSearch();
  await r.item.navigate();
  focusEditorAtTop();
}

function focusEditorAtTop() {
  const ed = document.getElementById("editor");
  if (!ed) return;
  ed.focus();
  ed.setSelectionRange(0, 0);
  const scroll = document.querySelector(".editor-scroll");
  if (scroll) scroll.scrollTop = 0;
}

document.getElementById("search-input").addEventListener("input", (e) => {
  renderSearchResults(e.target.value);
});
document.getElementById("search-input").addEventListener("keydown", (e) => {
  if (e.key === "ArrowDown") { e.preventDefault(); setSearchSelection(Math.min(searchSelIdx + 1, searchResults.length - 1)); }
  else if (e.key === "ArrowUp") { e.preventDefault(); setSearchSelection(Math.max(searchSelIdx - 1, 0)); }
  else if (e.key === "Enter") { e.preventDefault(); acceptSearchResult(); }
  else if (e.key === "Escape") { e.preventDefault(); closeSearch(); }
  else if (e.key === "Tab") { e.preventDefault(); const q = e.currentTarget.value; closeSearch(); openSwitcher(q); }
});

function loadEditorSize() {

}

function adjustEditorSize(delta) {

}
