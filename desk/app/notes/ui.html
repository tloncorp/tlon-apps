}

// ── Util ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
// Pure echo-detection. Kept pure (no global access) so it's unit-testable;
// the canonical tests live at tests/frontend/run.html — keep in sync.
// A note-updated event is our own save echo if:
//   (a) its revision matches or trails what we already expect after our
//       optimistic pre-bump in autoSave (covers local-host saves), OR
//   (b) we issued a save very recently from this ship (covers remote saves
//       where we can't predict the host's new revision ahead of time).
function isOwnSaveEchoPure(evt, savedRev, shipId, lastSaveAt, now) {
  const r = evt && evt.revision;
  if (typeof r === "number" && r <= savedRev) return true;
  // Support both old "actor" field and new "updatedBy" field
  const actor = ((evt && (evt.actor || evt.updatedBy)) || "").replace(/^~/, "");
  const us = (shipId || "").replace(/^~/, "");
  if (actor && us && actor === us && now - lastSaveAt < 2000) return true;
  return false;
}
function isOwnSaveEcho(evt) {
  return isOwnSaveEchoPure(evt, savedRevision, SHIP, lastOwnSaveAt, Date.now());
}
const DISCLAIMER_KEY = "alpha-disclaimer-acknowledged";
function maybeShowDisclaimer() {
  try {
    if (localStorage.getItem(DISCLAIMER_KEY) === "1") return;
  } catch(_) { return; }
  openModal("alpha-disclaimer");
}
function acknowledgeDisclaimer() {
  try { localStorage.setItem(DISCLAIMER_KEY, "1"); } catch(_) {}
  modalLocked = false;
  document.getElementById("modal-backdrop").classList.remove("open");
}

// Connectivity state is the union of navigator.onLine + the SSE event stream.
// navigator.onLine false → "offline" (red pill)
// otherwise, if SSE is in error → "reconnecting" (amber pill)
// otherwise → connected (no pill)
function sseSetState(s) { sseState = s; refreshConnIndicator(); }

function refreshConnIndicator() {
  const label = document.getElementById("conn-label");
  const badge = document.getElementById("conn-badge");
  const online = typeof navigator !== "undefined" ? navigator.onLine !== false : true;
  let mode;
  if (!online) mode = "offline";
  else if (sseState === "reconnecting") mode = "reconnecting";
  else mode = "connected";

  if (label) {
    label.classList.remove("reconnecting", "disconnected");
    if (mode === "reconnecting") {
      label.textContent = "Reconnecting…";
      label.classList.add("reconnecting");
    } else if (mode === "offline") {
      label.textContent = "Offline";
      label.classList.add("disconnected");
    } else {
      label.textContent = "Notebooks";
    }
  }
  if (badge) {
    badge.classList.remove("visible", "offline");
    if (mode === "reconnecting") {
      badge.textContent = "Reconnecting";
      badge.title = "SSE stream is reconnecting";
      badge.classList.add("visible");
    } else if (mode === "offline") {
      badge.textContent = "Offline";
      badge.title = "No network — reconnect to save changes";
      badge.classList.add("visible", "offline");
    } else {
      badge.textContent = "";
      badge.removeAttribute("title");
    }
  }
}

// Backward-compatible alias used by the SSE hooks elsewhere.
function setConnectionState(state) { sseSetState(state); }

if (typeof window !== "undefined") {
  window.addEventListener("online", refreshConnIndicator);
  window.addEventListener("offline", refreshConnIndicator);
}
function icon(id) {
  return `<svg class="icon"><use href="#i-${id}"/></svg>`;
}
function notePreview(bodyMd) {
  if (!bodyMd) return "";
  // Strip common markdown syntax, collapse whitespace, trim.
  const s = String(bodyMd)
    .slice(0, 400)
    .replace(/^#{1,6}\s+/gm, "")
    .replace(/^[>\-*+]\s+/gm, "")
    .replace(/!\[([^\]]*)\]\([^)]+\)/g, "$1")
    .replace(/\[([^\]]+)\]\([^)]+\)/g, "$1")
    .replace(/[*_`~]/g, "")
    .replace(/\s+/g, " ")
    .trim();
  return s.slice(0, 140);
}

// ── Column resizers ──────────────────────────────────────────────────────
const COLUMN_CONSTRAINTS = {
  sidebar:       { min: 160, max: 360 },
  "notes-panel": { min: 200, max: 480 },
};
const EDITOR_MIN_WIDTH = 320;
const WIDTHS_KEY = "notes-column-widths";

function restoreColumnWidths() {
  try {
    const saved = JSON.parse(localStorage.getItem(WIDTHS_KEY) || "{}");
    for (const [cls, w] of Object.entries(saved)) {
      const el = document.querySelector("." + cls);
      const c = COLUMN_CONSTRAINTS[cls];
      if (el && c && typeof w === "number") {
        el.style.width = Math.max(c.min, Math.min(c.max, w)) + "px";
      }
    }
  } catch(_) {}
}

function persistColumnWidths() {
  const out = {};
  for (const cls of Object.keys(COLUMN_CONSTRAINTS)) {
    const el = document.querySelector("." + cls);
    if (el) out[cls] = el.offsetWidth;
  }
  try { localStorage.setItem(WIDTHS_KEY, JSON.stringify(out)); } catch(_) {}
}

function setupResizers() {
  document.querySelectorAll(".resizer").forEach(resizer => {
    const cls = resizer.dataset.target;
    const target = document.querySelector("." + cls);
    const constraint = COLUMN_CONSTRAINTS[cls];
    if (!target || !constraint) return;

    let startX = 0;
    let startWidth = 0;

    const onMove = (e) => {
      const layoutW = document.querySelector(".layout").offsetWidth;
      // Reserve editor min + the other fixed column's current width
      const otherCls = cls === "sidebar" ? "notes-panel" : "sidebar";
      const otherW = document.querySelector("." + otherCls).offsetWidth;
      const maxByLayout = layoutW - otherW - EDITOR_MIN_WIDTH;
      const max = Math.min(constraint.max, maxByLayout);
      const min = constraint.min;
      let next = startWidth + (e.clientX - startX);
      if (next < min) next = min;
      if (next > max) next = max;
      target.style.width = next + "px";
    };

    const onUp = () => {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      resizer.classList.remove("dragging");
      document.body.classList.remove("resizing");
      persistColumnWidths();
    };

    resizer.addEventListener("pointerdown", (e) => {
      if (window.innerWidth <= 640) return;
      e.preventDefault();
      startX = e.clientX;
      startWidth = target.offsetWidth;
      resizer.classList.add("dragging");
      document.body.classList.add("resizing");
      document.addEventListener("pointermove", onMove);
      document.addEventListener("pointerup", onUp);
    });
  });
}

function toggleSidebar() {
  document.body.classList.toggle("sidebar-collapsed");
  try {
    localStorage.setItem(
      "sidebar-collapsed",
      document.body.classList.contains("sidebar-collapsed") ? "1" : "0"
    );
  } catch(_) {}
}

function restoreSidebarCollapsed() {
  try {
    if (localStorage.getItem("sidebar-collapsed") === "1") {
      document.body.classList.add("sidebar-collapsed");
    }
  } catch(_) {}
}

// Reparent the notebook action buttons into the header on desktop
// or into the bottom footer on mobile. Runs on load and on resize.
function moveActionsForViewport() {
  const actions = document.getElementById("panel-actions");
  const header = document.querySelector(".notes-panel-header");
  const footer = document.getElementById("notes-panel-footer");
  if (!actions || !header || !footer) return;
  const target = isMobile() ? footer : header;
  if (actions.parentNode !== target) target.appendChild(actions);
}

moveActionsForViewport();
window.addEventListener("resize", moveActionsForViewport);

// Read embed-mode params from the URL once. Tlon (and other embedders) load
// this UI inside an iframe with `?embed=1&notebook=~ship/name` to lock the UI
// to a single notebook and hide the sidebar.
const EMBED_PARAMS = (() => {
  try {
    const p = new URLSearchParams(window.location.search);
    return {
      embed: p.get("embed") === "1" || p.has("embed"),
      notebookFlag: p.get("notebook") || null,
    };
  } catch (e) {
    return { embed: false, notebookFlag: null };
  }
})();

if (EMBED_PARAMS.embed) {
  document.body.classList.add("embed-mode");
}

restoreSidebarCollapsed();
restoreColumnWidths();
setupResizers();

// Auto-connect when served from a ship
if (location.protocol !== "file:" && location.hostname) {
  // Hide connect panel immediately to avoid flash
  document.getElementById("connect-panel").style.display = "none";
  document.getElementById("ship-url-input").value = location.origin;
  connect().catch(() => {
    // Show connect panel if auto-connect fails — but in embed mode the host
    // already injected the auth cookie, so a connect failure is unrecoverable.
    if (!EMBED_PARAMS.embed) {
      document.getElementById("connect-panel").style.display = "";
    }
  });
}

// ── PWA install support ──────────────────────────────────────────────────
// Register the agent-served service worker. The SW is a pass-through (no
// caching) — its only job is to make the install prompt eligible. Skip when
// embedded so we don't fight a host page's own SW. Skip on file:// or http
// where SW registration would fail anyway.
if ("serviceWorker" in navigator && location.protocol.startsWith("http") && !EMBED_PARAMS.embed) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/notes/sw.js", { scope: "/notes/" }).catch(() => {
      // Silent fallback — losing PWA install isn't worth a console error.
    });
  });
}
</script>
