<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<link rel="manifest" href="/notes/manifest.json">
<link rel="icon" type="image/svg+xml" href="/notes/favicon.svg">
<link rel="apple-touch-icon" href="/notes/icon.svg">
<meta name="theme-color" content="#7c6af7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Notes">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --border-item: #1a1a1a;
    --text: #e8e8e8;
    --text-muted: #666;
    --accent: #7c6af7;
    --accent-hover: #9080ff;
    --danger: #e05c5c;
    --success: #4caf82;
    --shadow: 0 20px 60px rgba(0,0,0,0.5);
    --shadow-md: 0 8px 24px rgba(0,0,0,0.4);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
    --editor-font-size: 16px;
  }
  :root[data-theme="light"] {
    --bg: #ffffff;
    --surface: #f5f5f7;
    --surface2: #ebebee;
    --border: #dcdce0;
    --border-item: #ededf0;
    --text: #141416;
    --text-muted: #71717a;
    --accent: #6b58e8;
    --accent-hover: #5243d1;
    --danger: #c84242;
    --success: #248958;
    --shadow: 0 20px 60px rgba(30,30,60,0.14);
    --shadow-md: 0 8px 24px rgba(30,30,60,0.12);
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: fixed;
    inset: 0;
  }

  /* ── sidebar footer (brand only) ── */
  .sidebar-brand {
    margin-top: 12px;
    padding: 4px 14px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  /* Keep name + version baseline-aligned even when fonts differ, without
     letting the tall mobile hamburger warp the outer flex line's baseline. */
  .brand-text {
    display: flex;
    align-items: baseline;
    gap: 6px;
    flex: 1;
    min-width: 0;
  }
  /* brand-icon now uses the default .icon opacity */
  .sidebar-brand .brand-name { font-size: 13px; font-weight: 600; }

  /* ── connection state label ── */
  #conn-label.reconnecting { color: #d4a72c; }
  #conn-label.disconnected { color: var(--danger); }

  /* Connectivity badge — lives inside the editor toolbar */
  .conn-badge {
    display: none;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 0 8px;
    color: #d4a72c;
  }
  .conn-badge.visible { display: inline-flex; align-items: center; }
  .conn-badge.offline { color: var(--danger); }
  .conn-badge::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    background: currentColor;
  }

  /* ── layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── column resizers ── */
  .resizer {
    flex-shrink: 0;
    width: 3px;
    margin-left: -1px;       /* center the 3px hit area over the 1px border */
    cursor: col-resize;
    background: transparent;
    transition: background 0.15s;
    position: relative;
    z-index: 5;
    user-select: none;
    touch-action: none;
  }
  .resizer:hover,
  .resizer.dragging { background: rgba(124,106,247,0.4); }
  body.resizing { cursor: col-resize; user-select: none; }

  /* ── sidebar ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }
  .sidebar-section {
    height: 41px;
    padding: 0 8px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-section-actions { display: flex; align-items: center; gap: 2px; }

  /* Collapsed sidebar — hide sidebar and its resizer, reveal expand button */
  #sidebar-expand-btn, #sidebar-switcher-btn, #sidebar-search-btn { display: none; }
  body.sidebar-collapsed .sidebar { display: none; }
  body.sidebar-collapsed .resizer[data-target="sidebar"] { display: none; }
  body.sidebar-collapsed #sidebar-expand-btn,
  body.sidebar-collapsed #sidebar-search-btn,
  body.sidebar-collapsed #sidebar-switcher-btn { display: inline-flex; }
  .sidebar-list { flex: 1; overflow-y: auto; padding-bottom: 8px; min-height: 0; }

  /* Pending notebook invites — appears only when invites is non-empty */
  .invites-section {
    border-top: 1px solid var(--border);
    padding: 8px 12px 10px;
    flex-shrink: 0;
    background: rgba(124,106,247,0.04);
  }
  .invites-header {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .invites-list { display: flex; flex-direction: column; gap: 6px; }
  .invite-item {
    display: flex; flex-direction: column; gap: 4px;
    padding: 8px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
  }
  .invite-title { color: var(--text); font-weight: 500; }
  .invite-from { color: var(--text-muted); font-size: 11px; font-family: var(--mono); word-break: break-all; }
  .invite-actions { display: flex; gap: 6px; margin-top: 2px; }
  .invite-actions .btn { flex: 1; font-size: 12px; padding: 4px 8px; }
  .nb-item {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px 6px;
    padding: 6px 6px;
    cursor: pointer;
    border-radius: 4px;
    margin: 1px 4px;
    font-size: 13px;
    transition: background 0.1s;
    user-select: none;
  }
  .nb-item:hover { background: var(--surface2); }
  .nb-item.active { background: var(--accent); color: #fff; }
  .nb-item .nb-icon { flex-shrink: 0; display: flex; align-items: center; }
  .nb-item .nb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nb-item .nb-flag {
    width: 100%;
    font-size: 10px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-left: 22px;
    pointer-events: none;
    user-select: none;
  }
  .nb-item.active .nb-flag { color: rgba(255,255,255,0.6); }

  /* ── sidebar bottom actions ── */
  .sidebar-actions {
    border-top: 1px solid var(--border);
    padding: 4px;
    flex-shrink: 0;
    background: var(--surface);
  }
  .sidebar-action {
    display: flex; align-items: center; gap: 8px;
    width: 100%;
    background: none; border: none; cursor: pointer;
    color: var(--text-muted);
    font-size: 12px; font-family: var(--font);
    padding: 6px 10px; border-radius: 4px;
    text-align: left;
  }
  .sidebar-action:hover { background: var(--surface2); color: var(--text); }
  .sidebar-action[disabled] { opacity: 0.4; cursor: default; }
  .sidebar-action[disabled]:hover { background: none; color: var(--text-muted); }
  .sidebar-action.connected { color: var(--success); }
  .sidebar-action.connected:hover { background: var(--surface2); color: var(--success); }
  .sidebar-version {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1;
    color: var(--text-muted);
    opacity: 0.6;
    user-select: none;
    margin-left: auto;
  }

  /* mobile hamburger for add/import actions */
  .sidebar-brand .sidebar-menu-btn { margin-left: auto; display: none; }
  body.sidebar-menu-open .sidebar-brand .sidebar-menu-btn {
    background: var(--surface2);
    color: var(--text);
  }
  body.sidebar-menu-open .sidebar-brand .sidebar-menu-btn .icon { opacity: 0.95; }

  /* ── SVG icons ── */
  .icon {
    width: 16px; height: 16px;
    stroke: currentColor; fill: none;
    stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
    opacity: 0.65;
  }
  .icon-btn:hover .icon { opacity: 0.95; }

  /* ── icon button ── */
  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); padding: 4px; border-radius: 3px;
    line-height: 1; transition: color 0.15s, background 0.15s;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { color: var(--text); background: var(--surface2); }

  /* ── font-size toolbar buttons (A- / A+) ── */
  .font-size-btn { font-family: var(--font); font-weight: 600; }
  .font-size-btn .fs-glyph {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; line-height: 1;
    opacity: 0.65;
  }
  .font-size-btn:hover .fs-glyph { opacity: 0.95; }
  .font-size-btn .fs-glyph-sm { font-size: 11px; }
  .font-size-btn .fs-glyph-lg { font-size: 15px; }

  /* ── notes list panel ── */
  .notes-panel {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .notes-panel-header {
    height: 41px;
    padding: 0 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  #folder-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .panel-actions { display: flex; align-items: center; gap: 6px; }
  .notes-panel-footer { display: none; }
  .editor-panel-footer { display: none; }
  .nb-lock { width: 12px; height: 12px; color: var(--text-muted); flex-shrink: 0; margin-left: 2px; }
  .nb-item.active .nb-lock { color: rgba(255,255,255,0.8); }
  .notes-list { flex: 1; overflow-y: auto; }
  .item-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-item);
    transition: background 0.1s;
  }
  .item-row .item-icon { margin-top: 1px; }
  .item-row:hover { background: var(--surface2); }
  .item-row.active { background: rgba(124,106,247,0.15); border-left: 2px solid var(--accent); padding-left: 10px; }
  .item-icon { flex-shrink: 0; line-height: 1; display: flex; align-items: center; }
  .item-body { flex: 1; min-width: 0; }
  .item-title-row { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
  .item-title { flex: 1; font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-date { font-size: 11px; color: var(--text-muted); flex-shrink: 0; opacity: 0.7; }
  .item-preview {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-row.is-folder .item-title { font-weight: 500; }
  .item-chevron {
    flex-shrink: 0;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    margin-top: 1px;
  }
  .item-chevron .icon { width: 14px; height: 14px; }
  .item-row.is-folder:hover .item-chevron .icon { opacity: 0.95; }

  /* Folder icon swaps to an ellipsis action on row hover */
  .item-row.is-folder .item-icon {
    border-radius: 3px;
    transition: background 0.15s;
  }
  .item-row.is-folder .item-icon .ellipsis-glyph { display: none; }
  .item-row.is-folder:hover .item-icon { cursor: pointer; }
  .item-row.is-folder:hover .item-icon .folder-glyph { display: none; }
  .item-row.is-folder:hover .item-icon .ellipsis-glyph { display: inline-flex; }
  .item-row.is-folder:hover .item-icon:hover { background: var(--surface); }
  .item-row.is-folder .item-icon.menu-open .folder-glyph { display: none; }
  .item-row.is-folder .item-icon.menu-open .ellipsis-glyph { display: inline-flex; }
  .item-row.is-folder .item-icon.menu-open { background: var(--surface); }

  /* Folder action popover (rename / delete) */
  .folder-action-menu {
    display: none;
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: var(--shadow-md);
    min-width: 180px;
    white-space: nowrap;
    z-index: 150;
    padding: 4px 0;
  }
  .folder-action-menu.open { display: block; }
  .folder-action-menu button {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    text-align: left;
    background: none; border: none; cursor: pointer;
    color: var(--text);
    padding: 7px 12px;
    font-size: 13px;
    font-family: var(--font);
  }
  .folder-action-menu button:hover { background: var(--surface2); }
  .folder-action-menu button.danger { color: var(--danger); }
  .folder-action-menu button.danger:hover { background: rgba(224,92,92,0.1); }
  .folder-action-menu .menu-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; flex-shrink: 0;
    opacity: 0.7;
  }
  .folder-action-menu button:hover .menu-icon { opacity: 0.95; }
  .empty-state { padding: 24px 12px; text-align: center; color: var(--text-muted); font-size: 12px; }
  .folder-up-btn { color: var(--text-muted); }
  .folder-up-btn:hover { color: var(--text); }

  /* ── editor ── */
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .editor-toolbar {
    height: 41px;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .editor-toolbar .spacer { flex: 1; }
  /* Empty status spans (no save text, no rev, no conn label) shouldn't
     consume gap. Hiding them collapses the surrounding 8px flex gap. */
  .editor-toolbar .save-status:empty,
  .editor-toolbar .note-rev:empty,
  .editor-toolbar .conn-badge:empty,
  .editor-toolbar .note-breadcrumb:empty { display: none; }

  /* Floating bottom-right toolbar on desktop */
  @media (min-width: 641px) {
    .editor-toolbar {
      position: fixed;
      bottom: 0;
      right: 0;
      height: auto;
      width: auto;
      padding: 4px 6px;
      gap: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-right: 0;
      border-bottom: 0;
      border-top-left-radius: 8px;
      z-index: 50;
    }
    .editor-toolbar .spacer,
    .editor-toolbar .back-btn { display: none; }
    .editor-toolbar .save-status { padding: 0 4px; }
    .editor-toolbar .note-rev { padding: 0 4px; }
    .editor-toolbar .note-breadcrumb {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      max-width: 320px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      direction: rtl;
      text-align: left;
      unicode-bidi: plaintext;
      padding: 0 6px;
    }
    .editor-toolbar .overflow-menu {
      top: auto;
      bottom: 100%;
      margin-top: 0;
      margin-bottom: 6px;
    }
    /* Pin toggle + formatting group, hidden on desktop until revealed */
    .editor-toolbar .fmt-pin-btn { display: inline-flex; }
    /* Chevron points LEFT when closed (reveal cue), RIGHT when open. */
    .editor-toolbar .fmt-pin-btn .icon {
      transition: transform 0.15s;
      transform: rotate(180deg);
    }
    body.format-pinned .editor-toolbar .fmt-pin-btn .icon,
    body.format-hovered .editor-toolbar .fmt-pin-btn .icon {
      transform: rotate(0);
    }
    .editor-toolbar-fmt {
      display: none;
      align-items: center;
      gap: 2px;
    }
    body.format-pinned .editor-toolbar-fmt,
    body.format-hovered .editor-toolbar-fmt {
      display: inline-flex;
    }
    /* Vertical separator between the format group and the static right
       cluster, only visible when the format group is showing. */
    .fmt-separator { display: none; }
    body.format-pinned .fmt-separator,
    body.format-hovered .fmt-separator {
      display: inline-block;
      width: 1px;
      height: 18px;
      margin: 0 10px;
      background: var(--border);
      opacity: 0.7;
    }
    .editor-toolbar-fmt .fmt-glyph {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; font-size: 13px; line-height: 1;
      opacity: 0.65; font-family: var(--font);
    }
    .editor-toolbar-fmt .fmt-btn:hover .fmt-glyph { opacity: 0.95; }
    .editor-toolbar-fmt .fmt-bold { font-weight: 700; }
    .editor-toolbar-fmt .fmt-italic { font-style: italic; font-family: Georgia, serif; }
    .editor-toolbar-fmt .fmt-heading { font-weight: 700; }
  }
  /* Mobile: pin button + inline fmt hidden (footer handles it there) */
  @media (max-width: 640px) {
    .editor-toolbar .fmt-pin-btn,
    .editor-toolbar-fmt,
    .fmt-separator { display: none !important; }
  }
  #note-title-input {
    display: block;
    width: 100%;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: calc(var(--editor-font-size) * 1.875);
    font-weight: 700;
    line-height: 1.2;
    padding: 0;
    margin: 0 0 24px 0;
    box-sizing: border-box;
  }
  #note-title-input::placeholder { color: var(--text-muted); font-weight: 700; }
  /* Folder path above the title — desktop only; mobile keeps its in-toolbar
     breadcrumb (next to the back button). Always renders (even when empty)
     so the title sits at a fixed vertical position regardless of whether a
     note is selected or what folder it lives in. */
  .note-path {
    display: none;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.4;
    height: 17px;
    color: var(--text-muted);
    opacity: 0.7;
    margin: 0 0 6px 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    user-select: none;
  }
  @media (min-width: 641px) {
    .note-path { display: block; }
    /* Hide the breadcrumb in the floating toolbar on desktop — it lives
       above the title now. */
    .editor-toolbar .note-breadcrumb { display: none !important; }
  }
  .save-btn {
    background: var(--accent); border: none; color: #fff;
    padding: 5px 12px; border-radius: 5px; cursor: pointer;
    font-size: 12px; font-weight: 600;
    transition: background 0.15s, opacity 0.15s;
  }
  .save-btn:hover { background: var(--accent-hover); }
  .save-btn:disabled { opacity: 0.4; cursor: default; }
  .save-status { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
  .note-rev { font-family: var(--mono); font-size: 11px; color: var(--text-muted); opacity: 0.6; user-select: none; }

  /* ── conflict / save-error banner ── */
  .conflict-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: rgba(212,167,44,0.12);
    border-bottom: 1px solid rgba(212,167,44,0.35);
    font-size: 12px;
    color: #d4a72c;
    flex-shrink: 0;
  }
  .conflict-banner .conflict-msg { flex: 1; }
  .conflict-banner .btn { padding: 4px 10px; font-size: 12px; }
  .conflict-banner.error {
    background: rgba(224,92,92,0.1);
    border-bottom-color: rgba(224,92,92,0.35);
    color: var(--danger);
  }

  /* ── overflow menu ── */
  .overflow-wrap { position: relative; }
  .overflow-menu {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: var(--shadow-md);
    min-width: 180px;
    white-space: nowrap;
    z-index: 50;
    padding: 4px 0;
  }
  .overflow-menu.open { display: block; }
  .overflow-menu button {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--text);
    padding: 7px 12px;
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
  }
  .overflow-menu button:hover { background: var(--surface2); }
  .overflow-menu button.danger { color: var(--danger); }
  .overflow-menu button.danger:hover { background: rgba(224,92,92,0.1); }
  .overflow-menu .menu-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px; height: 16px;
    flex-shrink: 0;
    opacity: 0.7;
  }
  .overflow-menu button:hover .menu-icon { opacity: 0.95; }
  .overflow-menu .menu-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 6px;
  }
  .overflow-menu .menu-section-label {
    padding: 6px 12px 2px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    user-select: none;
  }

  .editor-scroll {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    background: var(--bg);
  }
  .editor-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 56px 96px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  @media (min-width: 641px) and (max-width: 980px) {
    .editor-wrap { padding: 48px 24px 96px; }
  }
  #editor {
    display: block;
    width: 100%;
    resize: none;
    background: transparent;
    color: var(--text);
    border: none;
    outline: none;
    padding: 0;
    margin: 0;
    font-family: var(--mono);
    font-size: var(--editor-font-size);
    line-height: 1.7;
    min-height: 60vh;
    overflow: hidden;
    box-sizing: border-box;
  }
  #editor::placeholder { color: var(--text-muted); font-family: var(--font); }

  #preview {
    padding: 0;
    font-size: var(--editor-font-size);
    line-height: 1.7;
    min-height: 60vh;
  }

  /* ── wiki-links ── */
  .wiki-link {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dashed rgba(124,106,247,0.35);
    padding-bottom: 1px;
    cursor: pointer;
  }
  .wiki-link:hover {
    border-bottom-color: var(--accent);
    background: rgba(124,106,247,0.08);
  }
  .wiki-link.unresolved {
    color: var(--text-muted);
    border-bottom-color: rgba(136,136,136,0.4);
  }
  .wiki-link.unresolved:hover {
    color: var(--text);
    background: rgba(136,136,136,0.1);
  }

  /* ── backlinks section ── */
  .backlinks-section {
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .backlinks-section.position-top {
    margin-top: 0;
    margin-bottom: 40px;
    padding-top: 0;
    padding-bottom: 20px;
    border-top: none;
    border-bottom: 1px solid var(--border);
  }
  .backlinks-header {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .backlink-item {
    display: block;
    padding: 10px 0;
    cursor: pointer;
    border-bottom: 1px solid var(--border-item);
  }
  .backlink-item:last-child { border-bottom: none; }
  .backlink-item:hover .backlink-title { color: var(--accent); }
  .backlink-title {
    font-size: 13.5px;
    color: var(--text);
    margin-bottom: 2px;
  }
  .backlink-path {
    font-size: 11.5px;
    color: var(--text-muted);
    font-family: var(--mono);
  }
  .menu-check {
    font-family: var(--font);
    font-size: 13px;
    color: var(--accent);
    opacity: 1 !important;
  }

  /* ── history panel (right slide-in) ── */
  .history-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 340px;
    max-width: 100vw;
    background: var(--surface);
    border-left: 1px solid var(--border);
    box-shadow: -4px 0 16px rgba(0,0,0,0.18);
    z-index: 170;
    display: none;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.18s ease;
  }
  .history-panel.open { display: flex; transform: translateX(0); }
  /* Reserve space on the right for the panel so it doesn't overlap the
     banner buttons or the floating format strip. Skip on narrow viewports
     where the panel takes the full width. */
  @media (min-width: 700px) {
    body.history-open .editor-panel { padding-right: 340px; }
  }
  .history-panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 14px 10px;
    border-bottom: 1px solid var(--border);
  }
  .history-panel-header h3 {
    margin: 0;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    flex: 1;
  }
  .history-panel-header .icon-btn { padding: 4px; }
  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .history-item {
    display: block;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-item);
    font-size: 13px;
    color: var(--text);
  }
  .history-item:hover { background: var(--surface2); }
  .history-item.active { background: var(--surface2); }
  .history-item-meta {
    display: flex;
    gap: 8px;
    align-items: baseline;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .history-item-meta .rev-num {
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11.5px;
  }
  .history-item-title {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-empty {
    padding: 20px 14px;
    color: var(--text-muted);
    font-size: 12.5px;
    line-height: 1.5;
  }
  /* Banner shown above editor when viewing a historical revision */
  .history-banner {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: rgba(124,106,247,0.12);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text);
  }
  .history-banner.open { display: flex; }
  .history-banner .banner-msg { flex: 1; }
  .history-banner .banner-msg strong { color: var(--accent); font-family: var(--mono); }

  /* ── wiki-link autocomplete popover ── */
  .wiki-autocomplete {
    display: none;
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: var(--shadow-md);
    min-width: 220px;
    max-width: 360px;
    max-height: 240px;
    overflow-y: auto;
    z-index: 180;
    padding: 4px 0;
    font-family: var(--font);
  }
  .wiki-autocomplete.open { display: block; }
  .wiki-autocomplete-item {
    padding: 6px 12px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .wiki-autocomplete-item:hover,
  .wiki-autocomplete-item.selected { background: var(--surface2); }
  .wiki-autocomplete-item .hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 8px;
    font-family: var(--mono);
  }
  .wiki-autocomplete-empty {
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .wiki-autocomplete-empty kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0 4px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text);
  }
  #preview h1 { font-size: 1.8em; margin: 0.5em 0 0.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
  #preview h2 { font-size: 1.4em; margin: 0.5em 0 0.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
  #preview h3 { font-size: 1.15em; margin: 0.5em 0 0.3em; }
  #preview h4, #preview h5, #preview h6 { font-size: 1em; margin: 0.4em 0 0.2em; }
  #preview p { margin: 0.5em 0; }
  #preview pre { background: var(--surface); padding: 12px 16px; border-radius: 6px; overflow-x: auto; margin: 0.6em 0; }
  #preview code { font-family: var(--mono); font-size: 0.9em; }
  #preview :not(pre) > code { background: var(--surface2); padding: 2px 5px; border-radius: 3px; }
  #preview blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: var(--text-muted); margin: 0.5em 0; }
  #preview ul, #preview ol { padding-left: 1.5em; margin: 0.4em 0; }
  #preview li { margin: 0.15em 0; }
  /* Themed task-list checkboxes — square outline, accent fill when checked. */
  #preview li.task-item {
    list-style: none;
    display: flex;
    align-items: baseline;
    gap: 0.5em;
  }
  #preview li.task-item > input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    flex: 0 0 auto;
    width: 16px;
    height: 16px;
    margin: 0;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease;
    position: relative;
    transform: translateY(3px);
  }
  #preview li.task-item > input[type="checkbox"]:hover:not(:disabled) {
    border-color: var(--accent);
  }
  #preview li.task-item > input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  #preview li.task-item > input[type="checkbox"]:checked::after {
    content: "";
    position: absolute;
    left: 4px;
    top: 1px;
    width: 4px;
    height: 8px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  #preview li.task-item > input[type="checkbox"]:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }
  /* Strike-through and dim the label text once a task is checked. */
  #preview li.task-item:has(> input[type="checkbox"]:checked) {
    color: var(--text-muted);
    text-decoration: line-through;
  }
  #preview a { color: var(--accent); text-decoration: none; }
  #preview a:hover { text-decoration: underline; }
  #preview hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
  #preview img { max-width: 100%; border-radius: 6px; }
  #preview table { border-collapse: collapse; margin: 0.6em 0; }
  #preview th, #preview td { border: 1px solid var(--border); padding: 6px 12px; }
  #preview th { background: var(--surface); }

  /* ── modal ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    width: 320px;
    box-shadow: var(--shadow);
  }
  .modal h3 { font-size: 14px; margin-bottom: 14px; }
  .modal input, .modal select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 8px 10px; border-radius: 5px;
    font-size: 13px; font-family: var(--font); outline: none;
    margin-bottom: 12px;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal-status {
    font-size: 12px;
    color: var(--text-muted);
    min-height: 16px;
    margin: -8px 0 12px;
    line-height: 1.4;
  }
  .modal-status.warn { color: var(--danger); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
  .modal-choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .modal-choice {
    display: flex; flex-direction: column; gap: 2px;
    padding: 10px 12px; border-radius: 6px;
    background: var(--bg); border: 1px solid var(--border);
    cursor: pointer; text-align: left; color: var(--text);
  }
  .modal-choice:hover { border-color: var(--accent); }
  .modal-choice-title { font-size: 13px; font-weight: 500; }
  .modal-choice-desc { font-size: 11px; color: var(--text-muted); }
  .btn { padding: 6px 14px; border-radius: 5px; font-size: 13px; cursor: pointer; border: none; font-family: var(--font); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--text-muted); }

  /* ── quick switcher ── */
  .switcher-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    z-index: 300;
    padding-top: 12vh;
    justify-content: center;
    align-items: flex-start;
  }
  .switcher-backdrop.open { display: flex; }
  .switcher {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    width: 560px;
    max-width: calc(100vw - 24px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .switcher-input-wrap {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .switcher-input-icon { width: 16px; height: 16px; opacity: 0.55; flex-shrink: 0; }
  .switcher-input-wrap input {
    flex: 1;
    background: none; border: none; outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    padding: 0;
    min-width: 0;
  }
  .switcher-input-wrap input::placeholder { color: var(--text-muted); }
  .switcher-results {
    max-height: 420px;
    overflow-y: auto;
    padding: 4px 0;
  }
  .switcher-result {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px;
    cursor: pointer;
  }
  .switcher-result.selected { background: var(--surface2); }
  .switcher-result:hover { background: var(--surface2); }
  .switcher-result .result-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px;
    flex-shrink: 0;
    opacity: 0.65;
  }
  .switcher-result-text { display: flex; flex-direction: column; min-width: 0; flex: 1; }
  .switcher-result-label {
    font-size: 13.5px;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .switcher-result-subtitle {
    font-size: 11.5px;
    color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .switcher-empty {
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }
  .switcher-hint {
    padding: 7px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 14px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .switcher-hint kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0 4px;
    font-family: var(--mono);
    font-size: 10px;
    margin-right: 3px;
  }

  /* ── full-text search specifics (built on switcher classes) ── */
  .search-results { max-height: 460px; }
  .search-result {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-item);
  }
  .search-result:last-child { border-bottom: none; }
  .search-result.selected,
  .search-result:hover { background: var(--surface2); }
  .search-result-title {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .search-result-snippet {
    font-size: 12.5px;
    color: var(--text-muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .search-result-snippet mark {
    background: rgba(124,106,247,0.28);
    color: var(--text);
    padding: 0 2px;
    border-radius: 2px;
  }
  .search-result-meta {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── connect panel ── */
  #connect-panel {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    flex-direction: column; gap: 12px;
  }
  #connect-panel h2 { font-size: 18px; margin-bottom: 4px; }
  #connect-panel p { font-size: 13px; color: var(--text-muted); }
  #connect-panel input {
    width: 300px; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 9px 12px; border-radius: 6px;
    font-size: 13px; font-family: var(--font); outline: none;
  }
  #connect-panel input:focus { border-color: var(--accent); }
  #connect-error { color: var(--danger); font-size: 12px; min-height: 16px; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── back button (hidden on desktop) ── */
  .back-btn {
    display: none;
    background: none; border: none; cursor: pointer;
    color: var(--accent); font-size: 13px; font-family: var(--font);
    padding: 2px 6px; margin-right: 4px; border-radius: 3px;
  }
  .back-btn:hover { background: var(--surface2); }

  /* ── zen mode ── */
  #zen-exit-btn {
    display: none;
    position: fixed;
    bottom: 0; right: 0;
    z-index: 200;
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: 0;
    border-bottom: 0;
    border-top-left-radius: 8px;
    padding: 10px 12px;
  }
  body.zen-mode .sidebar,
  body.zen-mode .notes-panel,
  body.zen-mode .resizer,
  body.zen-mode .editor-toolbar { display: none; }
  body.zen-mode .editor-panel { flex: 1; }
  body.zen-mode #zen-exit-btn { display: inline-flex; }

  /* ── embed mode (single-notebook, no sidebar) ── */
  body.embed-mode .sidebar { display: none !important; }
  body.embed-mode .resizer[data-target="sidebar"] { display: none !important; }
  body.embed-mode #sidebar-expand-btn { display: none !important; }
  /* Import buttons live in the gear menu only when embedded; the sidebar
     entries below are also unreachable since the sidebar itself is hidden. */
  .nb-menu-import { display: none; }
  body.embed-mode .nb-menu-import { display: flex; }

  /* ── mobile responsive ── */
  @media (max-width: 640px) {
    .back-btn { display: inline-flex; align-items: center; }

    .layout { position: relative; }
    .resizer { display: none; }
    body.sidebar-collapsed .sidebar { display: flex; }
    #sidebar-expand-btn,
    #sidebar-search-btn,
    #sidebar-switcher-btn { display: none !important; }
    .sidebar-section .icon-btn { display: none; }
    .sidebar, .notes-panel, .editor-panel {
      position: absolute;
      inset: 0;
      width: 100% !important;
      border: none !important;
      transition: transform 0.2s ease;
    }
    body.loading .sidebar,
    body.loading .notes-panel,
    body.loading .editor-panel { transition: none; }

    /* Default: sidebar visible, others off-screen right */
    .sidebar  { transform: translateX(0); z-index: 3; }
    .notes-panel { transform: translateX(100%); z-index: 2; }
    .editor-panel { transform: translateX(100%); z-index: 1; }

    /* View: notes-list */
    .layout[data-view="notes"] .sidebar { transform: translateX(-100%); }
    .layout[data-view="notes"] .notes-panel { transform: translateX(0); }
    .layout[data-view="notes"] .editor-panel { transform: translateX(100%); }

    /* View: editor */
    .layout[data-view="editor"] .sidebar { transform: translateX(-100%); }
    .layout[data-view="editor"] .notes-panel { transform: translateX(-100%); }
    .layout[data-view="editor"] .editor-panel { transform: translateX(0); }

    header h1 { font-size: 16px; }
    #ship-label { font-size: 12px; }

    /* Bigger tap targets across the board */
    .icon-btn { padding: 10px; }
    .icon-btn .icon { width: 20px; height: 20px; }
    .font-size-btn .fs-glyph { width: 20px; height: 20px; }
    .font-size-btn .fs-glyph-sm { font-size: 14px; }
    .font-size-btn .fs-glyph-lg { font-size: 19px; }
    .back-btn { font-size: 17px; padding: 10px 12px; }

    /* Hamburger toggles the existing actions cluster; it sits above the
       brand row in DOM order, so it naturally "pops out" upward. */
    .sidebar-actions { display: none; }
    body.sidebar-menu-open .sidebar-actions { display: block; }
    .sidebar-brand .sidebar-menu-btn { display: inline-flex; }
    /* Version sits next to brand name on mobile; hamburger takes the right */
    .sidebar-version { margin-left: 0; }

    .sidebar-section { font-size: 12px; height: 52px; padding: 0 10px; }
    .nb-item { font-size: 17px; padding: 12px 10px; }
    .nb-item .nb-icon .icon { width: 20px; height: 20px; }
    .sidebar-action { font-size: 15px; padding: 14px 12px; gap: 12px; }

    .notes-panel-header { height: 52px; font-size: 17px; padding: 0 8px; gap: 4px; }
    #folder-label { font-size: 17px; }
    .item-row { padding: 14px 12px; gap: 12px; }
    .item-icon .icon { width: 22px; height: 22px; }
    .item-title { font-size: 17px; }
    .item-date { font-size: 13px; }
    .item-preview { font-size: 14px; }
    .empty-state { font-size: 14px; }

    /* Contextual bottom footer on the notebook/notes view */
    .notes-panel-footer {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    /* Gear on the far left; create buttons on the right */
    .notes-panel-footer .panel-actions { flex: 1; }
    .notes-panel-footer #notebook-settings-wrap { margin-right: auto; }
    /* Gear menu pops upward and left-aligns with its button in the bottom footer */
    .notes-panel-footer #notebook-settings-menu {
      top: auto;
      bottom: 100%;
      left: 0;
      right: auto;
      margin-top: 0;
      margin-bottom: 4px;
    }

    /* Editor bottom footer on mobile — formatting shortcuts since the
       phone keyboard can't easily trigger ⌘B / ⌘I / ⌘K. */
    .editor-panel-footer {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .editor-panel-footer .fmt-btn { padding: 10px 14px; min-width: 44px; }
    .editor-panel-footer .fmt-glyph {
      display: inline-flex; align-items: center; justify-content: center;
      width: 20px; height: 20px; font-size: 16px; line-height: 1;
      opacity: 0.65; font-family: var(--font);
    }
    .editor-panel-footer .fmt-btn:hover .fmt-glyph,
    .editor-panel-footer .fmt-btn:active .fmt-glyph { opacity: 0.95; }
    .editor-panel-footer .fmt-bold { font-weight: 700; }
    .editor-panel-footer .fmt-italic { font-style: italic; font-family: Georgia, serif; }
    .editor-panel-footer .fmt-heading { font-weight: 700; }

    .editor-toolbar { height: 52px; padding: 0 8px; gap: 4px; }
    .save-status { font-size: 13px; }
    .note-rev { font-size: 12px; }
    .note-breadcrumb {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      min-width: 0;
      max-width: 45vw;
      overflow: hidden;
      white-space: nowrap;
      padding: 0 2px;
    }
    .editor-wrap { padding: 24px 18px 72px; max-width: 100%; }
    #note-title-input { font-size: calc(var(--editor-font-size) * 1.5); margin-bottom: 16px; }
    #editor { line-height: 1.65; }

    .sidebar { overflow-y: auto; }
    .notes-panel { overflow-y: auto; }

    .modal { width: calc(100vw - 32px); max-width: 320px; }
  }
</style>

      </div>
    </div>
    <div class="sidebar-list" id="notebooks-list"></div>

      <div class="invites-header">Invites</div>
      <div class="invites-list" id="invites-list"></div>
    </div>
    <div class="sidebar-actions">
      <button class="sidebar-action" onclick="openModal(&quot;add-notebook&quot;)"><svg class="icon"><use href="#i-plus"/></svg> Add notebook</button>
      <button class="sidebar-action" id="import-files-btn" onclick="triggerImport(false)"><svg class="icon"><use href="#i-download"/></svg> Import files</button>
      <button class="sidebar-action" id="import-folder-btn" onclick="triggerImport(true)"><svg class="icon"><use href="#i-folder-down"/></svg> Import folder</button>

    </div>
    <div class="sidebar-brand">
      <svg class="icon brand-icon"><use href="#i-notebook"/></svg>
      <div class="brand-text">
        <span class="brand-name">Notes</span>
        <span class="sidebar-version">alpha v0.12.0</span>
      </div>
      <button class="icon-btn sidebar-menu-btn" onclick="toggleSidebarMenu()" title="More"><svg class="icon"><use href="#i-menu"/></svg></button>
    </div>
  </div>
