[package]
name = "signal-core"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
argon2 = "0.5"
getrandom = { version = "0.2", features = ["js"] }
zeroize = "1"

[profile.release]
opt-level = "s"
lto = true

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
