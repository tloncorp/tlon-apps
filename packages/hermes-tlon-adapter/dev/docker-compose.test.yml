services:
  fake-model:
    image: node:22-bookworm-slim
    working_dir: /workspace/tlon-apps
    command: ["node", "packages/openclaw/test/support/fake-model/server.mjs"]
    volumes:
      - ../../..:/workspace/tlon-apps
    expose:
      - "4000"
    ports:
      - "${FAKE_MODEL_PORT:-4000}:4000"

  # Both fakezod ships in one container so they share fake Ames state.
  ships:
    image: ubuntu:22.04
    command:
      - bash
      - -c
      - |
        set -e
        apt-get update && apt-get install -y curl xz-utils
        cd /data

        echo "==> Downloading zod..."
        curl -fSL https://bootstrap.urbit.org/rube-zod25.tgz -o rube-zod25.tgz || { echo "Failed to download zod"; exit 1; }
        tar xzf rube-zod25.tgz || { echo "Failed to extract zod"; exit 1; }

        echo "==> Downloading ten..."
        curl -fSL https://bootstrap.urbit.org/rube-ten25.tgz -o rube-ten25.tgz || { echo "Failed to download ten"; exit 1; }
        tar xzf rube-ten25.tgz || { echo "Failed to extract ten"; exit 1; }

        echo "==> Downloading mug..."
        curl -fSL https://bootstrap.urbit.org/rube-mug25.tgz -o rube-mug25.tgz || { echo "Failed to download mug"; exit 1; }
        tar xzf rube-mug25.tgz || { echo "Failed to extract mug"; exit 1; }

        echo "==> Downloading vere..."
        curl -fSL https://urbit.org/install/linux-x86_64/latest | tar xz || { echo "Failed to download vere"; exit 1; }
        VERE=$$(ls -1 vere-*-linux-x86_64 | head -1)
        chmod +x $$VERE
        echo "==> Using vere: $$VERE"

        echo "==> Starting ships..."
        ./$$VERE -t --loom 31 --http-port 8080 zod &
        ./$$VERE -t --loom 31 --http-port 8081 ten &
        ./$$VERE -t --loom 31 --http-port 8082 mug
    volumes:
      - ships-data:/data
    ports:
      - "${ZOD_PORT:-8080}:8080"
      - "${TEN_PORT:-8081}:8081"
      - "${MUG_PORT:-8082}:8082"

  hermes-tlon:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HERMES_AGENT_REPO: ${HERMES_AGENT_REPO:-https://github.com/NousResearch/hermes-agent.git}
        HERMES_AGENT_REF: ${HERMES_AGENT_REF:-main}
    environment:
      HERMES_HOME: /workspace/hermes-home
      HERMES_AGENT_DIR: /opt/hermes-agent
      HERMES_VENV: /opt/hermes-venv
      HERMES_PLUGINS_DEBUG: ${HERMES_PLUGINS_DEBUG:-0}
      HERMES_GATEWAY_ARGS: ${HERMES_GATEWAY_ARGS:---replace}
      HERMES_MODEL_PROVIDER: custom
      HERMES_MODEL: tlon-test-scripted
      HERMES_MODEL_BASE_URL: http://fake-model:4000/v1
      HERMES_MODEL_API_KEY: TEST_KEY
      HERMES_MODEL_API_MODE: chat_completions
      PYTHONUNBUFFERED: "1"
      TLON_APPS_DIR: /workspace/tlon-apps
      TLON_ADAPTER_DIR: /workspace/tlon-apps/packages/hermes-tlon-adapter
      TLON_SKILL_DIR: /workspace/tlon-apps/packages/tlon-skill
      TLON_CLI: /workspace/hermes-dev/bin/tlon
      TLON_NODE_URL: http://ships:8080
      TLON_NODE_ID: ~zod
      TLON_ACCESS_CODE: lidlut-tabwed-pillex-ridrup
      TLON_OWNER_SHIP: ~ten
      TLON_DM_ALLOWLIST: ~ten
      TLON_GATEWAY_STATUS: "false"
      TLON_SSE_READ_TIMEOUT_SECONDS: "30"
      TLON_TELEMETRY: "false"
    depends_on:
      - fake-model
      - ships
    volumes:
      - ../../..:/workspace/tlon-apps
      - hermes-home:/workspace/hermes-home
      - hermes-dev:/workspace/hermes-dev
      - tlon-apps-node-modules:/workspace/tlon-apps/node_modules
      - tlon-skill-node-modules:/workspace/tlon-apps/packages/tlon-skill/node_modules
      - tlon-api-node-modules:/workspace/tlon-apps/packages/api/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  ships-data:
  hermes-home:
  hermes-dev:
  tlon-apps-node-modules:
  tlon-skill-node-modules:
  tlon-api-node-modules:
