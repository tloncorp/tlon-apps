# Override for local integration tests - adds tlonbot volume mount
# Used with: docker compose -f docker-compose.test.yml -f docker-compose.local.yml
# TLONBOT_DIR defaults to a tlonbot checkout sitting next to the tlon-apps
# monorepo root (this file lives at packages/openclaw/dev/).
services:
  openclaw:
    volumes:
      - ${TLONBOT_DIR:-../../../../tlonbot}:/workspace/tlonbot
