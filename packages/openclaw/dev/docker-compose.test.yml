services:
  fake-model:
    image: node:22-bookworm-slim
    working_dir: /workspace/openclaw-tlon
    command: ["node", "test/support/fake-model/server.mjs"]
    volumes:
      - ..:/workspace/openclaw-tlon
    expose:
      - "4000"
    ports:
      - "${FAKE_MODEL_PORT:-4000}:4000"

  # Both fakezod ships in one container (they need shared fake ames)
  ships:
    image: ubuntu:22.04
    command:
      - bash
      - -c
      - |
        set -e
        apt-get update && apt-get install -y curl xz-utils
        cd /data

        echo "==> Downloading zod..."
        curl -fSL https://bootstrap.urbit.org/rube-zod27.tgz -o rube-zod27.tgz || { echo "Failed to download zod"; exit 1; }
        ls -la rube-zod27.tgz
        echo "==> Extracting zod..."
        tar xzf rube-zod27.tgz || { echo "Failed to extract zod"; exit 1; }

        echo "==> Downloading ten..."
        curl -fSL https://bootstrap.urbit.org/rube-ten27.tgz -o rube-ten27.tgz || { echo "Failed to download ten"; exit 1; }
        ls -la rube-ten27.tgz
        echo "==> Extracting ten..."
        tar xzf rube-ten27.tgz || { echo "Failed to extract ten"; exit 1; }

        echo "==> Downloading mug..."
        curl -fSL https://bootstrap.urbit.org/rube-mug27.tgz -o rube-mug27.tgz || { echo "Failed to download mug"; exit 1; }
        ls -la rube-mug27.tgz
        echo "==> Extracting mug..."
        tar xzf rube-mug27.tgz || { echo "Failed to extract mug"; exit 1; }

        echo "==> Downloading vere..."
        curl -fSL https://urbit.org/install/linux-x86_64/latest | tar xz || { echo "Failed to download vere"; exit 1; }
        VERE=$$(ls -1 vere-*-linux-x86_64 | head -1)
        chmod +x $$VERE
        echo "==> Using vere: $$VERE"

        echo "==> Starting ships..."
        ./$$VERE -t --loom 31 --http-port 8080 zod &
        ./$$VERE -t --loom 31 --http-port 8081 ten &
        ./$$VERE -t --loom 31 --http-port 8082 mug
    volumes:
      - ships-data:/data
    ports:
      - "${ZOD_PORT:-8080}:8080"
      - "${TEN_PORT:-8081}:8081"
      - "${MUG_PORT:-8082}:8082"

  # OpenClaw gateway with plugin
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - TLON_URL=${TLON_URL:-http://ships:8080}
      - TLON_SHIP=${TLON_SHIP:-~zod}
      - TLON_CODE=${TLON_CODE:-lidlut-tabwed-pillex-ridrup}
      - TLON_OWNER_SHIP=${TLON_OWNER_SHIP:-~ten}
      - TLON_DM_ALLOWLIST=${TLON_DM_ALLOWLIST:-~ten}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - MODEL=${MODEL:-custom-proxy/tlon-test-scripted}
      - TLONBOT_TOKEN=${TLONBOT_TOKEN}
      - VERBOSE=${VERBOSE:-0}
      - TEST_LIVE_TOOL_TRACE=${TEST_LIVE_TOOL_TRACE:-0}
      - TEST_LIVE_TOOL_TRACE_CONTENTS=${TEST_LIVE_TOOL_TRACE_CONTENTS:-0}
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    depends_on:
      - fake-model
    volumes:
      - ..:/workspace/openclaw-tlon
      - openclaw-modules:/workspace/tlon/node_modules

volumes:
  ships-data:
  openclaw-modules:
