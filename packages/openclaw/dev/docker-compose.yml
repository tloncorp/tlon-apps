services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      # Default to MiniMax 2.1 via OpenRouter if MODEL not set in .env
      - MODEL=${MODEL:-openrouter/minimax/minimax-m2.1}
      # Inside the container, the local tlon-apps/homestead checkout is always mounted here.
      # This must not use the host absolute path from .env.
      - TLON_APPS_DIR=/workspace/tlon-apps
      # Inside the container, the local tlon-skill checkout is always mounted here.
      # This must not use the host absolute path from .env.
      - TLON_SKILL_DIR=/workspace/tlon-skill
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    volumes:
      # Mount plugin repo
      - ..:/workspace/openclaw-tlon
      # Container-local node_modules (avoids host darwin binaries overwriting linux)
      - openclaw-tlon-modules:/workspace/openclaw-tlon/node_modules
      # Mount tlonbot for config and prompts
      - ../../tlonbot:/workspace/tlonbot
      # Local tlon-apps/homestead checkout for dev-only @tloncorp/api override builds.
      # Set TLON_APPS_DIR when your local checkout is not named ../tlon-apps.
      - ${TLON_APPS_DIR:-../../tlon-apps}:/workspace/tlon-apps
      # Local tlon-skill checkout for dev-only @tloncorp/tlon-skill override.
      # Set TLON_SKILL_DIR when your local checkout is not named ../tlon-skill.
      - ${TLON_SKILL_DIR:-../../tlon-skill}:/workspace/tlon-skill
      # Persist OpenClaw state
      - openclaw-state:/root/.openclaw
      # Config from tlonbot (copied + patched by entrypoint, not mounted directly)
      # The entrypoint copies /workspace/tlonbot/openclaw.json → /root/.openclaw/openclaw.json
      # and patches in env vars (BRAVE_API_KEY, etc.)
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  openclaw-state:
  openclaw-tlon-modules:
