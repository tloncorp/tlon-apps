services:
  hermes-tlon:
    build:
      context: ${HERMES_ADAPTER_DIR:?HERMES_ADAPTER_DIR is required}
      dockerfile: dev/Dockerfile.e2e
      args:
        HERMES_AGENT_REPO: ${HERMES_AGENT_REPO:-https://github.com/NousResearch/hermes-agent.git}
        HERMES_AGENT_REF: ${HERMES_AGENT_REF:?HERMES_AGENT_REF is required}
    environment:
      HERMES_HOME: /workspace/hermes-home
      HERMES_AGENT_DIR: /opt/hermes-agent
      HERMES_VENV: /opt/hermes-venv
      TLON_APPS_DIR: /workspace/tlon-apps
      TLON_ADAPTER_DIR: /workspace/tlon-apps/packages/hermes-tlon-adapter
      TLON_SKILL_DIR: /workspace/tlon-apps/packages/tlon-skill
      TLON_SKILL_PATH: /workspace/tlon-apps/packages/tlon-skill/SKILL.md
      TLON_CLI: /workspace/hermes-dev/bin/tlon
      TERMINAL_CWD: /workspace/hermes-home
      TLON_NODE_URL: ${TLON_NODE_URL:?TLON_NODE_URL is required}
      TLON_NODE_ID: ${TLON_NODE_ID:?TLON_NODE_ID is required}
      TLON_ACCESS_CODE: ${TLON_ACCESS_CODE:?TLON_ACCESS_CODE is required}
      TLON_OWNER_SHIP: ${TLON_OWNER_SHIP:?TLON_OWNER_SHIP is required}
      TLON_URL: ${TLON_URL:?TLON_URL is required}
      TLON_SHIP: ${TLON_SHIP:?TLON_SHIP is required}
      TLON_CODE: ${TLON_CODE:?TLON_CODE is required}
      TLON_DM_ALLOWLIST: ${TLON_DM_ALLOWLIST:?TLON_DM_ALLOWLIST is required}
      TLON_ALLOWED_USERS: ${TLON_ALLOWED_USERS:?TLON_ALLOWED_USERS is required}
      TLON_ALLOW_ALL_USERS: ${TLON_ALLOW_ALL_USERS:-false}
      TLON_HOME_CHANNEL: ${TLON_HOME_CHANNEL:?TLON_HOME_CHANNEL is required}
      TLON_GATEWAY_STATUS: ${TLON_GATEWAY_STATUS:-false}
      TLON_REENGAGEMENT_ENABLED: ${TLON_REENGAGEMENT_ENABLED:-false}
      TLON_NUDGE_TICK_INTERVAL_MS: ${TLON_NUDGE_TICK_INTERVAL_MS:-900000}
      TLON_TELEMETRY: ${TLON_TELEMETRY:-false}
      TLON_CONTEXT_MESSAGES: ${TLON_CONTEXT_MESSAGES:-4}
      TLON_SSE_READ_TIMEOUT_SECONDS: ${TLON_SSE_READ_TIMEOUT_SECONDS:-15}
      TLON_KNOWN_BOT_USERS: ${TLON_KNOWN_BOT_USERS:-}
      TLON_MAX_CONSECUTIVE_BOT_RESPONSES: ${TLON_MAX_CONSECUTIVE_BOT_RESPONSES:-3}
      HERMES_MODEL_PROVIDER:
        ${HERMES_MODEL_PROVIDER:?HERMES_MODEL_PROVIDER is required}
      HERMES_MODEL: ${HERMES_MODEL:?HERMES_MODEL is required}
      HERMES_MODEL_BASE_URL:
        ${HERMES_MODEL_BASE_URL:?HERMES_MODEL_BASE_URL is required}
      HERMES_MODEL_API_KEY:
        ${HERMES_MODEL_API_KEY:?HERMES_MODEL_API_KEY is required}
      HERMES_MODEL_API_MODE:
        ${HERMES_MODEL_API_MODE:?HERMES_MODEL_API_MODE is required}
      HERMES_GATEWAY_ARGS: ${HERMES_GATEWAY_ARGS:---replace -v}
      HERMES_E2E_ENABLE_CRONJOB: ${HERMES_E2E_ENABLE_CRONJOB:-0}
      HERMES_PLUGINS_DEBUG: ${HERMES_PLUGINS_DEBUG:-0}
    volumes:
      - ${REPO_ROOT:?REPO_ROOT is required}:/workspace/tlon-apps
      - hermes-home:/workspace/hermes-home
      - hermes-dev:/workspace/hermes-dev
      - tlon-apps-node-modules:/workspace/tlon-apps/node_modules
      - tlon-skill-node-modules:/workspace/tlon-apps/packages/tlon-skill/node_modules
      - tlon-api-node-modules:/workspace/tlon-apps/packages/api/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ships
      - fake-model

volumes:
  hermes-home:
  hermes-dev:
  tlon-apps-node-modules:
  tlon-skill-node-modules:
  tlon-api-node-modules:
