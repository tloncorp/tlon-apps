name: Publish @tloncorp/api

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run pack checks without publishing to npm'
        type: boolean
        required: true
        default: true
  push:
    tags:
      - 'api-v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          run_install: |
            - recursive: true
              args: [--frozen-lockfile]

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/api-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#api-v}"
          PKG_VERSION=$(node -p "require('./packages/api/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package version ($PKG_VERSION)"
            exit 1
          fi

      - name: Typecheck API package
        run: pnpm --filter @tloncorp/api tsc

      - name: Run API tests
        run: pnpm --filter @tloncorp/api test

      - name: Build publish artifact
        run: pnpm --filter @tloncorp/api prepack

      - name: Validate npm tarball
        run: |
          cd packages/api/dist
          npm pack --dry-run

      - name: Publish to npm
        if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/api/dist
          npm publish --access public --provenance
