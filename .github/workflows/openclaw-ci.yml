name: OpenClaw Plugin CI
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "packages/openclaw/**"
      - "packages/api/**"
      - "packages/tlon-skill/**"
      - ".github/workflows/openclaw-ci.yml"

jobs:
  unit-test:
    name: Unit Tests
    runs-on: blacksmith-4vcpu-ubuntu-2204
    defaults:
      run:
        working-directory: packages/openclaw
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          run_install: |
            - recursive: true
              args: [--frozen-lockfile]

      - name: Build
        run: pnpm build

      - name: Run unit tests
        run: npx vitest run src/ --exclude src/config-schema.test.ts

      - name: Run security tests
        run: npx vitest run src/security.test.ts

  integration-test:
    name: Integration Tests
    runs-on: blacksmith-8vcpu-ubuntu-2204
    timeout-minutes: 25
    defaults:
      run:
        working-directory: packages/openclaw
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          run_install: |
            - recursive: true
              args: [--frozen-lockfile]

      - name: Build
        run: pnpm build

      - name: Run integration tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TLONBOT_TOKEN: ${{ secrets.TLONBOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          # Reuse the S3 test-storage secrets already configured for the
          # tlon-web e2e suite (same S3-compatible ship-storage setup).
          TEST_STORAGE_ENDPOINT: ${{ secrets.E2E_S3_ENDPOINT }}
          TEST_STORAGE_BUCKET: ${{ secrets.E2E_S3_BUCKET_NAME }}
          TEST_STORAGE_ACCESS_KEY: ${{ secrets.E2E_S3_ACCESS_KEY_ID }}
          TEST_STORAGE_SECRET_KEY: ${{ secrets.E2E_S3_SECRET_ACCESS_KEY }}
          TEST_STORAGE_REGION: ${{ secrets.E2E_S3_REGION }}
          TEST_LIVE_TOOL_TRACE: "1"
          TEST_LIVE_TOOL_TRACE_CONTENTS: "1"
        run: pnpm test:integration

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f dev/docker-compose.test.yml logs || true
