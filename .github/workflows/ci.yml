name: CI (Test and Build)
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # Detect which parts of the monorepo changed so downstream jobs can skip
  # work that the change set can't affect. `app` is an ignore-list: it's true
  # for ANY change except ones confined to the isolated bot/plugin packages
  # (openclaw/hermes/tlon-bot-e2e/tlon-skill — not consumed by the app, covered
  # by their own workflows) or docs. New packages therefore default to running
  # the app suite, so we never silently skip needed tests. `bots` mirrors that
  # package list positively; it gates the bot-checks job that keeps the checks
  # only test-build used to provide (see below) running on bot-only PRs.
  changes:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      app: ${{ steps.filter-app.outputs.app }}
      backend: ${{ steps.filter.outputs.backend }}
      bots: ${{ steps.filter.outputs.bots }}
    steps:
      # An ignore-list filter only works with predicate-quantifier `every`:
      # a file counts only if it matches every pattern — `**` AND each `!`
      # exclusion. Under the default `some`, `**` matches everything and the
      # exclusions are dead letters (the pre-#6128 gating had this bug).
      # The quantifier is step-wide and `every` would break the positive
      # OR-lists below, so `app` gets its own step.
      - name: Filter changed paths (app ignore-list)
        uses: dorny/paths-filter@v3
        id: filter-app
        with:
          predicate-quantifier: 'every'
          filters: |
            app:
              - '**'
              - '!packages/openclaw/**'
              - '!packages/hermes-tlon-adapter/**'
              - '!packages/tlon-bot-e2e/**'
              - '!packages/tlon-skill/**'
              - '!docs/**'
              - '!**/*.md'
      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'desk/**'
              - 'backend/**'
            bots:
              - 'packages/openclaw/**'
              - 'packages/hermes-tlon-adapter/**'
              - 'packages/tlon-bot-e2e/**'
              - 'packages/tlon-skill/**'

  # The app-wide suite. Skipped only when the filter positively reported
  # app == 'false' (bot-/docs-only PRs). Written `!= 'false'` rather than
  # `== 'true'` to fail closed: if the changes job errors, its outputs are
  # empty and a plain `== 'true'` gate would skip the suite entirely.
  test-build:
    needs: changes
    if: ${{ !cancelled() && needs.changes.outputs.app != 'false' }}
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          run_install: |
            - recursive: true
              args: [--frozen-lockfile]

      - name: Check formatting
        run: pnpm format:check

      - name: Run Lint
        run: pnpm -r lint

      - name: Build editor package (allows us to run type checks)
        run: pnpm build:editor

      - name: Check Types
        run: pnpm -r tsc

      - name: Run Tests
        run: pnpm test:ci

      - name: tlon-skill build smoke
        run: pnpm --filter '@tloncorp/tlon-skill' build:smoke

      - name: Build packages
        run: pnpm build:all
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  # Unit-level checks for the bot/plugin packages, mirroring what test-build's
  # repo-wide prettier/lint/tsc/test:ci ran for them before gating. Only
  # needed when test-build is skipped (bot-only PRs); on mixed PRs test-build
  # covers all of this. The openclaw and tlon-bot-e2e unit steps duplicate
  # jobs in the path-triggered hermes-ci/openclaw-ci workflows, on purpose:
  # those workflows can't be required status checks (a paths-filtered workflow
  # never reports on unrelated PRs, wedging a required context), so this job
  # is what puts that coverage behind the CI OK merge gate. Their heavyweight
  # shared-E2E suites stay in the plugin workflows only, non-blocking.
  bot-checks:
    needs: changes
    if: needs.changes.outputs.app == 'false' && needs.changes.outputs.bots == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2204
    name: Bot Package Checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          run_install: |
            - recursive: true
              args: [--frozen-lockfile]

      - name: Check Prettier (bot packages)
        run: pnpm prettier --check 'packages/{openclaw,tlon-skill,tlon-bot-e2e}/**/*.{ts,tsx}'

      - name: Lint OpenClaw
        run: pnpm --filter '@tloncorp/openclaw' lint

      - name: Run OpenClaw unit and security tests
        run: pnpm --filter '@tloncorp/openclaw' test

      - name: tlon-bot-e2e typecheck and unit tests
        run: |
          pnpm --filter '@tloncorp/tlon-bot-e2e' tsc
          pnpm --filter '@tloncorp/tlon-bot-e2e' test:unit

      - name: tlon-skill typecheck, tests, and build smoke
        run: pnpm --filter '@tloncorp/tlon-skill' check

      - name: Run Hermes adapter unit tests
        run: ./packages/hermes-tlon-adapter/dev/test.sh

  # Merge gate: the single required status check for this repo ("CI OK" in
  # branch protection). It aggregates the conditionally-skipped jobs above
  # into one context that always reports: a skipped need is fine (the filter
  # said that suite wasn't relevant to the diff), but any failure or
  # cancellation — including the changes job itself erroring — fails the
  # gate. `always()` (not `!cancelled()`) so a cancelled run reports a
  # failure instead of a skip, which would satisfy the required check.
  # When adding a new filter-gated job, append it to `needs` here.
  ci-ok:
    name: CI OK
    needs: [changes, test-build, bot-checks]
    if: ${{ always() }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Verify gated jobs succeeded or were skipped
        run: |
          for result in ${{ join(needs.*.result, ' ') }}; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::A gated job reported '$result'"
              exit 1
            fi
          done
          echo "All gated jobs succeeded or were skipped."

  # Production-build smoke test. The parallel e2e suite runs against the Vite
  # *dev* server; this boots the minified `vite build` output to catch
  # prod-only runtime errors (transpilation/minification breakage) that the dev
  # build can't surface. Front-end concern → gated on `app`.
  smoke-test:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2204
    name: Production Build Smoke Test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          run_install: |
            - recursive: true
              args: [--frozen-lockfile]

      - name: Build packages
        run: pnpm build:all
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Get Playwright version
        id: playwright-version
        run:
          echo "version=$(node -p
          "require('@playwright/test/package.json').version")" >> $GITHUB_OUTPUT
        working-directory: ./apps/tlon-web

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key:
            playwright-${{ runner.os }}-${{
            steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium
        working-directory: ./apps/tlon-web

      - name: Install peru
        # rube runs `peru sync` to vendor desk deps into desk-deps/ before
        # assembling ship desks. (The parallel e2e job gets peru from the rube
        # Docker image; this smoke test runs on the bare runner.)
        run: pipx install peru || pip install --user peru || pip3 install --user --break-system-packages peru

      - name: Run Production Build Smoke Test
        id: smoke-test
        run: pnpm e2e:prod:smoke:force || (echo "::warning::Production smoke test failed, retrying..." && pnpm e2e:prod:smoke:force)
        working-directory: ./apps/tlon-web
        continue-on-error: false

      - name: Upload Production Test Artifacts
        if: failure() && steps.smoke-test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-test-results
          path: |
            ./apps/tlon-web/test-results/
            ./apps/tlon-web/playwright-report/
          retention-days: 7

  # Backend tests
  backend-test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    name: Backend Tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install peru
        # run-tests.sh assembles the groups desk via scripts/assemble-desk.sh,
        # which runs `peru sync` to vendor desk deps (desk-deps/) — including
        # peru-only deps like sur/mcp-proxy that aren't in the test pill.
        run: |
          pipx install peru || pip install --user peru || pip3 install --user --break-system-packages peru
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Backend Tests for Groups
        run: |
          sudo apt-get update
          sudo apt-get install -y socat patch
          ./backend/run-tests.sh
  # Parallel E2E Tests using Docker containers
  e2e-parallel:
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.backend == 'true'
    runs-on: blacksmith-16vcpu-ubuntu-2204
    name: E2E Tests (Parallel - 4 shards)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          run_install: |
            - recursive: true
              args: [--frozen-lockfile]

      - name: Build E2E Docker Image
        run: |
          cd apps/tlon-web
          pnpm e2e:parallel:build

      - name: Run E2E Tests (Parallel)
        env:
          TOTAL_SHARDS: 4
          INCLUDE_OPTIONAL_SHIPS: false
          E2E_S3_ENDPOINT: ${{ secrets.E2E_S3_ENDPOINT }}
          E2E_S3_ACCESS_KEY_ID: ${{ secrets.E2E_S3_ACCESS_KEY_ID }}
          E2E_S3_SECRET_ACCESS_KEY: ${{ secrets.E2E_S3_SECRET_ACCESS_KEY }}
          E2E_S3_BUCKET_NAME: ${{ secrets.E2E_S3_BUCKET_NAME }}
          E2E_S3_REGION: ${{ secrets.E2E_S3_REGION }}
        run: |
          cd apps/tlon-web
          pnpm e2e:parallel

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            apps/tlon-web/test-results/merged-report/
            apps/tlon-web/test-results/junit-merged.xml
            apps/tlon-web/test-results/logs/
          retention-days: 30
