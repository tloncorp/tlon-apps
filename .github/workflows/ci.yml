name: CI (Test and Build)
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  test-build:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          run_install: |
            - recursive: true
              args: [--frozen-lockfile]

      - name: Check .prettierignore is up to date
        run: |
          pnpm run prettier:rebuild-monorepo-ignore
          git diff --exit-code .prettierignore || \
            (printf "\n⚠️ .prettierignore is out of date. Run 'pnpm run prettier:rebuild-monorepo-ignore' and commit the result." && exit 1)

      - name: Check Prettier
        run: pnpm prettier --check '**/*.{ts,tsx}'

      - name: Run Lint
        run: pnpm -r lint

      - name: Build editor package (allows us to run type checks)
        run: pnpm build:editor

      - name: Check Types
        run: pnpm -r tsc

      - name: Run Tests
        run: pnpm test:ci

      - name: Build packages
        run: pnpm build:all
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Get Playwright version
        id: playwright-version
        run:
          echo "version=$(node -p
          "require('@playwright/test/package.json').version")" >> $GITHUB_OUTPUT
        working-directory: ./apps/tlon-web

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key:
            playwright-${{ runner.os }}-${{
            steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium
        working-directory: ./apps/tlon-web

      - name: Run Production Build Smoke Test
        id: smoke-test
        run: pnpm e2e:prod:smoke:force || (echo "::warning::Production smoke test failed, retrying..." && pnpm e2e:prod:smoke:force)
        working-directory: ./apps/tlon-web
        continue-on-error: false

      - name: Upload Production Test Artifacts
        if: failure() && steps.smoke-test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-test-results
          path: |
            ./apps/tlon-web/test-results/
            ./apps/tlon-web/playwright-report/
          retention-days: 7

  # Backend unit tests
  backend-test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    name: Backend Tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect desk file changes
        id: desk_changes
        run: |
          if git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" | grep -q '^desk/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Backend Tests for Groups
        if: steps.desk_changes.outputs.changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y socat patch
          ./backend/run-tests.sh

      - name: Skip backend tests (no desk changes)
        if: steps.desk_changes.outputs.changed != 'true'
        run: echo "No desk/** changes detected; skipping backend tests."
  # Backend aqua tests
  backend-aqua-test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    name: Backend Aqua Tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect desk file changes
        id: desk_changes
        run: |
          if git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" | grep -q '^desk/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Backend Aqua Tests for Groups
        if: steps.desk_changes.outputs.changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y socat patch
          ./backend/run-aqua-tests.sh

      - name: Skip backend aqua tests (no desk changes)
        if: steps.desk_changes.outputs.changed != 'true'
        run: echo "No desk/** changes detected; skipping backend aqua tests."
  # Parallel E2E Tests using Docker containers
  e2e-parallel:
    runs-on: blacksmith-16vcpu-ubuntu-2204
    name: E2E Tests (Parallel - 4 shards)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          run_install: |
            - recursive: true
              args: [--frozen-lockfile]

      - name: Build E2E Docker Image
        run: |
          cd apps/tlon-web
          pnpm e2e:parallel:build

      - name: Run E2E Tests (Parallel)
        env:
          TOTAL_SHARDS: 4
          INCLUDE_OPTIONAL_SHIPS: false
          E2E_S3_ENDPOINT: ${{ secrets.E2E_S3_ENDPOINT }}
          E2E_S3_ACCESS_KEY_ID: ${{ secrets.E2E_S3_ACCESS_KEY_ID }}
          E2E_S3_SECRET_ACCESS_KEY: ${{ secrets.E2E_S3_SECRET_ACCESS_KEY }}
          E2E_S3_BUCKET_NAME: ${{ secrets.E2E_S3_BUCKET_NAME }}
          E2E_S3_REGION: ${{ secrets.E2E_S3_REGION }}
        run: |
          cd apps/tlon-web
          pnpm e2e:parallel

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            apps/tlon-web/test-results/merged-report/
            apps/tlon-web/test-results/junit-merged.xml
            apps/tlon-web/test-results/logs/
          retention-days: 30
