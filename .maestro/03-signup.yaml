appId: io.tlon.groups
onFlowComplete:
  - runScript: scripts/handleSignupSuccess.js
---
- runFlow: subflows/launch.yaml
- assertVisible: 'Join with new account'

# enter signup flow
- tapOn: 'Join with an invite'
- assertVisible: 'TLON  or  join.tlon.io/0v4.pca...'

# add invite link
- tapOn: 'TLON  or  join.tlon.io/0v4.pca...'
- inputText: 'https://join.tlon.io/0v7.mmmlk.5bold.rac1l.79r0m.93vef' # ~dozped-mogtec Bot Farm 2

# select email signup
- assertVisible: Or if you'd prefer, sign up with an email address
- tapOn:
    text: .*sign up with an email address.*
    retryTapIfNoChange: true

# get test email and use it
- runScript: scripts/generateSignupEmail.js
- inputText: ${output.signupEmail}
- tapOn: Sign up

# get OTP and submit it digit by digit. Attempting to insert
# all at once causes flakiness. extendedWaitUntil calls are a
# workaround to delay next digit insertion
- assertVisible: Check your email for a confirmation code
- runScript: scripts/getEmailOtp.js

- inputText: ${output.otpDigit1}
- extendedWaitUntil:
    visible: invalidText
    optional: true
    timeout: 100

- inputText: ${output.otpDigit2}
- extendedWaitUntil:
    visible: invalidTexts
    optional: true
    timeout: 100

- inputText: ${output.otpDigit3}
- extendedWaitUntil:
    visible: invalidText
    optional: true
    timeout: 100

- inputText: ${output.otpDigit4}
- extendedWaitUntil:
    visible: invalidText
    optional: true
    timeout: 100

- inputText: ${output.otpDigit5}
- extendedWaitUntil:
    visible: invalidText
    optional: true
    timeout: 100

- inputText: ${output.otpDigit6}
- extendedWaitUntil:
    visible: invalidText
    optional: true
    timeout: 100

# set a nickname
- assertVisible: Sampel Palnet
- evalScript: ${output.operationStart = Date.now()}
- tapOn: Sampel Palnet
- inputText: E2E Tester
- assertVisible: Next
- tapOn: Next

# set notification preferences
- assertVisible: Nothing
- tapOn: Next

# allow notifications screen
- assertVisible: On the next screen, make sure you tap
- tapOn:
    text: Next
    retryTapIfNoChange: true

# wait until setup is complete
- extendedWaitUntil:
    visible: Let's get started
    timeout: 600000

- evalScript: ${output.operationEnd = Date.now()}

# click through welcome tour
- assertVisible: Let's get started
- tapOn:
    id: lets-get-started

- assertVisible:
    id: bot-configure
- tapOn:
    id: bot-configure

- assertVisible:
    id: bot-name-input
- tapOn:
    id: bot-name-input
- inputText: Test Bot
- assertVisible:
    id: bot-name-next
- tapOn:
    id: bot-name-next

- assertVisible:
    id: bot-avatar-skip
- tapOn:
    id: bot-avatar-skip

- extendedWaitUntil:
    visible: Default (free, used as fallback)
    timeout: 60000
- assertVisible:
    id: bot-provider-next
- tapOn:
    id: bot-provider-next

- assertVisible:
    id: got-it
- tapOn:
    id: got-it

- extendedWaitUntil:
    visible:
      id: finish-invites
    timeout: 30000
- tapOn:
    id: finish-invites

# assert we made it through signup and onboarding
- extendedWaitUntil:
    visible: Home
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: ChatListItem-Bot Farm 2-unpinned
    timeout: 30000

# assert the expected signup chat titles are present
- assertVisible: Test Bot
- assertVisible: E2E Tester's Group
- assertVisible: shadow brian :\)
- assertVisible: Tlon Team
- assertVisible: Getting Started
- assertVisible: Bot Farm 2

- evalScript: ${output.didComplete = true}
